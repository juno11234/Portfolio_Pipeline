# StarWars_Motive_Project (3d-Starwars) 기술 문서 — 코드 유래 신 파이프라인 산출물.
#
# 입력 3양식(src/assets/starwars/): 1-구현.md(①) · 2-판단-직접.md(②) · 3-자산.md(③).
#   ①=코드에서 뽑은 사실 · ②=사람의 판단·회고 · ③=스크린샷·링크·확인 메타.
# 슬러그는 projects.yaml 키 `starwars-jedi`(자산 폴더명은 starwars — hammer/Corporate 처럼 다르다).
# 그래프(FSM·흐름·타입계층)는 mermaid. 스크린샷 3장은 raw 파일명(화면 캡처…)을 kebab 으로 리네임.
#
# ⚠ 코드의 실제 식별자에 오타가 있다 — CombatSysytem · EvenetType · Reciever · ExcutionReady.
#    실제 클래스/필드명이라 지어내지 않고 그대로 쓴다(코드 참조가 어긋나지 않게).
#
# 5단 매핑: overview / architecture(6계층·계약) / features[파쿠르·전투·가드·AI·연출] / decisions 5건 / retrospective
subtitle: 3인칭 액션 — 벡터 수학 파쿠르와 타임라인 연출
overview:
  what: >-
    벡터 연산(외적·내적·투영)으로 **벽 달리기·슬라이딩·활공**을 구현한 파쿠르 이동, 그리고 **Timeline·Cinemachine·옵저버 QTE**로 엮은 연출을
    축으로 한 1인 개발 3인칭 액션 게임입니다.
  why: >-
    게임을 하며 "구현해보고 싶었던" 이동 액션 (벽 달리기·슬라이딩·워프) 과 **Timeline 컷씬 연출**을 직접 구현하는게 목표였습니다.
  evidence: >-
    성능 문제를 고치려 시작한 게 아니라 **기능·연출 학습**이 목표라, 착수를 촉발한 단일 수치는 없습니다.
    대신 개발 중 관측된 **스파이크 3종을 프로파일러로 진단**해 진짜 병목과 아티팩트를 갈랐습니다 —
    에디터 랙 `66ms / 15FPS`(원인 `EditorLoop`, 빌드엔 없음), 씬 로드 `GC.Collect ~191ms`,
    `Gfx.WaitForPresent ~14.55ms`(GPU 병목이 아니라 VSync 대기). **빌드까지 대조**해야 병목이 보였습니다.
  stack:
    title: 벡터 수학 · 이벤트 큐 · 타임라인 연출을 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 2022.3.62f1 · URP 14.0.12
        purpose: 3D 액션 클라이언트 · URP 로 Sci-Fi 파티클/발광 이펙트 렌더
      - category: 언어
        tech: C#
        purpose: 상태 머신·전투·이동 등 게임플레이 로직 전반
      - category: 입력
        tech: Unity Input System
        purpose: 이동/전투는 PlayerInput 액션맵, QTE 는 별도 QTE 액션맵으로 분리 감지
      - category: 이동 · AI
        tech: NavMesh (NavMeshAgent)
        purpose: 일반 적 순찰·추격, 중간보스 추격 경로 탐색
      - category: 연출
        tech: Unity Timeline (PlayableDirector)
        purpose: 컷씬 재생 · QTE 성공/실패에 따른 타임라인 분기
      - category: 카메라
        tech: Cinemachine (ImpulseSource)
        purpose: 피격·보스 등장·벽 충돌 시 임펄스 카메라 흔들림
      - category: 데이터
        tech: ScriptableObject (SFXData)
        purpose: 사운드 클립·볼륨·피치를 에셋으로 분리한 데이터 주도화
      - category: 애니메이션
        tech: Animator StateMachineBehaviour
        purpose: 공격 애니 normalizedTime 구간에 히트박스 On/Off — 애니와 판정 동기화
