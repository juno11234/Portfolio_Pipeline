# ⚠ 폼의 « » 공백을 채운 기본값:
#   - subtitle : projects.yaml 장르(탑뷰 방치형 로그라이크) + 문서 초점으로 확정
#   - engine   : 2D 프로젝트지만 URP(2D Renderer) 사용 — 사용자 확인
#   - evidence : ②에 실측 수치 없음 → 정성 근거(풀 10 · 2차 빌드 null)로. 협업 결합도·빌드 디버깅·구조 판단이 핵심
