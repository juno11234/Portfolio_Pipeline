subtitle: 탑뷰 방치형 로그라이크 — 스킬 프레임워크 · 사운드 시스템

# ── ① 개요 ─────────────────────────────────────────────────────────────────
overview:
  what: >-
    9인 협업(기획4 · 개발5)에서 **스킬 시스템 프레임워크와 사운드 시스템**을 맡아 설계 · 구현했습니다. 스킬은
    **데이터(ScriptableObject)와 실행(프리팹)을 정수 ID 하나로 묶는 `ISkillID` 계약**으로 연결되고, `SkillManager`가
    에디터에서 스킬 에셋을 자동 수집한 뒤 런타임에 **원본을 복제**해 플레이어에 배분하고 레벨업 강화까지 처리합니다.
    사운드는 **AudioSource 풀링 SFX · 상태 기반 BGM · 에디터 자동 에셋 생성**으로 구성됩니다.
  why: >-
    스킬 데이터(SO)는 팀원이, 실행 프레임워크 · 개별 실행 스킬은 본인이 만드는 분업이라 서로 직접 참조하지 않고도 붙는
    **연결 규약**이 필요했습니다. 게다가 방치형 로그라이크라 밸런스 테스트로 데이터 테이블이 매우 자주 바뀌어 매번
    참조가 풀립니다. 그래서 ① 데이터↔실행을 **정수 ID 하나로 매칭**, ② 반복 임포트에도 연결이 유지되는 **에디터
    자동화**, ③ 런타임 강화가 원본 에셋을 건드리지 않는 **원본 보호**, ④ 팀이 재생만 호출하면 되는 **데이터화된 사운드**를 구현하였습니다.
  evidence: >-
    밸런스 테스트로 데이터 테이블이 반복 수정되어 임포트 때마다 **스킬 프리팹 참조가 해제**됐고(수동 재연결 필요),
    겹치는 효과음을 위해 `AudioSource` 풀 **10개**를 상주시켰으며(동시 발음 수 = 풀 크기), !!2차 빌드 후 안드로이드에서만
    매니저 클래스 null 참조!!가 발생했습니다. 이 작업은 성능 수치보다 **협업 결합도 · 빌드 디버깅 · 구조 판단**이 핵심입니다.
  stack:
    title: 무참조 결합 · 에디터 자동화를 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 2022.3.62f1 · URP
        purpose: 2D 탑뷰 방치형 로그라이크 · Universal Render Pipeline (2D Renderer)
      - category: 데이터 분리
        tech: ScriptableObject
        purpose: 스킬 스탯 · 사운드 설정을 코드 밖 에셋으로 분리. 런타임엔 복제본을 써 원본 에셋 보호
      - category: 오디오
        tech: AudioSource 풀링 · Dictionary<BGMState, AudioClip>
        purpose: 겹치는 효과음 동시 재생 · 상태 전환으로 BGM 교체
      - category: 수명주기
        tech: 싱글톤 + DontDestroyOnLoad
        purpose: 씬 전환에도 살아남는 사운드 매니저

