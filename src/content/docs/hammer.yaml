  satisfaction:
    - title: 타입을 몰라도 되는 매니저
      body: >-
        데이터(팀원)와 실행(본인)을 `ISkillID` 계약 하나로 이어, 매니저가 구체 타입을 몰라도 ID만으로 연결했습니다.
        협업에서 인터페이스 계약의 효용을 체감했습니다.
    - title: 한 곳이 책임지는 수집 · 복제 · 연결 · 강화
      body: >-
        `SkillManager`가 에디터 수집 → 런타임 복제 → ID 배분 → 레벨업 강화를 파사드로 담당합니다. 팀원은 스킬 SO만
        만들면 프레임워크가 구동합니다.
    - title: 원본을 지키는 복제 전략
      body: 강화가 복제본에만 적용되어 세션이 끝나도 프로젝트 원본 에셋이 오염되지 않습니다.
    - title: 재생만 호출하면 되는 사운드
      body: >-
        SFX 풀(겹침 재생) · 상태 BGM(같은 곡 재시작 방지 가드) · `SE_*.mp3` → `SFXData` 일괄 자동 생성으로, 팀은 재생만
        호출하면 됐습니다.
  learnings:
    - title: 싱글톤의 청구서는 빌드 때 온다
      tint: true
      body: >-
        혼자 개발할 땐 편의상 싱글톤을 자주 썼고 문제를 못 느꼈습니다. 여러 명이 쓰자 의존 관계 추적이 어려워졌고,
        !!2차 빌드 후 안드로이드에서만 매니저 null 참조!!로 빌드 단계에서야 드러났습니다. 근본 원인은 클래스 간 결합도가
        높아 특정 실행 순서에 의존하는 구조 그 자체였습니다.
    - title: 실행 순서 의존은 임시방편
      body: >-
        매니저 연결이 시작 시점에 대상이 씬에 있어야만 동작했습니다. `Script Execution Order`로 순서를 강제한 건 당장만
        막는 처방이지 결합을 없앤 게 아니었습니다.
    - title: 팀원 싱글톤에 묶인 실행 스킬
      body: >-
        실행 스킬(`AquaBall`)이 팀원이 만든 `CombatSystem` · `AliveExistSystem` 싱글톤에 직접 의존했습니다. 편했지만
        그만큼 결합됐습니다.
    - title: 재미에 대한 직무유기
      body: >-
        완성 후 받은 첫 질문이 "직접 플레이해보고 재미있었나요?"였습니다. 진행도 · 구현 가능 여부는 늘 논의했지만 정작
        플레이어 경험은 아무도 이야기하지 않았습니다. 재미의 책임을 기획팀에만 미룬 셈이었습니다. 개발자는 단순히 기획서를
        코드로 옮기는 사람이 아니라는 걸 배웠습니다.
  improvements:
    - title: 결합도를 DI로 걷어내기 (이후 실행함)
      body: >-
        재발 방지를 위해 의존성 주입 개념을 학습하고, 이후 개인 프로젝트에서 `VContainer`를 직접 적용했습니다. 실행 순서
        강제 대신 명시적 주입으로 순서 문제 자체를 제거하는 방향입니다.
    - title: 전투 — 웨이브로 성장 체감 (설계 제안 · 미구현)
      body: >-
        몬스터 수가 적어 스펙 상승이 체감 안 되던 문제. 웨이브로 몰려오는 다수를 소탕하며 성장을 체감시키고, 오브젝트
        풀링으로 프레임 드랍 없이 대량 생성하는 설계입니다.
    - title: 선택지 — 스킬 자체를 진화 (설계 제안 · 미구현)
      body: >-
        단순 스탯만 오르면 시각적 재미가 떨어집니다. 투사체 증가 · 폭발 장판 등 스킬이 진화하도록, 종류별 추상 클래스에
        성장 로직을 두고 시전 시 레벨을 전달하는 설계입니다.
    - title: 강화 — 실패를 보정하는 확률 (설계 제안 · 미구현)
      body: >-
        고레벨일수록 실패 확률이 높아 불쾌한 경험. 실패할수록 스택을 쌓아 다음 확률을 보정하고, 등급별 float 누적을 가중해
        최종 확률을 계산하는 설계입니다.
