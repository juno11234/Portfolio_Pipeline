# 자료(사람이 채운 3양식, src/assets/Corporate/):
#   ① 구현: source-skill-sound.md   (이주노 직접 생성: 스킬 프레임워크 + 사운드 시스템)
#   ② 판단: 2-판단-직접-작성본.md
#   ③ 자산: 3-자산.md               (스크린샷 title/swordSkill/MagicSkill · 유튜브 · 깃허브)
#
# 자산은 src/assets/Corporate/ 그대로 참조(사용자 결정 — hammer/ 로 이동하지 않음).
# 귀속: 스킬 데이터 SO(ActiveSkillSO·BuffSO)·개별 스킬 프리팹은 팀원(dopajac) 작업 → "관계"로만 등장, "내가 만든 것" 아님.
# 그래프는 mermaid(classDiagram·flowchart·stateDiagram). 코드는 VS 다크(Shiki). 카드 가로↔세로는 렌더러 자동.
