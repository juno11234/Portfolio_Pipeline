# ── ② 시스템 구조 ─────────────────────────────────────────────────────────
architecture:
  title: 시스템 구조
  intro: >-
    스킬 시스템은 **데이터(SO)와 실행(프리팹)을 분리**하고, 둘을 **정수 ID(`ISkillID`)로만** 잇습니다. `SkillManager`가
    중앙에서 에디터 수집 → 런타임 복제 → ID 매칭 배분 → 강화까지 담당하는 **파사드/오케스트레이터**입니다. 사운드
    시스템은 이와 독립된 두 싱글톤(`SFXManager` · `BGMManager`)이며, 스킬 실행부(`AquaBall`)가
    `SFXManager.Play(skillSound)`로 사운드에 붙는 것이 유일한 접점입니다.
  parts:
    - badge: 구성요소
      title: 스킬 · 사운드 4계층
      blocks:
        - type: layers
          components: >-
            인터페이스 1(`ISkillID`) · 추상 클래스 2(`ActiveSkillBase`, `ActiveSkillData`/`PassiveSkillData`) ·
            매니저 3(`SkillManager` · `SFXManager` · `BGMManager`) · SO 1(`SFXData`) · 에디터 툴
            2(`AutoAssignSkillObjects` · `SoundExecel`)로 이루어집니다.
          relations: >-
            `SkillManager`는 `Player` · `ActiveSkillSO` · `BuffSO` · `OptionChoice_SkillOption`을 압니다. 실행
            프리팹(`AquaBall`)은 `owner.skills[]`를 통해 자기 데이터 SO를 역참조하고, `SFXManager` · `CombatSystem` ·
            `AliveExistSystem`(팀원)을 싱글턴으로 호출합니다. **데이터 SO와 실행 프리팹은 서로를 직접 참조하지 않고 ID로만
            만납니다.**
          flow: >-
            (에디터) 폴더 스캔 → `Origin_skillObjects` → (런타임 시작) 복제 → `ISkillID` 필터 → `SetSkillID()` →
            `ConnectSkills()`로 `player.skills[]` 배분 → (게임 중) 레벨업 선택 → `SkillEnchant()`로 복제본 스탯 갱신 →
            (시전) 프리팹 생성 → `Initialize()`로 스탯 확정 → 동작 + `SFXManager.Play`.
          layers:
            - name: 오케스트레이션 · ORCHESTRATION
              note: 수집 · 복제 · 연결 · 강화 · 이름조회
              items:
                - name: SkillManager
                  emphasis: true
            - name: 데이터 계층 · DATA
              note: 본인 추상 스키마 · enum / 팀원 구체 SO
              items:
                - name: ActiveSkillData · PassiveSkillData (abstract)
                - name: SkillType (enum)
                - name: ActiveSkillSO (팀원)
                - name: BuffSO (팀원)
            - name: 실행 계층 · EXECUTION
              note: 추상 베이스 + 프리팹 스크립트
              items:
                - name: ActiveSkillBase (abstract)
                - name: AquaBall
                  emphasis: true
                - name: Beast Claw · Magic Explosion 등 (팀원)
            - name: 사운드 계층 · SOUND
              note: 풀 · 상태 dict · 에디터 툴
              items:
                - name: SFXManager
                - name: BGMManager
                - name: SFXData
                - name: SoundExecel
    - badge: 관계
      title: ISkillID 계약 — 데이터와 실행이 공유
      lede: >-
        데이터(`ActiveSkillSO` · `BuffSO`)와 실행(`AquaBall`)이 **같은 `ISkillID` 계약을 공유**하는 것이 이 시스템의
        핵심입니다. `ActiveSkillBase`는 모든 실행 스킬의 추상 베이스입니다.
      blocks:
        - type: mermaid
          question: 데이터와 실행 두 축은 무슨 계약을 공유하고 누가 구현하나?
          source: |
            classDiagram
                class ISkillID {
                    <<interface>>
                    +int SkillID
                    +SetSkillID()
                }
                class ActiveSkillSO
                class BuffSO
                class ActiveSkillBase {
                    <<abstract>>
                    +Initialize()
                }
                class AquaBall
                ISkillID <|.. ActiveSkillSO
                ISkillID <|.. BuffSO
                ISkillID <|.. AquaBall
                ActiveSkillBase <|-- AquaBall

# ── ③ 핵심 기능 ───────────────────────────────────────────────────────────
features:
  - title: ISkillID — 데이터와 실행을 정수 ID로 묶는 계약
    parts:
      - badge: 계약
        title: 데이터 · 실행이 같은 int ID를 공유
        lede: >-
          스킬의 "데이터"(밸런싱용 SO)와 "실행"(씬 프리팹)은 서로를 몰라야 합니다. 그래서 **양쪽 모두 `ISkillID`를
          구현**하고, `SetSkillID()`에서 에셋에 박힌 `Skill_ID`를 런타임 `SkillID`로 복사합니다. 매니저는 "이 플레이어가
          가진 스킬 ID" 배열만 보고 같은 ID의 데이터/실행을 **직접 참조 없이** 이어붙입니다.
        blocks:
          - type: code
            api: SkillManager.cs · interface ISkillID
            code: |-
              // SkillManager.cs — 계약
              public interface ISkillID
              {
                  public int SkillID { get; set; }
                  public void SetSkillID();
              }

              // ActiveSkillSO.cs (데이터) · AquaBall.cs (실행) 둘 다 동일 패턴
              public int Skill_ID;                              // 에셋/인스펙터에 박힌 고정 ID
              public int SkillID { get; set; }
              public void SetSkillID() { SkillID = Skill_ID; }  // 런타임에 복사
            notes:
              - at: SetSkillID()
                why: 에셋 값(Skill_ID)을 런타임 값(SkillID)으로 복사하는 지점이다. 데이터 SO와 실행 프리팹이 같은 계약을 공유한다.
              - at: 양쪽 동일 구현
                why: 데이터(ActiveSkillSO)와 실행(AquaBall)이 같은 ISkillID를 구현하므로, 매니저는 구체 타입을 몰라도 ISkillID.SkillID만으로 짝을 찾는다.
          - type: points
            variant: mini
            columns: 3
            items:
              - title: ActiveSkillSO
                tag: 데이터
                body: 액티브 스킬 데이터 SO — 팀원 작업. ISkillID 구현
              - title: BuffSO
                tag: 데이터
                body: 버프 스킬 데이터 SO — 팀원 작업. ISkillID 구현
              - title: AquaBall
                tag: 실행
                body: 씬 프리팹 실행 스킬 — 본인 작업. ISkillID 구현

  - title: SkillManager — 에디터 자동 수집 · 런타임 복제 · ID 매칭 배분
    parts:
      - badge: SkillManager
        title: 수집 → 복제 → ID 배분
        lede: >-
          `AutoAssignSkillObjects()`가 스킬 SO 폴더를 `AssetDatabase.FindAssets` + LINQ로 훑어 인스펙터 드래그 없이
          `Origin_skillObjects`를 채우고, 시작 시 각 원본을 `Instantiate`로 **복제**한 뒤 `ISkillID`만 필터해 플레이어
          보유 ID와 대조해 슬롯에 배분합니다. **수집 · 복제 · 연결을 매니저 한 곳이 책임집니다.**
        blocks:
          - type: code
            api: SkillManager.cs · 복제 · 필터 · 배분
            code: |-
              // 1) 원본 SO 복제 — 런타임 강화가 원본 에셋을 건드리지 않도록
              foreach (var origin in Origin_skillObjects)
                  clonedList.Add(Instantiate(origin));
              skillObjects = clonedList.ToArray();

              // 2) ISkillID 만 골라 런타임 ID 세팅
              foreach (var obj in skillObjects)
                  if (obj is ISkillID id) temp.Add(id);
              skills = temp.ToArray();
              foreach (var skill in skills) skill.SetSkillID();

              // 3) 플레이어 보유 ID ↔ 스킬 ID 대조 후 슬롯 배분
              if (players[i].data.skill_possed[0] == skills[j].SkillID)
                  players[i].skills[0] = skills[j];
            notes:
              - at: Instantiate(origin)
                why: 원본 SO를 복제해 원본 에셋을 보호한다 — 강화가 세션 한정이 된다.
              - at: obj is ISkillID id
                why: 구체 타입을 몰라도 계약만으로 필터링한다.
              - at: skill_possed[k] == SkillID
                why: 플레이어 보유 목록과 실제 스킬을 정수 ID로 연결한다.
          - type: mermaid
            question: 스킬은 어떻게 로드되어 플레이어에 연결되나?
            source: |
              flowchart TD
                  A["에디터 폴더 스캔 · AssetDatabase"] --> B["Origin_skillObjects"]
                  B -->|"Instantiate 복제"| C["skillObjects (복제본)"]
                  C --> D["ISkillID 필터 · obj is ISkillID"]
                  D --> E["SetSkillID() · Skill_ID → SkillID"]
                  E --> F["ConnectSkills() · skill_possed 대조"]
                  F --> G["players[i].skills[0/1]"]
          - type: callout
            badge: 주의
            tone: white
            body: >-
              `AutoAssignSkillObjects`는 `#if UNITY_EDITOR`라 빌드에는 포함되지 않습니다. 따라서 **런타임 전 에디터에서
              수집이 끝나 있어야** 합니다.

  - title: SkillEnchant — 레벨업 강화(액티브/버프 분기)
    parts:
      - badge: SkillEnchant
        title: 테이블 값을 타입별로 복제본에 누적
        lede: >-
          레벨업 시 선택 ID로 `OptionChoice_SkillOption`(엑셀 테이블)에서 강화 수치 한 줄을 조회하고, 대상 스킬 ID를 가진
          플레이어 스킬을 찾아 **타입별로 다르게** 적용합니다 — 액티브면 레벨/쿨감/데미지, 버프면 레벨/쿨감/지속/발동확률.
          **버프 쿨타임은 하한 0.1초로 클램프**합니다.
        blocks:
          - type: code
            api: SkillManager.cs · SkillEnchant()
            code: |-
              var a = skillOption.GetValue(Selection_ID);   // 엑셀 테이블 한 줄
              if (player.skills[i] is ActiveSkillSO active) {
                  active.Skill_current_LV += a.Skill_LvUP;
                  active.Skill_Cooldown   -= a.Cooldown_Reduction;
                  active.Skill_Damage     += a.Damage_Increase;
              }
              if (player.skills[i] is BuffSO buff) {
                  buff.Skill_current_LV += a.Skill_LvUP;
                  buff.Skill_Cooldown   -= a.Cooldown_Reduction;
                  if (buff.Skill_Cooldown - a.Cooldown_Reduction <= 0.1f) buff.Skill_Cooldown = 0.1f; // 하한
                  buff.Skill_Duration        += a.Duration_Increase;
                  buff.Skill_Activation_Rate += a.Activation_Rate_Increase;
              }
            notes:
              - at: is ActiveSkillSO / is BuffSO
                why: 액티브엔 데미지를, 버프엔 지속·발동확률처럼 타입별로 의미 있는 필드만 강화한다.
              - at: 0.1f 클램프
                why: 쿨타임이 0 이하로 내려가 즉시 재발동되는 것을 막는다.
          - type: table
            headers: [강화 수치, Active 적용, Buff 적용]
            rows:
              - [Skill_LvUP (레벨), ○, ○]
              - [Cooldown_Reduction (쿨감), ○, ○ (하한 0.1s)]
              - [Damage_Increase (데미지), ○, —]
              - [Duration_Increase (지속), —, ○]
              - [Activation_Rate_Increase (발동확률), —, ○]
          - type: mermaid
            question: 레벨업 선택이 어떻게 스킬 강화로 이어지나?
            source: |
              flowchart TD
                  A["레벨업 · SetSelectionID(id)"] --> B["GameManager.selectID"]
                  B --> C["skillOption.GetValue(id) · 엑셀 한 줄"]
                  C --> D{"스킬 타입?"}
                  D -->|ActiveSkillSO| E["레벨 · 쿨감 · 데미지"]
                  D -->|BuffSO| F["레벨 · 쿨감(하한 0.1s) · 지속 · 발동확률"]
                  E --> G["복제본 스탯 누적"]
                  F --> G

  - title: ActiveSkillBase · AquaBall — 추상 실행 베이스와 유도 투사체
    parts:
      - badge: 실행 베이스
        title: 곡선→직선 유도 + 자기 ID로 스탯 확정
        lede: >-
          `ActiveSkillBase`(추상 MonoBehaviour)가 모든 실행 스킬의 공통 뼈대(`owner` · `skillSound` · `SkillStat` ·
          `abstract Initialize()`)입니다. `AquaBall`은 최근접 적을 향해 처음엔 **곡선(유도)**, 가까워지면 **직선**으로
          접근해 터지고, `Initialize()`에서 `owner.skills[]` 중 자기 ID의 SO를 찾아 데미지 · 범위를 확정합니다.
        blocks:
          - type: code
            api: AquaBall.cs · MoveToEnemyHurt() · Initialize()
            code: |-
              // MoveToEnemyHurt() — 곡선형 가속, 거리로 직선 전환
              float curveSpeed = Mathf.Min(Mathf.Pow(timeSinceStart, curvefloat), maxSpeed);
              float dynamicRotateSpeed = Mathf.Lerp(180f, 90f, distanceToTarget / 5f); // 가까울수록 빠른 회전
              velocity = curveSpeed * initialSpeed * Time.deltaTime;
              // distanceToTarget < 0.5f → 터짐: 카메라 흔들림 + 콜라이더 ON (한 번만)

              // Initialize() — 자기 ID의 SO에서 스탯 확정
              if (owner.skills[0].SkillID == SkillID && owner.skills[0] is ActiveSkillSO skill) {
                  stat.Damage = owner.Damage * skill.Skill_Damage;
                  coll.size   = new Vector2(skill.Skill_Range_width, skill.Skill_Range_height);
              }
            notes:
              - at: Mathf.Pow(t, curvefloat)
                why: 발사 직후 느리다 점점 빨라지는 유도감을 만든다.
              - at: Lerp(180, 90, dist/5)
                why: 가까울수록 급회전해 명중률을 높인다.
              - at: owner.Damage * skill.Skill_Damage
                why: 스킬 SO는 배율만 갖고, 실제 데미지는 시전자 능력치와 곱해 산출한다.
          - type: mermaid
            question: 투사체는 생성부터 소멸까지 어떤 단계를 거치나?
            source: |
              stateDiagram-v2
                  state "생성 · Initialize" as Spawn
                  state "곡선 유도" as Curve
                  state "직선 유도" as Straight
                  state "터짐" as Burst
                  state "적 충돌" as Hit
                  state "파괴" as Destroy
                  [*] --> Spawn: 자기 ID SO로 스탯 확정
                  Spawn --> Curve: 발사
                  Curve --> Straight: 목표에 근접
                  Straight --> Burst: 거리 0.5 미만 · 카메라 흔들림 · 콜라이더 ON
                  Burst --> Hit: CombatSystem에 데미지
                  Hit --> Destroy: 이펙트 딜레이 후
                  Destroy --> [*]
                  Curve --> Curve: 타겟 소실 → TempTarget 폴백
          - type: callout
            badge: 접점
            tone: tint
            body: >-
              `Start()`의 `SFXManager.Instance.Play(skillSound)` — 스킬 시스템이 사운드 시스템에 붙는 **유일한 지점**입니다.
          - type: figure-grid
            cells:
              - src: ../../assets/Corporate/swordSkill.png
                caption: '**근거리** 스킬 — 최근접 적에 접근해 타격(138). 파란 참격 이펙트'
                width: 214
                height: 202
              - src: ../../assets/Corporate/MagicSkill.png
                caption: '**원거리** 스킬 — 마법 투사체와 폭발 장판 이펙트'
                width: 327
                height: 205

  - title: 사운드 시스템 — SFX 풀 · 상태 BGM · 에디터 자동화
    parts:
      - badge: 사운드
        title: 겹침 재생 · 상태 교체 · 버튼 하나로 에셋 생성
        lede: >-
          `SFXManager`(싱글톤)는 `AudioSource`를 `poolSize(10)`개 미리 만들어 **재생 중이 아닌 소스**에 실어 효과음을
          겹쳐 재생합니다. `BGMManager`는 `BGMState`를 `Dictionary`로 조회해 **현재 클립과 다를 때만** 교체하고,
          `SoundExecel`(에디터 툴)은 `SE_*.mp3`를 훑어 `SFXData` 에셋을 **일괄 자동 생성**합니다.
        blocks:
          - type: code
            api: SFXManager.cs · Play() / BGMManager.cs · ChangeBGM()
            code: |-
              // SFXManager — 재생 중이 아닌 소스에 실어 재생 (겹침 허용)
              foreach (var s in audioSources)
                  if (s.isPlaying == false) { s.clip = sfxData.clip; s.volume = sfxData.volume; s.Play(); return; }

              // BGMManager — 상태로 조회, 현재와 다를 때만 교체
              if (bgmDict.TryGetValue(newState, out AudioClip clip) && bgmSource.clip != clip) {
                  bgmSource.clip = clip; bgmSource.loop = true; bgmSource.Play();
              }
            notes:
              - at: isPlaying == false
                why: 고정 풀에서 빈 채널만 재사용한다 — 동시 발음 수 = poolSize(10).
              - at: bgmSource.clip != clip
                why: 같은 스테이지 재진입 시 BGM이 처음부터 다시 시작하는 것을 막는 가드다.
          - type: chips
            variant: flow
            items:
              - { label: AquaBall.Start, arrow: → }
              - { label: SFXManager.Play, arrow: → }
              - { label: 빈 AudioSource 탐색, arrow: → }
              - { label: 재생 }
          - type: table
            headers: [BGMState, 상황]
            rows:
              - [Lobby, 로비 · 시작 (Awake에서 기본 재생)]
              - [Stage1~5, 각 스테이지 BGM]
          - type: callout
            badge: 직렬화
            tone: white
            body: >-
              `Dictionary`는 인스펙터 직렬화가 안 되므로, `BGMData[]`로 받아 시작 시 런타임
              `Dictionary<BGMState, AudioClip>`로 매핑합니다.

# ── ④ 고민과 선택 (② 사람이 쓴 판단) ─────────────────────────────────────
decisions:
  - title: 데이터↔실행 결합 — 직접 참조/상속 vs ISkillID 정수 계약
    options:
      - { key: A, title: 직접 참조/상속 }
      - { key: B, title: ISkillID 정수 계약, chosen: true }
    criteria:
      - label: 결합도
        values:
          - 데이터↔실행이 서로를 앎
          - 서로 모른 채 ID로만 만남
      - label: 담당자 협업
        values:
          - 데이터 · 실행 담당이 얽힘
          - 데이터는 팀원 · 실행은 본인, 규약만 공유
      - label: 매니저의 타입 인지
        values:
          - 구체 타입을 알아야 연결
          - 타입 몰라도 ISkillID.SkillID로 연결
    reason: >-
      스킬 데이터 SO는 팀원이, 실행 프레임워크는 본인이 만드는 분업이었습니다. 서로 직접 참조하면 한쪽을 고칠 때 다른
      쪽이 딸려옵니다. 그래서 양쪽이 각자 `SetSkillID()`로 ==에셋에 박힌 Skill_ID를 런타임 SkillID로 복사==하게 하고,
      매니저는 `obj is ISkillID id`로 구체 타입을 몰라도 같은 ID끼리 이어붙였습니다.

  - title: 런타임 스킬 데이터 — 원본 SO 직접 사용 vs 복제본(Instantiate)
    options:
      - { key: A, title: 원본 SO 직접 사용 }
      - { key: B, title: 복제본(Instantiate), chosen: true }
    criteria:
      - label: 원본 에셋
        values:
          - 런타임 강화가 에셋에 영구 반영
          - 세션 한정 · 원본 무영향
      - label: 증상
        values:
          - 플레이 종료 후에도 값 잔존
          - 다음 플레이에 초기 상태 복원
    reason: >-
      !!레벨업 테스트 중, 런타임에 바뀐 데이터가 플레이 종료 후에도 그대로 남는 버그!!를 만났습니다. SO는 에셋이라
      원본이 메모리에 상주해 변경이 그대로 남는 게 원인이었습니다. `MonoBehaviour`가 씬에 복사본으로 로드되는 것처럼
      ==원본 대신 Instantiate 복제본을 사용==하니 종료 시 폐기되어 원본 오염이 사라졌습니다. 이후 강화(`SkillEnchant`)도
      복제본 스탯만 바꾸므로 프로젝트 원본은 안전합니다.

  - title: 겹치는 효과음 재생 — 단일 소스 vs Queue 풀 vs List 탐색 풀
    options:
      - { key: A, title: 단일 AudioSource }
      - { key: B, title: Queue 풀 (선입선출) }
      - { key: C, title: List 탐색 풀 (isPlaying 검사), chosen: true }
    criteria:
      - label: 동시 재생
        values:
          - 불가 (끊김)
          - 가능
          - 가능
      - label: 클립 길이 편차 대응
        values:
          - 해당 없음
          - 맨 앞이 재생 중이면 못 꺼냄
          - 노는 소스만 골라 확보
    reason: >-
      효과음이 겹쳐도 서로 끊기지 않아야 해서 단일 소스는 탈락했습니다. 풀에서 꺼낼 때 클립 길이가 제각각이라 `Queue`
      선입선출로는 맨 앞이 아직 재생 중일 수 있습니다. 그래서 미리 만든 풀을 ==순회하며 노는 소스에만 실어 재생==했습니다
      — `isPlaying == false`인 소스만 (동시 발음 수 = 풀 크기 10).

  - title: 임포트 대응 — 수동 연결 vs 에디터 자동화
    options:
      - { key: A, title: 수동 드래그 · 재연결 }
      - { key: B, title: 에디터 자동화 (#if UNITY_EDITOR), chosen: true }
    criteria:
      - label: 반복 비용
        values:
          - 임포트마다 전부 수동
          - 스캔 · ID 매칭으로 무인 처리
      - label: 실수 여지
        values:
          - 누락 · 오연결 가능
          - 규약대로 일괄
    reason: >-
      밸런스 테스트로 데이터 테이블이 매우 자주 바뀌어 임포트마다 참조가 풀렸습니다. 매번 손으로 잇는 건 큰 비용이라,
      ==에디터에서만 도는 자동화로 폴더를 스캔해 스킬 SO를 모으고, 프리팹 ID와 SO ID를 비교해 자동 연결==했습니다. 단,
      이 수집은 `#if UNITY_EDITOR`라 빌드엔 포함되지 않으므로 런타임 전 에디터에서 수집이 끝나 있어야 합니다.

# ── ⑤ 결과 · 회고 (② 사람이 쓴 판단) ──────────────────────────────────────
retrospective:
  # results 는 실측 수치가 없어 정성 결과만(② 명시) — 이 프로젝트는 협업 결합도 · 빌드 디버깅 · 구조 판단이 핵심.
