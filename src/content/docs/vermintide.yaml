# Vermintide_Motive_Project (3D-Vermintide) 기술 문서 — 코드 유래 신 파이프라인 산출물.
#
# 입력 3양식(src/assets/vermintide/): 1-구현-Vermintide.md(①) · 2-판단-Vermintide.md(②) · 3-자산.md(③).
#   ①=코드에서 뽑은 사실 · ②=사람의 판단·회고 · ③=스크린샷·링크·확인 메타.
# 조립하며 ① 이 인용한 코드·수치를 대상 저장소(../3D-Vermintide/Assets/2_Scripts)에서 전부 재확인했다 —
#   MAX_EVENT_PROCESS_COUNT=10 · 보스 HP 500 · 대검 10/스킬 100 · 총 30 · 회복 50 · 시야 120°/10 ·
#   SFX 풀 10 · BGM 0.4 · 가드 스태미나 4 · 스킬 게이지 90 전부 코드와 일치.
#
# ⚠ 코드의 실제 식별자를 그대로 쓴다(오타 포함) — `Boss.ChageState`(ChangeState 아님) · `GoblinWepon` · `PlayerWepon`.
# ⚠ 기간: git 첫/마지막 .cs 커밋은 2025.04.14~12.28 이나 47건 중 39건이 4월에 몰려 있고, README 는
#    2025.04.15~05.02 를 개발 기간으로 명시한다 → 사용자 확인(2026-07-21)으로 `2025.04.14 ~ 05.02`(git 첫 커밋 ~ README 종료일).
# ⚠ ① 부록의 `SavingSystem` 스텁은 문서에 넣지 않았다 — 구현된 시스템만 다룬다(scope 필드는 07-20 결정으로 전 문서에서 제거됨).
# ⚠ HashSet 중복 타격 필터는 대검 스킬 콜라이더(`GreatSwordSkill`)에 있다 — ②의 "스윙마다 `OnEnable` 에서 Clear" 와 코드가 일치.
#
# 그래프는 전부 mermaid(9개). 스크린샷 7장은 ③ 이 넘긴 파일명 그대로 쓴다.
# 5단 매핑: overview / architecture(5계층·계약) / features[전투·무기·몬스터보스·풀웨이브·상호작용사운드·최적화] / decisions 5건 / retrospective
# 장르 표기는 projects.yaml(`1인칭 슈팅`)·대상 repo README 와 맞춘다.
subtitle: 1인칭 슈팅 — 오브젝트 풀 대규모 웨이브와 패턴 기반 확장 구조
overview:
  lead: >-
    1인칭 시점에서 근접 대검·총·회복 물약을 교체하며 끝없이 밀려오는 고블린 웨이브를 버티고, 보스 골렘을 처치한 뒤
    탈출하는 **웨이브 생존 액션**입니다. **이벤트 큐 전투 · 전략 패턴 무기 · 상속 몬스터 · 상태 패턴 보스** 네 축 위에
    오브젝트 풀 · 웨이브 스폰 · 상호작용 미션이 얹혀 있습니다.
  what: >-
    이 문서는 `Assets/2_Scripts/` 의 **게임 런타임 로직**(전투 · 무기 · 몬스터/보스 AI · 오브젝트 풀 · 웨이브 ·
    상호작용 · 사운드 · UI)을 다룹니다 — 클래스끼리 **어떻게 통신하고 어디서 확장되는지**가 지도의 중심입니다.
  why: >-
    Vermintide 모티브라 화면을 가득 채우는 **대규모 고블린 웨이브** 위에 무기 3종 · 고블린 4종 · 보스 1종이 얹혀야 했습니다.
    그래서 설계 목표는 둘이었습니다 — (1) 무기 · 몬스터 · 보스 상태를 **기존 코드 수정 없이 종류만 늘릴 수 있는 확장 구조**로
    짜는 것, (2) 매 프레임 쏟아지는 피격 처리가 서로 얽히지 않고 **프레임 스파이크 없이** 흐르게 하는 것. 객체끼리 직접
    호출하는 대신 인터페이스(`IFighter`·`IInteractable`·`IObjectPoolItem`) · 추상 클래스 · 이벤트 큐로 결합을 끊는 방향을 택했습니다.
  evidence: >-
    런타임 중 프레임이 **15FPS 이하**로 떨어져 진행이 불가능한 구간이 있었습니다 — 프로파일러에 `Gfx.WaitForPresent` 가 잡혀
    **CPU 가 GPU 작업을 기다리는** 병목이 원인이었고, Static 배칭 + ==Occlusion Culling== 으로 **60+FPS** 를 회복했습니다.
    전투에서는 카메라를 급격히 돌리면 한 스윙에 콜라이더가 !!두 번 닿아 데미지가 중복 적용!! 되는 버그가 있어 `HashSet`
    피격 집합으로 걸렀습니다. 전투 이벤트는 프레임당 처리량을 **10건**으로 제한해 폭주 프레임을 나눠 처리하도록 설계했습니다.
  stack:
    title: 대규모 웨이브와 확장 구조를 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 2022.3.62f1 · Built-in RP
        purpose: 3D 액션 런타임 · 렌더링 기반 (manifest 에 URP/HDRP 패키지 없음)
      - category: 입력
        tech: Unity Input System 1.14.0
        purpose: 이동·시점·공격·가드·스킬·슬롯·상호작용·메뉴를 액션 맵으로 분리 바인딩하고 콜백으로 처리
      - category: AI 이동
        tech: AI Navigation / NavMesh 1.1.6
        purpose: 고블린·보스의 플레이어 추격 경로탐색, `OffMeshLink` 로 낙차 구간 점프
      - category: UI 텍스트
        tech: TextMeshPro 3.0.7
        purpose: 상호작용 프롬프트 · 미션 문구 · 탄약 카운트 HUD 렌더
      - category: 트위닝
        tech: DOTween (Demigiant)
        purpose: 피격 넉백 이동 · 사망 시 쓰러지는 회전 연출
      - category: 사운드
        tech: Unity Audio · AudioSource 수동 풀
        purpose: SFX 다중 동시재생·중복 방지, `GameState` 별 BGM 전환
      - category: 오클루전
        tech: Umbra (com.unity.modules.umbra)
        purpose: 비가시 메쉬 컬링으로 GPU 부하 절감 — 15FPS 병목의 해결책
      - category: 자료구조
        tech: Queue · Dictionary · HashSet
        purpose: 이벤트 큐 · 오브젝트 풀(FIFO) · 콜라이더↔전투주체 매핑 · 단일 스윙 중복타격 필터
