# 뱀서라이크 기술 문서.
#
# 구조는 가이드 Part 2의 5단이고, claude.ai/design 의 두 문서(뱀서라이크·Bond)로 검증했다.
#   ① overview      개요        — 최상위 필수
#   ② architecture  시스템 구조 — 문서당 하나
#   ③ features[]    핵심 기능   — 1..N 그룹. 규모가 크면 나눈다 (Bond 는 4개)
#   ④ decisions     고민과 선택 — features[].decisions 또는 최상위. 문서 전체에 최소 1건
#   ⑤ retrospective 결과·회고   — 최상위 필수
#
subtitle: 탑뷰 핵 앤 슬래시
overview:
  what: 수백 마리의 적을 **자동 공격**으로 처치하고 경험치를 모아 레벨업하며 스킬을 선택 강화하는 **2D 탑다운 뱀서라이크**입니다.
  why: 수백 개의 오브젝트가 동시에 존재하는 환경에서는 Instantiate·Destroy와 매 프레임 힙 할당이 쌓여 GC가 자주 호출되고, 그때마다 게임 로직이 멈추는 스파이크가 생깁니다. **GC 최적화**가 핵심 목표입니다.
  # 원본 PDF '최적화 테스트 결과'의 측정치를 개요로 끌어올렸다.
  # 가이드: "'느리다' 대신 '로딩 15초'처럼 측정 가능한 문제로."
  evidence: >-
    최적화 전 기준 프레임당 GC 할당 **196회**, 코루틴 **300개**, Destroy 호출 **501회**, Materials **824개** (Unity Profiler · Profile Analyzer,
    몬스터 스폰딜레이 0.1초 환경)
  scope: 의존성 주입과 초기화 순서, 데이터 드리븐 파이프라인, 이벤트 큐 전투 시스템, GC 최적화를 다룹니다. 아트·사운드·레벨 디자인은 이 문서의 범위가 아닙니다.
