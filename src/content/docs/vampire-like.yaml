decisions:
  - title: 전투 처리 — 직접 호출 vs 이벤트 큐
    options:
      - key: A
        title: 직접 호출
      - key: B
        title: 중앙 처리 이벤트 큐
        chosen: true
    criteria:
      - label: 결합도·확장성
        values:
          - 공격자가 대상을 직접 호출, 스킬마다 처리 지점 분산
          - AddInGameEvent만 알면 됨, 신규 스킬 추가해도 무변경
      - label: 처리 타이밍
        values:
          - 같은 프레임 즉시 반영
          - 최대 1프레임 지연
      - label: 반환값 활용
        values:
          - 데미지·오버킬·사망 여부 즉시 리턴
          - 리턴값 없음 → 역이벤트·콜백 필요
      - label: 순회·재진입 안전성
        values:
          - 타격 중 사망 → 컬렉션 변경 유발
          - 때리는 시점 ≠ 죽는 시점으로 분리
    reason: >-
      직접 호출은 '타격 도중 적 사망 → 풀 반납·컬렉션 변경'이 중첩돼 오류 위험이 큽니다. 이벤트 큐는 이를 구조적으로 차단하면서 느슨한 결합과 확장을 얻습니다. 타이밍 지연은
      미미하고 반환값은 콜백으로 보완 가능하다 판단해 B를 선택했습니다.
  - title: 충돌 판정 — OnTriggerEnter2D vs Raycast & OverlapCircle
    options:
      - key: A
        title: OnTriggerEnter2D
      - key: B
        title: Raycast & OverlapCircle
        chosen: true
    criteria:
      - label: 터널링 대응
        values:
          - 빠른 투사체가 콜라이더 통과 시 놓침
          - Raycast로 이동 궤적 검사 → 놓치지 않음
      - label: 대량 처리·물리 부하
        values:
          - 한쪽에 Rigidbody2D 필수 → 수백 개면 부하
          - 바디 불필요 + 사전 할당 버퍼로 매 프레임 GC 0
      - label: 충돌 정밀도
        values:
          - 콜라이더 실제 형상 기반 정밀 판정
          - OverlapCircle은 원으로 근사
      - label: 구현 비용
        values:
          - 콜백만 구현, 충돌 드물면 저렴
          - 버퍼·필터·중복 판정 직접 관리, 매 프레임 쿼리
    reason: 정밀한 히트박스가 중요하지 않고 대량 충돌이 많이 일어나는 뱀서라이크 장르 특성상, 원형 판정밖에 못 해도 Rigidbody 없이 수백 개를 처리 가능한 B가 유리하다고 판단했습니다.
retrospective:
  results:
    - 프레임당 GC 할당 **196회 → 4회 (97%↓)**
    - 코루틴 300개 → 0개, Destroy 호출 501회 → 0회
    - Materials **824개 → 249개 (70%↓)**, 메모리 **140MB** 절감
    - 전체 프레임 타임은 0.05ms 차이로 동일 — 목적이 평균 FPS가 아니라 스파이크 제거였기 때문
  troubleshooting:
    - problem: 에디터에서 선명하던 픽셀아트 스프라이트가 Android 빌드 후 색이 뭉개졌다
      cause: 압축 포맷은 인접 픽셀 색을 블록 단위로 묶는다. 픽셀아트처럼 인접 픽셀 간 색 차이가 극명한 텍스처는 이 과정에서 색상 정보가 훼손된다
      fix: RGBA 32bit 무압축을 적용했다. 텍스처 메모리는 늘지만 픽셀아트는 해상도 자체가 낮아 메모리 영향이 미미하다
      lesson: 텍스처 압축은 안드로이드라고 무조건 적용하는 것이 아니라 그래픽 스타일에 따라 트레이드 오프의 대상이 된다
    - problem: GC를 97% 줄였는데 평균 프레임이 유의미하게 늘지 않았다
      cause: Boehm GC는 관리 힙에 가비지를 쌓아놓고 임계치에 도달할 때 작동한다. 이때만 게임 로직이 멈추므로(스파이크) 평균값에는 거의 드러나지 않는다
      fix: Profile Analyzer의 Compare 모드로 평균이 아닌 프레임 분포와 스파이크를 비교했다
      lesson: GC 최적화의 목적은 평균 FPS가 아니라 스파이크 제거다. 가비지가 많을수록 GC가 더 자주, 더 오래 멈춘다
