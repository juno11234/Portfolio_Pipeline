# ── ① 개요 ─────────────────────────────────────────────────────────────────
overview:
  # what = ① A1. why·evidence = ② (사람이 쓴 판단). 지어내지 않았다.
  what: >-
    이동만 조작하면 보유 스킬이 쿨타임마다 **자동 발동**해 수백 마리의 적을 처치하고, 적이 떨군 경험치 보석을
    모아 레벨업하면 게임이 멈추고 스킬 3종 중 하나를 **선택·강화**하는 **2D 탑다운 뱀서라이크**입니다.
  why: 대량의 오브젝트를 안정적으로 처리하기 위한 **GC 최적화**에 초점을 맞췄습니다.
  evidence: >-
    최적화 전후 Unity Profiler·Profile Analyzer 실측 — **GC Alloc In Frame 196회 → 4회 (97%↓)**,
    **Materials 824개 → 249개 (70%↓)**, 메모리 **140MB** 절감.
  scope: >-
    의존성 주입과 초기화 순서, 데이터 드리븐 파이프라인(TSV→ScriptableObject→런타임 딕셔너리), 이벤트 큐 전투
    시스템, 오브젝트 풀링·GC 최적화 기법, 스킬 시스템, 이벤트 기반 UI, 빌드 자동화를 다룹니다.
    **아트·사운드·레벨 디자인은 이 문서의 범위가 아닙니다.**
  # 기술 스택 — ① A1 에서. 코드에서 뽑아 v1(7행)보다 완전한 13행.
  stack:
    title: 데이터 주도 · 무할당을 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 6000.0.56f1 · URP
        purpose: 2D SpriteRenderer 기반 탑다운 렌더
      - category: DI 프레임워크
        tech: VContainer
        purpose: 전역 의존성 주입 · 생명주기 관리(LifetimeScope · IAsyncStartable · ITickable)
      - category: 비동기 처리
        tech: UniTask
        purpose: GC 없는 async/await · 프레임 분산 로딩 · 취소 토큰 연동
      - category: 에셋 관리
        tech: Addressables 2.9.0
        purpose: 데이터 · 프리팹 · 스프라이트의 비동기 로드 및 명시적 Release
      - category: 오브젝트 풀링
        tech: UnityEngine.Pool.ObjectPool
        purpose: 적 · 투사체 · 경험치 재사용으로 GC 스파이크 제거
      - category: 입력
        tech: Unity Input System 1.18.0
        purpose: 자동 생성 PlayerActions 로 이동 입력 처리
      - category: 데이터
        tech: ScriptableObject · TSV
        purpose: 기획 밸런싱 데이터를 코드와 분리한 데이터 드리븐 설계
      - category: 텍스트 UI
        tech: TextMeshPro
        purpose: SetText 오버로드로 힙 할당 없는 텍스트 갱신
      - category: 셰이더
        tech: ShaderGraph
        purpose: 피격 플래시 셰이더 — _Amount 프로퍼티로 스프라이트를 흰색으로 덮음
