architecture:
  title: 전체 시스템 구조
  parts:
    - title: 기술 스택
      blocks:
        - type: stack-table
          rows:
            - category: DI 프레임워크
              tech: VContainer
              purpose: 전역 의존성 주입 및 객체 생명주기 관리
            - category: 비동기 처리
              tech: UniTask
              purpose: GC 없는 async/await · 프레임 분산 로딩 · 취소 토큰 연동
            - category: 에셋 관리
              tech: Addressables
              purpose: 프리팹·스프라이트·데이터의 비동기 로드 및 명시적 해제
            - category: 오브젝트 풀링
              tech: Unity ObjectPool
              purpose: 적·투사체·경험치의 재사용으로 GC 스파이크 제거
            - category: 데이터
              tech: ScriptableObject, TSV
              purpose: 기획 데이터를 코드와 분리한 데이터 드리븐 설계
            - category: 셰이더
              tech: ShaderGraph
              purpose: Shader Graph로 피격시 플래시 효과
            - category: material 최적화
              tech: MaterialPropertyBlock
              purpose: 피격 플래시 효과 시 프로퍼티만 덮어씌워 공유 material 유지
    - title: 시스템 구조
      lede: 조립 루트 → 매니저 → 런타임 객체의 3계층
      blocks:
        - type: layers
          components: >-
            조립 루트(GameLifetimeScope) 1개, 매니저 5종(Data · Combat · Spawn · Exp · UI), 그 아래 런타임 객체(플레이어 · 적 · 스킬
            · 경험치 · UI)
          relations: >-
            GameLifetimeScope가 매니저를 주입·등록하고, 매니저가 런타임 객체를 생성·등록·구독합니다. 플레이어와 적은 구체 타입이 아닌 **IFighter** 인터페이스로만
            전투 시스템과 이어집니다.
          flow: >-
            초기화는 await로 직렬화합니다. DataManager 로드 대기 → PlayerController 조립·스탯 주입 → SpawnManager 풀 준비 대기 →
            ExpManager 기동. 데이터 로드 전에 플레이어가 생성되는 경쟁 조건을 순서로 차단합니다.
          layers:
            - name: 조립 루트
              items:
                - name: GameLifetimeScope
                  note: DI Root · EntryPoint
            - name: 매니저
              edge: INJECT · REGISTER
              items:
                - name: DataManager
                  note: 데이터 허브
                - name: CombatSystem
                  note: 전투 이벤트 큐 · 허브
                  emphasis: true
                - name: SpawnManager
                  note: 웨이브 · 풀링
                - name: ExpManager
                  note: 경험치 · 풀링
                - name: UIManager
                  note: HUD · 이벤트
            - name: 런타임 객체
              edge: 생성 · 등록 · 구독
              items:
                - name: PlayerController
                  note: «IFighter»
                - name: EnemyController
                  note: «IFighter»
                - name: SkillManager
                  note: SkillBase 계층
                - name: ExpItem
                  note: 자석 이동
                - name: LevelUpUI
                  note: 스킬 선택
    - title: 전투 계약 — IFighter
      lede: 데미지를 주고받을 수 있는 모든 객체의 공통 계약입니다. 전투 로직은 구체 타입을 모릅니다.
      blocks:
        - type: mermaid
          question: 전투 시스템은 무엇으로 이루어졌고 서로 어떻게 이어지나?
          source: |
            classDiagram
                class IFighter {
                    <<interface>>
                    +Collider2D MainCollider
                    +TakeDamage(InGameEvent)
                    +Heal(InGameEvent)
                }
                class InGameEvent {
                    <<struct>>
                    +EventType Type
                    +IFighter Sender
                    +IFighter Receiver
                    +float Amount
                }
                class CombatSystem {
                    -Dictionary~Collider2D, IFighter~ _monstersDict
                    -Queue~InGameEvent~ _eventQueue
                    +Tick()
                    +AddInGameEvent(InGameEvent)
                    +RegisterMonster(IFighter)
                    +GetMonster(Collider2D) IFighter
                }
                class PlayerController {
                    +float MaxHp
                    +float CurrentHp
                    +event OnHpChanged
                    +event OnDeath
                }
                class EnemyController {
                    -EnemyStat _stat
                    -float _currentHp
                    +Setup(...)
                }
                class SkillBase {
                    <<abstract>>
                    #CombatSystem CombatSystem
                    #IFighter Sender
                    #float Damage
                    +Init(...)
                    +LevelUp(SkillData)
                }

                IFighter <|.. PlayerController
                IFighter <|.. EnemyController
                SkillBase <|-- CircleAttack
                SkillBase <|-- ProjectileTargetScanner
                SkillBase <|-- BoomerangManager
                SkillBase <|-- SpiralManager

                CombatSystem --> InGameEvent : 큐에 저장
                CombatSystem --> IFighter : 디스패치
                SkillBase --> CombatSystem : 이벤트 발행
features:
  - title: 핵심 기능
    parts:
      - title: 의존성 주입 & 초기화
        lede: 의존 순서를 await로 직렬화해 데이터 로드 전 플레이어 생성 같은 경쟁 조건을 원천 차단했습니다.
        blocks:
          - type: points
            items:
              - title: 01 await DataManager
                body: 데이터 로드 대기
              - title: 02 PlayerController
                body: 플레이어 조립 · 스탯 주입
              - title: 03 await SpawnManager
                body: 스폰 풀 준비 대기
              - title: 04 ExpManager.Init()
                body: 경험치 시스템 기동
      - title: 데이터 임포트 툴
        lede: 스프레드시트에서 작업한 밸런싱 데이터(TSV)를 클릭 한 번으로 유니티에 자동 연동하는 커스텀 에디터 툴입니다.
        blocks:
          - type: points
            items:
              - title: 전용 임포터
                body: VamSir Tools ▸ Data Importer 메뉴로 열리는 EditorWindow.
              - title: 파싱 · 검증
                body: 탭 기준 파싱, 헤더 2줄 skip. 컬럼 수 검증, LogError로 잘못된 행 즉시 진단.
              - title: 에디터 안전성
                body: Undo.RecordObject · SetDirty로 Undo·저장 보장, delayCall로 변경 충돌 회피
      - title: 데이터 매니저
        lede: 게임 시작 시 데이터 컨테이너를 비동기 로드하고, 직렬화에 유리한 List로 임포트한 데이터를 조회가 빠른 Dictionary로 재가공합니다.
        blocks:
          - type: points
            items:
              - title: List → Dictionary
                body: 저장은 List, 런타임 조회는 O(1) Dictionary
              - title: Addressables
                body: 데이터 컨테이너를 씬에 올리지 않고 필요할 때 비동기 로딩
              - title: IDisposable
                body: 생명주기 종료 시 Addressables.Release()로 명시적 메모리 해제
      - title: 이벤트 큐 전투 시스템
        lede: 개별 객체가 직접 처리하지 않고 큐로 전투 판정을 순차 처리하는 전투 시스템을 구현하였습니다.
        blocks:
          - type: code
            api: combatSystem.AddInGameEvent(evt)
            lang: csharp
            code: |-
              public void Tick()
              {
                  while (_eventQueue.Count > 0)   // 큐가 빌 때까지 한 프레임에 모두 소비
                  {
                      var e = _eventQueue.Dequeue();
                      switch (e.Type)
                      {
                          case EventType.Combat: e.Receiver.TakeDamage(e); break;
                          case EventType.Heal:   e.Receiver.Heal(e);       break;
                      }
                  }
              }
            notes:
              - at: while 루프
                why: 한 프레임에 쌓인 전투 이벤트를 전부 소비한다. 지연은 최대 1프레임이 아니라 사실상 0이다.
              - at: Dequeue
                why: 처리 지점이 프레임당 한 곳이라 피격 이펙트·사운드를 여기서 일괄 후킹할 수 있다.
              - at: VContainer
                why: CombatSystem을 AsImplementedInterfaces로 등록해 ITickable로 잡히게 했다. 이 등록이 없으면 큐가 영영 안 비워진다.
          - type: points
            items:
              - title: IFighter 인터페이스
                body: 플레이어와 적이 같은 인터페이스를 상속해 전투 로직에서 양쪽을 동일하게 취급
              - title: 단일 지점 이벤트 처리
                body: InGameEvent 처리가 프레임당 한 곳. 디버깅·밸런싱·확장 용이
              - title: 구조체 InGameEvent
                body: InGameEvent를 struct로 설계해 힙 할당 방지
      - title: 플레이어 & 몬스터
        lede: IFighter 인터페이스를 상속하여 전투 시스템을 사용하는 플레이어와 몬스터를 구현합니다.
        blocks:
          - type: points
            items:
              - title: PlayerController — 이동, 수집
                body: OnScreenStick의 Control Path를 게임패드 LeftStick으로 지정, OverlapCircle로 경험치 자석 효과
              - title: EnemyController — 주입, 풀 재사용
                body: Setup()으로 스폰 매니저가 타겟·스탯·반납 콜백을 주입
              - title: 이벤트 기반
                body: OnHpChanged, OnDeath 등으로 이벤트 기반 UI 갱신
              - title: 무적 효과
                body: 피격 시 UniTask.Delay로 일정 시간 동안 무적
              - title: 사망 위임
                body: _onDeathCallback으로 풀 반납 + 경험치 드롭. 직접 Destroy 하지 않음
              - title: ShaderGraph 피격 효과
                body: SpriteRenderer.color는 곱셈이라 흰 실루엣이 불가능. lerp 노드가 필요
      - title: 스폰 매니저 & 오브젝트 풀
        lede: 게임 시작 시 오브젝트 풀을 생성하고 런타임에 몬스터 스폰 루프를 실행하는 매니저를 구현하였습니다.
        blocks:
          - type: points
            items:
              - title: 독립 풀
                body: 적 종류별로 개별 Dictionary 관리
              - title: 프리웜
                body: 미리 50개를 생성하여 Instantiate 부하 시점을 초기 구간으로 이전
              - title: 콜백 결합
                body: 반납 콜백에 경험치 드롭을 결합, 적이 풀로 돌아갈 때 경험치 스폰
              - title: 비동기 스폰 루프
                body: >-
                  웨이브마다 독립 루프를 Forget()으로 실행해 여러 웨이브 동시 진행. OnDestroy에서 cts.Cancel() + Release()로 씬 전환 시 안전
                  정리
      - title: 스킬 시스템
        lede: SkillBase 추상 클래스로 공통 상태를 정의하고 override로 확장합니다. 레벨업 후 최초로 해당 무기 획득 시 Addressables로 동적 장착합니다.
        blocks:
          - type: table
            headers:
              - 무기 이름
              - 스킬
              - 레벨업 효과
              - 공격 방식
            rows:
              - - Dagger
                - 투사체
                - 발사 개수+
                - 가장 가까운 적 자동 조준 · 순차 연사
              - - Hammer
                - 부메랑
                - 데미지+ 쿨타임-
                - 던졌다 돌아오며 상태 변환 관통 타격
              - - BattleAxe
                - 나선 회전
                - 발사 개수+
                - 삼각함수 나선 궤도로 확산
              - - Sword
                - 원형 범위
                - 데미지+ 범위+
                - 플레이어 중심으로 주변 광역 공격
          - type: code
            api: skillManager.AddOrLevelUpWeaponAsync(skillId)
            lang: csharp
            code: |-
              public virtual void LevelUp(SkillData skillData)
              {
                  if (CurrentLevel >= SkillData.maxLevel) return;   // 최대 레벨 가드
                  Damage  += SkillData.atkPerLevel;                 // 데미지 상승
                  Cooldown = Mathf.Max(0.1f, Cooldown - 0.5f);      // 쿨타임 감소 (하한 0.1s)
                  CurrentLevel++;
              }
            notes:
              - at: virtual
                why: 기본은 데미지·쿨타임만 올린다. 반경 증가나 투사체 수 증가는 파생 클래스가 override 한다.
              - at: Mathf.Max
                why: 쿨타임이 0 이하로 내려가 매 프레임 발사되는 것을 막는 하한이다.
              - at: 0.5f
                why: 데이터가 아닌 코드 상수다. SkillSelectButton의 표시 로직에도 같은 값이 복제돼 있어 한쪽만 바꾸면 어긋난다. (기술 부채)
      - title: 조준 & 타격 최적화
        lede: 가장 가까운 적을 찾거나 경험치 아이템 자석 효과를 활성화하는 원형 범위를 가비지 없이 구현하였습니다.
        blocks:
          - type: points
            items:
              - title: GC 최적화
                body: ContactFilter2D + 사전 할당 버퍼로 GC 할당 제로
              - title: 터널링 방지
                body: 투사체는 이동 전 Raycast로 궤적을 검사해 터널링 방지 처리
      - title: UI 시스템
        lede: 상태가 변할 때만 UI를 갱신하고 Addressables 핸들을 추적해 네이티브 메모리 누수를 막았습니다.
        blocks:
          - type: points
            items:
              - title: UIManager
                body: '[Inject] 메서드 주입으로 의존 확보 후 이벤트 구독. HP·경험치·레벨을 폴링 없이 이벤트로만 갱신'
              - title: LevelUpUI
                body: 레벨업 시 timeScale=0으로 정지, Fisher-Yates 셔플로 무작위 3종 제시
              - title: SkillSelectButton
                body: 아이콘 이미지를 Addressable로 로드하며 핸들을 보관. 파괴 시 반드시 Release하여 네이티브 메모리 누수 방지
              - title: 텍스트 갱신
                body: Timer는 TMP의 SetText로 char 단위로 쪼개 배열 재활용, 힙 할당 없이 텍스트 갱신
      - title: 빌드 자동화 파이프라인
        lede: 메인 브랜치 병합 시 GitHub 서버가 자동으로 Android APK를 빌드하도록 환경을 통일·자동화했습니다.
        blocks:
          - type: points
            items:
              - title: 자동 트리거
                body: main 병합 시 클라우드에서 APK 자동 빌드
              - title: 환경 통일
                body: 로컬 PC 점유·환경 편차로 인한 빌드 차이 제거
              - title: Secrets 암호화
                body: 라이선스·계정을 하드코딩 대신 Secrets 변수로
              - title: Game CI
                body: 검증된 유니티 빌드 액션으로 파이프라인 구성
      - title: 여섯 가지 적용
        blocks:
          - type: points
            items:
              - title: 01 오브젝트 풀 + 프리웜 적용
                body: 오브젝트 풀을 적용하여 런타임 중 Instantiate, Destroy 제거
              - title: 02 풀 반납 콜백 캐싱
