# 입력 3양식(src/assets/soulslike/): 26_0720_SoulLike_구현-AI.md(①) · 2-판단-소울라이크.md(②) · 3-자산.md(③).
#   ①=코드에서 뽑은 사실 · ②=사람의 판단·회고 · ③=스크린샷·링크·확인 메타.
# 옛 PDF/디자인(soulslike.dc.html) 유래본을 걷어내고 다시 세운 것(뱀서라이크와 같은 경로).
