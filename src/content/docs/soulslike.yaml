                  D --> D1["CheckRange → Cleaner → comboOrStrafe · Selector_Random"]
                  D1 --> D2["3타 콤보 · 2타 콤보 · Strafe · BackMove→Wait"]
                  E --> E1["walkCheck→Chase→Wait · Strafe"]
          - type: callout
            badge: 래치
            tone: tint
            body: >-
              스켈레톤은 `Leaf_WatchPlayer`로 발견을 판정하고, 한 번 발견하면 `findPlayer` 래치가 유지돼
              **시야에서 벗어나도 어그로가 풀리지 않습니다**. 해제는 화톳불 `Respawn()`에서만 —
              "발각되면 끝까지 쫓아온다"는 소울라이크 특성과 일치합니다. 보스는 `BossWall`로 입장을 통제하므로
