# SoulLike 기술 문서.
#
# 내용 출처: claude.ai/design 의 "soulslike.dc.html"(.design-src, 7섹션)를 섹션별로 옮긴 것.
# meta 는 포트폴리오/소울라이크 PDF 에서 확인 — 지어낸 값 없음.
# 그래프(FSM·행동트리·타입계층)는 mermaid 로 그린다. 손그림 dc 컴포넌트는 디자인 검증용이었다.
#
# 디자인 섹션 → 파이프라인 5단 매핑:
#   01 개요            → overview
#   02 시스템 구조      → architecture (+ 디자인 01의 기술 스택 표를 첫 꼭지로 흡수)
#   03 입력·플레이어 FSM → features[0]
#   04 전투·MVVM       → features[1]
#   05 적 AI·행동 트리   → features[2]  (FSM vs BT 결정 포함)
#   06 보스·카메라·월드  → features[3]
#   07 데이터·빌드·회고  → features[4](데이터·빌드) + retrospective(회고)
subtitle: 3인칭 소울라이크 액션
overview:
  lead: >-
    **스태미나를 소모하는 회피·공격**과 **화톳불 세이브**, 2페이즈 보스를 갖춘 3인칭 소울라이크 액션 게임입니다.
    1인 개발로 **FSM 플레이어 · Behaviour Tree 몬스터 AI · 이벤트 기반 MVVM · Jenkins CI**까지
    60개 스크립트(5,484줄)를 직접 설계·구현했습니다.
  what: >-
    플레이어는 **유한 상태 머신(FSM)**으로, 몬스터는 **행동 트리(BT)**로 움직입니다.
    전투·피격·UI 갱신은 모두 **이벤트와 Observable**로 흐르는 단방향 구조입니다.
  why: >-
    상태가 늘수록 전이 조건이 폭발하는 FSM의 한계를 **항상 트리 구조인 BT**로 풀고,
    잦은 UI 변경에는 **낮은 결합의 MVVM**으로 대응하는 것이 이 프로젝트의 승부처입니다.
  evidence: >-
    **입력→상태→전투→데이터→UI** 단방향 계층을 두고, 역방향은 전부 `event · Observable<T>`로 통신합니다.
    몬스터는 **재귀 Behaviour Tree**로, 그중 ==Sequence_Memory==가 콤보 끊김 버그를 해결했습니다.
    전투는 **이벤트 큐 + 애니메이션 주도 판정**, 빌드는 **Jenkins CI**로 자동화했습니다.
  scope: >-
    단방향 5계층 아키텍처, 입력 2단 릴레이와 플레이어 FSM, 이벤트 큐 전투와 MVVM, 행동 트리 몬스터 AI,
    보스 2페이즈·락온 카메라·월드 게이팅, TSV 데이터 파이프라인과 Jenkins CI를 다룹니다.
    아트·사운드·레벨 디자인은 이 문서의 범위가 아닙니다.
  stack:
    title: 계약 기반 · 무참조 결합을 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 6000.0.56f1 · URP 17
        purpose: 3D 소울라이크 액션 · Universal Render Pipeline
      - category: 입력
        tech: Input System 1.14
        purpose: 디바이스 콜백을 의미 이벤트로 변환하는 2단 릴레이
      - category: 내비게이션
        tech: AI Navigation 2.0
        purpose: NavMeshAgent 기반 몬스터 추격·순찰 이동
      - category: 비동기 처리
        tech: UniTask
        purpose: GC 없는 async/await · 씬 페이드 취소 토큰 연동
      - category: UI
        tech: uGUI · TextMeshPro
        purpose: HP·스태미나 바, 인벤토리 드래그 앤 드롭
      - category: 데이터
        tech: ScriptableObject · TSV
        purpose: 리플렉션 제네릭 파서로 기획 데이터를 코드와 분리
      - category: 빌드 자동화
        tech: Jenkins
        purpose: 1시간 주기 폴링 → 배치 모드 빌드 → exit 코드 판정
