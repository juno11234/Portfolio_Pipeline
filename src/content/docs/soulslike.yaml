              - [바인딩, 'Observable<T>', 값 변경 감지 + 통지, 없음]
          - type: prose
            paragraphs:
              - '`FighterViewModel`이 `MonoBehaviour`를 상속하지 않는 것이 핵심입니다 — 전투 규칙이 **씬 없이도 테스트 가능한 순수 객체**로 분리됩니다.'
          - type: code
            api: Observable.cs · 값 변경 통지 + 구독 즉시 동기화
            code: |-
              public T Value
              {
                  get => _value;
                  set
                  {
                      // 같은 값이면 통지하지 않음 — 중복 갱신 차단
                      if (EqualityComparer<T>.Default.Equals(_value, value)) return;
                      _value = value;
                      OnValueChanged?.Invoke(_value);
                  }
              }

              public void Subscribe(Action<T> listener)
              {
                  OnValueChanged += listener;
                  listener?.Invoke(_value);   // 구독 즉시 현재값 1회 전달 → 초기화 코드 불필요
              }
            notes:
              - at: Equals 가드
                why: 같은 값이면 통지하지 않아 중복 UI 갱신을 막는다.
              - at: Subscribe 즉시 Invoke
                why: 구독하는 순간 현재값을 1회 전달해 초기화 코드를 없앤다 — 뷰가 최신 값으로 바로 동기화된다.
