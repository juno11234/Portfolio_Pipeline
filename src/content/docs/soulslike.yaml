architecture:
  title: 시스템 구조
  intro: >-
    시스템은 **입력 → 상태 → 전투 → 데이터 → UI** 방향의 단방향 흐름을 가집니다.
    역방향 통신은 전부 `event` 또는 `Observable<T>`로 이루어져, 하위 계층이 상위 계층을 직접 참조하지 않습니다.
  parts:
    - badge: 구성요소
      title: 5계층 아키텍처 — 단방향 흐름
      blocks:
        - type: layers
          components: >-
            입력 · 액터 · 전투 코어 · 데이터(MVVM) · UI·월드 다섯 계층으로 이루어집니다. 입력은 `InputManager`,
            액터는 FSM 플레이어와 BT 몬스터, 전투 코어는 `CombatSystem` 레지스트리와 이벤트 큐, 데이터는
            MVVM + `Observable<T>`, 표현은 UI·월드입니다.
          relations: >-
            하위 계층은 상위 계층을 직접 참조하지 않습니다. 애니메이터는 대상이 플레이어인지 몬스터인지 모른 채
            `IAttackAble`만 호출하고, UI는 `Observable`만 구독합니다. 액터·판정·데이터 세 축이 모두 인터페이스 계약에 의존합니다.
          flow: >-
            입력 → 상태 → 전투 → 데이터 → UI 한 방향으로 흐르고, 역방향(피격·UI 갱신)은
            전부 `event` · `Observable<T>`로 통신합니다.
          layers:
            - name: 입력 계층 · INPUT
              note: 디바이스 → 의미 이벤트
              items:
                - name: PlayerInput.inputactions
                - name: InputManager
            - name: 액터 계층 · ACTOR
              note: FSM 플레이어 · BT 몬스터
              items:
                - name: PlayerStateMachine
                  emphasis: true
                - name: IState ×9
                - name: EnemyAIBase
                - name: EnemyState · BossState
                - name: BtNode 트리
                  kind: dashed
            - name: 전투 코어 · COMBAT
              note: 레지스트리 + 이벤트 큐 · 프레임당 10건
              items:
                - name: CombatSystem
                  emphasis: true
                - name: AttackTiming · SkillTiming
                - name: PlayerWeapon · EnemyWeapon
                - name: InGameEvent 계층
                  kind: dashed
            - name: 데이터 계층 · MVVM
              note: Model · ViewModel · View · Observable
              items:
                - name: FighterView
                - name: FighterViewModel
                - name: 'Observable<T>'
                - name: FighterStats · SO
                  kind: dashed
            - name: UI · 월드 계층 · PRESENTATION
              note: 구독으로만 갱신 · 트리거 상호작용
              items:
                - name: HP · Stamina Slider
                - name: UI_Inventory
                - name: LockOn Indicator
                - name: BoneFire · BossWall
    - badge: 관계
      title: 핵심 인터페이스 계약 · Class Diagram
      lede: >-
        액터·판정·데이터 **세 축이 모두 인터페이스에 의존**합니다. 애니메이터는 대상이 플레이어인지 몬스터인지
        모른 채 `IAttackAble`만 호출하고, UI는 `Observable`만 구독합니다.
      blocks:
        - type: mermaid
          question: 액터·판정·AI 세 축은 각각 무슨 계약에 의존하고 누가 구현하나?
          source: |
            classDiagram
                class IState {
                    <<interface>>
                    +Enter()
                    +UpdateLogic()
                    +Exit()
                }
                class WalkState
                class SprintState
                class RollState
                class AttackState
                class HitState
                IState <|.. WalkState
                IState <|.. SprintState
                IState <|.. RollState
                IState <|.. AttackState
                IState <|.. HitState

                class IAttackAble {
                    <<interface>>
                    +AttackForCollEnable()
                    +AttackForCollDisEnable()
                }
                class ISkillAble {
                    <<interface>>
                }
                class PlayerStateMachine
                class EnemyState
                class BossState
                IAttackAble <|.. PlayerStateMachine
                IAttackAble <|.. EnemyState
                IAttackAble <|.. BossState
                ISkillAble <|.. EnemyState
                ISkillAble <|.. BossState

                class EnemyAIBase {
                    <<abstract>>
                    +ConstructBehaviorTree()
                }
                class SkeletonAI
                class BossMonsterAI
                EnemyAIBase <|-- SkeletonAI
                EnemyAIBase <|-- BossMonsterAI
    - badge: 흐름
      title: 런타임 부팅 순서 — Awake → Start → Update
      lede: >-
        `CombatSystem.Instance`는 `Awake`에서 할당되고 `FighterView.Start`에서 사용됩니다.
        즉 **싱글턴 할당이 등록보다 반드시 먼저** 일어나야 하는 초기화 체인입니다.
      blocks:
        - type: points
          variant: numbered
          columns: 2
          items:
            - tag: '1'
              title: Awake · CombatSystem
              body: '`Instance = this`. FighterView는 ViewModel 생성 + 슬라이더 구독, PlayerStateMachine·AI는 참조 캐싱'
            - tag: '2'
              title: Start · FighterView 등록
              body: '`CombatSystem.RegisterFighter(this)` → `fightersDict[mainModelCollider] = view`'
            - tag: '3'
              title: Start · 상태 · 트리 기동
              body: 'PSM은 입력·FighterView 구독 후 `ChangeState(new WalkState)`, AI는 `ConstructBehaviorTree()`'
            - tag: '4'
              title: Update 루프
              body: 'PSM은 현재 상태 `UpdateLogic()`, AI는 `_rootNode.Evaluate()`, CombatSystem은 큐에서 최대 10건 처리'
    - badge: 설계 원칙
      title: 반복되는 세 가지 규칙
      blocks:
        - type: points
          variant: numbered
          columns: 3
          items:
            - tag: '01'
              title: 단방향 계층
              body: 하위 계층은 상위를 직접 참조하지 않는다
            - tag: '02'
              title: 역통신은 이벤트
              body: '되돌아가는 신호는 `event` · `Observable`로만'
            - tag: '03'
              title: 인터페이스 계약
              body: 구체 타입이 아니라 계약에만 의존
features:
  - title: 입력 · 플레이어 FSM
    intro: >-
      입력은 **디바이스 → 의미 → 소비자**의 2단 릴레이를 거치고, 플레이어는 매 전이마다 `new`로 생성되는
      순수 C# 상태 객체로 움직입니다. **PlayerStateMachine**이 컨텍스트 겸 파사드입니다.
    parts:
      - badge: 핵심 동작
        title: 입력 2단 릴레이 — 상태가 InputManager를 모른다
        blocks:
          - type: points
            variant: flow
            items:
              - tag: 1단 · 디바이스 → 의미
                title: InputManager
                body: 'Input System 저수준 콜백을 `OnLMBInput` · `OnSpaceBarInput` 같은 **의미 있는 C# 이벤트**로 변환'
              - tag: 2단 · 재방송
                title: PlayerStateMachine
                body: '일부를 `OnLMBAction` · `OnRInput`으로 **다시 방송** — 상태·월드는 이 파사드만 구독'
              - tag: 소비자
                title: 상태 · 월드 · 카메라
                body: '`WalkState` · `BoneFire`는 플레이어를, `CameraControl`은 InputManager를 직접 구독'
          - type: callout
            badge: 캡슐화
            tone: white
            body: 구독/해제가 상태의 `Enter()` / `Exit()`에서 자연스럽게 캡슐화됩니다.
      - badge: FSM
        title: 상태 전이 — WalkState 허브
        blocks:
          - type: mermaid
            question: 플레이어 상태는 WalkState 허브에서 어떤 조건으로 전이하고, 피격·사망은 어디서 진입하나?
            source: |
              stateDiagram-v2
                  [*] --> WalkState
                  WalkState --> SprintState: Space 홀드 0.3s↑
                  WalkState --> RollState: Space 탭 + 이동
                  WalkState --> BackStepState: Space 탭 + 정지
                  WalkState --> AttackState: 좌클릭 · 3타 콤보
                  WalkState --> FallState: IsGrounded 실패
                  SprintState --> WalkState
                  RollState --> WalkState
                  BackStepState --> WalkState
                  AttackState --> WalkState: 콤보 종료
                  FallState --> WalkState: 착지
                  WalkState --> HitState: OnTakeDamage
                  HitState --> WalkState
                  WalkState --> DieState: OnDied
                  DieState --> [*]
          - type: image
            src: ../../assets/soulslike/soul-animator.png
            variant: aside
            width: 372
            label: ANIMATOR
            caption: >-
              실제 플레이어 Animator — **Blend Tree**를 허브로 Attack1·2·3, Rolling, Backstep, GetHit, Land
              상태가 연결됩니다. FSM의 각 상태 클래스가 이 클립들을 `CrossFade`로 재생합니다.
      - badge: 분기
        title: Space 한 키로 3가지 행동
        lede: >-
          타이머는 `WalkState`의 로컬 필드이며 `Exit()`에서 0으로 초기화됩니다.
          홀드 시간과 이동 여부를 조합해 하나의 키를 세 갈래로 나눕니다.
        blocks:
          - type: points
            columns: 3
            items:
              - title: 홀드 0.3s↑ → SprintState
                body: Space를 계속 누르는 동안 스프린트. 스태미나 고갈이나 키 해제 시 Walk 복귀
              - title: 탭 + 이동 → RollState
                body: '`MoveAmount > 0`이면 구르기. **Enter에서 무적**(ActiveInvisible)'
              - title: 탭 + 정지 → BackStepState
                body: 정지 상태에서 탭하면 뒤로 회피. 애니 90%에서 Walk 복귀
      - badge: 콤보
        title: 3타 콤보 — 애니 90% 지점 판정
        lede: 각 클립의 **애니 90% 지점**에서 다음 타 선입력을 판정해 콤보를 잇습니다.
        blocks:
          - type: chips
            variant: state
            items:
              - { label: Attack1, arrow: → }
              - { label: Attack2, tone: current, arrow: → }
              - { label: Attack3, tone: current, arrow: → }
              - { label: WalkState }
          - type: callout
            badge: 미묘
            tone: white
            body: >-
              `ThirdAttackReady`는 `_animationPlayed == true`일 때만 플래그를 세웁니다. 즉
              **2타 모션이 시작된 이후의 클릭만** 3타로 이어집니다 — 1타 도중 연타는 3타를 예약하지 않습니다.
      - badge: 스태미나
        title: 소모 · 회복 · 탈진 락
        blocks:
          - type: chips
            variant: state
            items:
              - { label: Roll · BackStep · Attack · Sprint, arrow: → }
              - { label: StaminaChange (가산), tone: current, arrow: → }
              - { label: 0 도달 → OnStaminaZero, tone: dead, arrow: → }
              - { label: 탈진 락 · 회복 중단 }
          - type: callout
            badge: 계약
            tone: tint
            body: >-
              `StaminaChange()`는 값을 **가산**합니다. 따라서 인스펙터의 `rollStamina` · `attackStamina`는
              **반드시 음수**여야 소모로 동작합니다. 탈진 락은 `_noStamina`가 `staminaRegenRateTime` 경과 후
              풀리는, 소울라이크 특유의 페널티입니다.
    decisions: []
  - title: 전투 · MVVM
    intro: >-
      모든 피해·회복은 **CombatSystem** 싱글턴의 이벤트 큐를 거쳐 결정론적으로 처리되고,
      체력·스태미나 UI는 `Observable<T>`를 구독하는 MVVM으로만 갱신됩니다.
    parts:
      - badge: 핵심 동작
        title: 이벤트 큐 — 프레임당 10건
        lede: >-
          무기의 `OnTriggerEnter`는 피해를 즉시 적용하지 않고 큐에 쌓습니다.
          `Update`가 **프레임당 최대 10건**만 처리해 순서를 결정론적으로 만들고 부하를 분산합니다.
        blocks:
          - type: mermaid
            question: 전투 이벤트는 어떤 생산자에서 큐로 쌓이고 프레임당 어떻게 소비되나?
            source: |
              flowchart TD
                  P["생산자 · PlayerWeapon · EnemyWeapon · BossSkill · Heal"] -->|"AddInGameEvent()"| Q["이벤트 큐 · _eventQueue"]
                  Q -->|"Update · 프레임당 ≤ 10건"| D["Dequeue · switch(e.Type)"]
                  D -->|Combat| C["Receiver.TakeDamage"]
                  D -->|Heal| H["Receiver.TakeHeal"]
                  C --> V["수신자 · FighterView"]
                  H --> V
          - type: code
            api: CombatSystem.cs · Update()
            code: |-
              private const int Max_Event_Count = 10;

              void Update()
              {
                  int processCount = 0;
                  while (_eventQueue.Count > 0 && processCount < Max_Event_Count)
                  {
                      InGameEvent e = _eventQueue.Dequeue();
                      switch (e.Type)
                      {
                          case EventType.Combat: e.Receiver.TakeDamage((CombatEvent)e); break;
                          case EventType.Heal:   e.Receiver.TakeHeal((HealthEvent)e);  break;
                      }
                      processCount++;
                  }
                  // 남은 이벤트는 다음 프레임으로 이월 — 한 프레임 부하 상한
              }
            notes:
              - at: Max_Event_Count
                why: 프레임당 처리량을 10건으로 제한한다. 남은 이벤트는 다음 프레임으로 이월돼 한 프레임 부하 상한이 된다.
              - at: while 가드
                why: 무기의 OnTriggerEnter가 즉시 적용하지 않고 큐를 거치므로, 큐가 비거나 10건을 채울 때까지 순서대로 처리해 결정론을 유지한다.
              - at: switch (e.Type)
