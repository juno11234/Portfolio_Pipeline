            variant: state
            items:
              - { label: GitHub, arrow: → }
              - { label: Jenkins (1시간 주기 폴링), arrow: → }
              - { label: BuildAuto.Build(), tone: current, arrow: → }
              - { label: Exit(0 / 1), tone: current }
          - type: table
            headers: [설정, 값]
            rows:
              - [출력 경로, Builds/StandaloneWindows64/SoulLike.exe]
              - [타겟, BuildTarget.StandaloneWindows64]
              - [씬 소스, EditorBuildSettings.scenes 중 enabled만]
          - type: callout
            badge: 핵심
            tone: white
            body: >-
              CI 연동의 핵심은 `EditorApplication.Exit(코드)`입니다. Jenkins는 프로세스 **종료 코드로 성공/실패를
              판단**하므로, 명시적 exit 코드 없이는 빌드 실패가 CI에 전달되지 않습니다.
    decisions: []
decisions:
  - title: 몬스터 AI 구조 — 상태 머신(FSM) vs 행동 트리(BT)
    options:
      - { key: A, title: FSM (플레이어와 동일) }
      - { key: B, title: 행동 트리 (BT), chosen: true }
    criteria:
      - label: 상태 증가 대응
        values:
          - 상태가 늘수록 전이 조건이 조합적으로 폭발
          - 항상 트리 구조를 유지 · 노드 추가로 확장
      - label: 행동 선택
        values:
          - 입력에 따른 명시적 전이만
          - 상황 판단 + 확률적 선택(Selector_Random)
      - label: 재사용
        values:
          - 상태 클래스가 액터별로 묶임
          - 리프 노드를 조합해 트리를 재조립
    reason: >-
      플레이어는 입력이 곧 명시적 상태 전이라 FSM이 맞지만, 몬스터는 "상황 판단 + 확률적 행동 선택"이
      필요해 BT를 선택했습니다. 같은 액터 계층 안에서 플레이어는 FSM, 몬스터는 BT를 쓰는 **의도적 비대칭**입니다.
retrospective:
  satisfaction:
    - title: 긴장감 있는 AI
      body: 단순 추격·공격만 하던 몬스터를 **공격 템포를 조절하는 긴장감 있는 AI**로 발전시켰습니다.
    - title: 이벤트 하나로 2페이즈
      body: '**MVVM의 느슨한 결합** 덕분에 이벤트 하나로 보스 2페이즈(공격 패턴 개방 + 파티클)를 깔끔히 연동할 수 있었습니다.'
  learnings:
    - title: 같은 원리의 노드 중단
      body: >-
        `Sequence`와 `Selector` 모두 노드가 중단될 때 정리할 표준 방법이 없어 같은 원인의 문제를 겪었지만,
        각각 ==Sequence_Memory==와 ==Cleaner==라는 서로 다른 방법으로 해결했습니다.
    - title: 시각화의 가치
      body: >-
        코드로는 추적이 힘들던 행동 트리의 문제 지점이, **기술 문서를 위해 그린 다이어그램에서는 한눈에** 보였습니다.
        도식화하며 디버깅했다면 시간을 크게 줄일 수 있었을 것입니다.
    - title: 데이터 주도 BT의 가능성
      body: >-
        노드를 `enum`으로 분류하는 과정에서, **트리 구조 자체를 데이터 테이블화**해 코드 수정 없이 AI 패턴을
        조립하는 구조로 확장할 수 있겠다고 느꼈습니다.
  improvements:
    - title: 완전한 데이터 주도 구조
      body: 개발 편의뿐 아니라 **다른 파트 개발진과의 협업 구조**를 위해서라도 필수라 보고 적극 적용할 계획입니다.
    - title: 비선형 자료구조 시각화
      body: 구조가 복잡한 비선형 자료구조는 **설계 단계에서 미리 도식화**하여 구현할 계획입니다.
    - title: 중단 매커니즘 추가
      body: 다음 BT에는 `conditional abort`(매 프레임 상위 조건을 재평가하고, 조건이 바뀌면 Running 중인 하위 노드를 정리)를 구현할 계획입니다.
