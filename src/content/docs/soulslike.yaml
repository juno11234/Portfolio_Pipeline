architecture:
  title: 시스템 구조
  intro: >-
    시스템은 **입력 → 상태 → 전투 → 데이터 → UI** 방향의 단방향 흐름을 가집니다.
    역방향 통신은 전부 `event` 또는 `Observable<T>`로 이루어져, 하위 계층이 상위 계층을 직접 참조하지 않습니다.
    플레이어와 몬스터는 서로 다른 두뇌(FSM vs BT)를 쓰지만 **전투 파이프라인은 완전히 동일**하게 공유합니다.
  parts:
    - badge: 구성요소
      title: 5계층 아키텍처 — 단방향 흐름
      blocks:
        - type: layers
          components: >-
            입력 · 액터 · 전투 코어 · 데이터(MVVM) · UI·월드 다섯 계층으로 이루어집니다. 입력은 `InputManager`,
            액터는 FSM 플레이어와 BT 몬스터, 전투 코어는 `CombatSystem` 레지스트리와 이벤트 큐, 데이터는
            MVVM + `Observable<T>`, 표현은 UI·월드입니다.
          relations: >-
            하위 계층은 상위 계층을 직접 참조하지 않습니다. 애니메이터는 대상이 플레이어인지 몬스터인지 모른 채
            `IAttackAble`만 호출하고, UI는 `Observable`만 구독합니다. 액터·판정·데이터 세 축이 모두 인터페이스 계약에 의존합니다.
          flow: >-
            입력 → 상태 → 전투 → 데이터 → UI 한 방향으로 흐르고, 역방향(피격·UI 갱신)은
            전부 `event` · `Observable<T>`로 통신합니다.
          layers:
            - name: 입력 계층 · INPUT
              note: 디바이스 → 의미 이벤트
              items:
                - name: PlayerInput.inputactions
                - name: InputManager
            - name: 액터 계층 · ACTOR
              note: FSM 플레이어 · BT 몬스터
              items:
                - name: PlayerStateMachine
                  emphasis: true
                - name: IState ×8
                - name: EnemyAIBase
                - name: EnemyState · BossState
                - name: BtNode 트리
                  kind: dashed
            - name: 전투 코어 · COMBAT
              note: 레지스트리 + 이벤트 큐 · 프레임당 10건
              items:
                - name: CombatSystem
                  emphasis: true
                - name: AttackTiming · SkillTiming
                - name: PlayerWeapon · EnemyWeapon
                - name: InGameEvent 계층
                  kind: dashed
            - name: 데이터 계층 · MVVM
              note: Model · ViewModel · View · Observable
              items:
                - name: FighterView
                - name: FighterViewModel
                - name: 'Observable<T>'
                - name: FighterStats · SO
                  kind: dashed
            - name: UI · 월드 계층 · PRESENTATION
              note: 구독으로만 갱신 · 트리거 상호작용
              items:
                - name: HP · Stamina Slider
                - name: UI_Inventory
                - name: LockOn Indicator
                - name: BoneFire · BossWall
    - badge: 관계
      title: 핵심 인터페이스 계약 · Class Diagram
      lede: >-
        액터·판정·데이터 **세 축이 모두 인터페이스에 의존**합니다. 애니메이터는 대상이 플레이어인지 몬스터인지
        모른 채 `IAttackAble`만 호출하고, UI는 `Observable`만 구독합니다.
      blocks:
        - type: mermaid
          question: 액터·판정·AI 세 축은 각각 무슨 계약에 의존하고 누가 구현하나?
          source: |
            classDiagram
                class IState {
                    <<interface>>
                    +Enter()
                    +UpdateLogic()
                    +Exit()
                }
                class WalkState
                class SprintState
                class RollState
                class BackStepState
                class AttackState
                class HitState
                class FallState
                class DieState
                IState <|.. WalkState
                IState <|.. SprintState
                IState <|.. RollState
                IState <|.. BackStepState
                IState <|.. AttackState
                IState <|.. HitState
                IState <|.. FallState
                IState <|.. DieState

                class IAttackAble {
                    <<interface>>
                    +AttackForCollEnable()
                    +AttackForCollDisEnable()
                }
                class ISkillAble {
                    <<interface>>
                    +UseSkillFirstTiming(int)
                    +UseSkillSecondTiming(int)
                }
                class PlayerStateMachine
                class EnemyState
                class BossState
                IAttackAble <|.. PlayerStateMachine
                IAttackAble <|.. EnemyState
                IAttackAble <|.. BossState
                ISkillAble <|.. BossState
                EnemyState <|-- BossState

                class EnemyAIBase {
                    <<abstract>>
                    +ConstructBehaviorTree()
                }
                class SkeletonAI
                class BossMonsterAI
                EnemyAIBase <|-- SkeletonAI
                EnemyAIBase <|-- BossMonsterAI
    - badge: 흐름
      title: 런타임 부팅 순서 — Awake → Start → Update
      lede: >-
        `CombatSystem.Instance`는 `Awake`에서 할당되고 `FighterView.Start`에서 등록·사용됩니다.
        즉 **싱글턴 할당이 등록보다 반드시 먼저** 일어나야 하는 초기화 체인입니다.
      blocks:
        - type: points
          variant: numbered
          columns: 2
          items:
            - tag: '1'
              title: Awake · CombatSystem
              body: '`Instance = this`. FighterView는 ViewModel 생성 + 슬라이더 구독, PlayerStateMachine·AI는 참조 캐싱'
            - tag: '2'
              title: Start · FighterView 등록
              body: '`CombatSystem.RegisterFighter(this)` → `fightersDict[mainModelCollider] = view`'
            - tag: '3'
              title: Start · 상태 · 트리 기동
              body: 'PSM은 입력·FighterView 구독 후 `ChangeState(new WalkState)`, AI는 `ConstructBehaviorTree()`'
            - tag: '4'
              title: Update 루프
              body: 'PSM은 현재 상태 `UpdateLogic()`, AI는 `_rootNode.Evaluate()`, CombatSystem은 큐에서 최대 10건 처리'
    - badge: 설계 원칙
      title: 반복되는 세 가지 규칙
      blocks:
        - type: points
          variant: numbered
          columns: 3
          items:
            - tag: '01'
              title: 단방향 계층
              body: 하위 계층은 상위를 직접 참조하지 않는다
            - tag: '02'
              title: 역통신은 이벤트
              body: '되돌아가는 신호는 `event` · `Observable`로만'
            - tag: '03'
              title: 인터페이스 계약
              body: 구체 타입이 아니라 계약에만 의존
features:
  - title: 입력 · 플레이어 FSM
    intro: >-
      입력은 **디바이스 → 의미 → 소비자**의 2단 릴레이를 거치고, 플레이어는 매 전이마다 `new`로 생성되는
      순수 C# 상태 객체로 움직입니다. **PlayerStateMachine**이 컨텍스트 겸 파사드입니다.
    parts:
      - badge: 핵심 동작
        title: 입력 2단 릴레이 — 상태가 InputManager를 모른다
        blocks:
          - type: points
            variant: flow
            items:
              - tag: 1단 · 디바이스 → 의미
                title: InputManager
                body: 'Input System 저수준 콜백을 `OnLMBInput` · `OnSpaceBarInput` 같은 **의미 있는 C# 이벤트**로 변환'
              - tag: 2단 · 재방송
                title: PlayerStateMachine
                body: '일부를 `OnLMBAction` · `OnRInput`으로 **다시 방송** — 상태·월드는 이 파사드만 구독'
              - tag: 소비자
                title: 상태 · 월드 · 카메라
                body: '`WalkState` · `BoneFire`는 플레이어를, `CameraControl`은 InputManager를 직접 구독'
          - type: callout
            badge: 캡슐화
            tone: white
            body: 구독/해제가 상태의 `Enter()` / `Exit()`에서 자연스럽게 캡슐화됩니다.
      - badge: FSM
        title: 상태 전이 — WalkState 허브
        lede: >-
          `WalkState`를 허브로 8개 상태(Walk · Sprint · Roll · BackStep · Attack · Hit · Fall · Die)가
          `new`로 생성되는 순수 C# 객체로 전이하고, 각 상태 클래스는 대응하는 Animator 클립을 `CrossFade`로 재생합니다.
        blocks:
          - type: image
            src: ../../assets/soulslike/soul-animator.png
            label: ANIMATOR
            caption: >-
              실제 플레이어 Animator — **Blend Tree**(이동)를 허브로 Rolling·Backstep·Falling·Die·Attack1·2·3·GetHit이
              연결된 **상태 머신 그 자체**입니다.
      - badge: 분기
        title: Space 한 키로 3가지 행동
        lede: >-
          타이머는 `WalkState`의 로컬 필드이며 `Exit()`에서 0으로 초기화됩니다.
          홀드 시간과 이동 여부를 조합해 하나의 키를 세 갈래로 나눕니다.
        blocks:
          - type: code
            api: WalkState.cs · UpdateLogic()
            code: |-
              if (_player.SpaceBarPressed) _timer += Time.deltaTime;

              if (_timer > 0.3f && _player.SpaceBarPressed)                            // 홀드 0.3s↑ → 질주
                  _player.ChangeState(new SprintState(_player));
              else if (_timer is > 0f and < 0.3f && _player.SpaceBarPressed == false)  // 짧게 탭(뗌)
              {
                  if (_player.MoveAmount > 0) _player.ChangeState(new RollState(_player));      // 이동 중 → 구르기
                  else                        _player.ChangeState(new BackStepState(_player));  // 정지 → 백스텝
              }
            notes:
              - at: _timer 임계 0.3s 비교
                why: 같은 Space 키의 '누른 시간'으로 질주/회피를 가른다. "탭=구르기, 홀드=달리기"를 별도 키 없이 한 키로 구현한다.
              - at: MoveAmount 분기
                why: 탭했을 때 이동 중이면 구르기(무적), 정지 중이면 백스텝으로 다시 나눈다. `_timer`는 `Exit()`에서 0으로 초기화된다.
          - type: points
            columns: 3
            items:
              - title: 홀드 0.3s↑ → SprintState
                body: Space를 계속 누르는 동안 스프린트. 스태미나 고갈이나 키 해제 시 Walk 복귀
              - title: 탭 + 이동 → RollState
                body: '`MoveAmount > 0`이면 구르기. **Enter에서 무적**(ActiveInvisible) — Exit에서 반드시 해제'
              - title: 탭 + 정지 → BackStepState
                body: 정지 상태에서 탭하면 뒤로 회피. 애니 90%에서 Walk 복귀
          - type: callout
            badge: 무적
            tone: white
            body: >-
              `RollState.Enter()`가 `ActiveInvisible(true)`로 `FighterView.Invincible`을 켭니다.
              `TakeDamage`는 `Invincible`이면 즉시 `return`하므로 구르기 동안 피해가 무효화되고,
              Enter/Exit 대칭이라 **상태를 벗어나면 반드시 무적이 풀립니다**.
      - badge: 콤보
        title: 3타 콤보 — 애니 90% 지점 판정
        lede: 각 클립의 **애니 90% 지점**에서 다음 타 선입력을 판정해 콤보를 잇습니다.
        blocks:
          - type: chips
            variant: state
            items:
              - { label: Attack1, arrow: → }
              - { label: Attack2, tone: current, arrow: → }
              - { label: Attack3, tone: current, arrow: → }
              - { label: WalkState }
          - type: callout
            badge: 미묘
            tone: white
            body: >-
              `ThirdAttackReady`는 `_animationPlayed == true`일 때만 플래그를 세웁니다. 즉
              **2타 모션이 시작된 이후의 클릭만** 3타로 이어집니다 — 1타 도중 연타는 3타를 예약하지 않습니다.
      - badge: 스태미나
        title: 소모 · 회복 · 탈진 락
        blocks:
          - type: chips
            variant: state
            items:
              - { label: Roll · BackStep · Attack · Sprint, arrow: → }
              - { label: StaminaChange (가산), tone: current, arrow: → }
              - { label: 0 도달 → OnStaminaZero, tone: dead, arrow: → }
              - { label: 탈진 락 · 회복 중단 }
          - type: callout
            badge: 계약
            tone: tint
            body: >-
              `StaminaChange()`는 값을 **가산**합니다. 따라서 인스펙터의 `rollStamina` · `attackStamina`는
              **반드시 음수**여야 소모로 동작합니다. 질주만 `-20f * Time.deltaTime`로 지속 소모하고,
              리젠은 `WalkState`에서만 일어납니다. 탈진 락은 `_noStamina`가 `staminaRegenRateTime` 경과 후
              풀리는, 소울라이크 특유의 페널티입니다.
  - title: 전투 · MVVM
    intro: >-
      개별 객체가 대상을 직접 때리지 않습니다. 모든 피해·회복은 **CombatSystem** 싱글턴의 이벤트 큐를 거쳐
      결정론적으로 처리되고, 체력·스태미나 UI는 `Observable<T>`를 구독하는 MVVM으로만 갱신됩니다.
    parts:
      - badge: 핵심 동작
        title: 이벤트 큐 — 프레임당 10건
        lede: >-
          무기의 `OnTriggerEnter`는 피해를 즉시 적용하지 않고 `CombatEvent`를 만들어 큐에 쌓습니다.
          `Update`가 **프레임당 최대 10건**만 처리해 순서를 결정론적으로 만들고 부하를 분산합니다.
        blocks:
          - type: mermaid
            question: 전투 이벤트는 어떤 생산자에서 큐로 쌓이고 프레임당 어떻게 소비되나?
            source: |
              flowchart TD
                  P["생산자 · PlayerWeapon · EnemyWeapon · BossSkill · Heal"] -->|"AddInGameEvent()"| Q["이벤트 큐 · _eventQueue"]
                  Q -->|"Update · 프레임당 ≤ 10건"| D["Dequeue · switch(e.Type)"]
                  D -->|Combat| C["Receiver.TakeDamage"]
                  D -->|Heal| H["Receiver.TakeHeal"]
                  C --> V["수신자 · FighterView"]
                  H --> V
          - type: code
            api: CombatSystem.cs · Update()
            code: |-
              private const int Max_Event_Count = 10;

              void Update()
              {
                  int processCount = 0;
                  while (_eventQueue.Count > 0 && processCount < Max_Event_Count)
                  {
                      InGameEvent e = _eventQueue.Dequeue();
                      switch (e.Type)
                      {
                          case EventType.Combat: e.Receiver.TakeDamage((CombatEvent)e); break;
                          case EventType.Heal:   e.Receiver.TakeHeal((HealthEvent)e);  break;
                      }
                      processCount++;
                  }
                  // 남은 이벤트는 다음 프레임으로 이월 — 한 프레임 부하 상한
              }
            notes:
              - at: Max_Event_Count
                why: 프레임당 처리량을 10건으로 제한한다. 다수 히트가 몰려도 남은 이벤트는 다음 프레임으로 이월돼 한 프레임 부하 상한이 된다.
              - at: while 가드
                why: 무기의 OnTriggerEnter가 즉시 적용하지 않고 큐를 거치므로, 큐가 비거나 10건을 채울 때까지 순서대로 처리해 결정론을 유지한다.
              - at: switch (e.Type)
                why: InGameEvent를 CombatEvent·HealthEvent로 다운캐스트해 수신자(FighterView)의 TakeDamage·TakeHeal로 분기한다. 처리 지점이 한 곳이라 이펙트·사운드를 여기서 일괄 후킹할 수 있다.
      - badge: 이벤트
        title: InGameEvent 타입 계층
        blocks:
          - type: mermaid
            question: 전투 이벤트는 어떤 공통 계약을 상속해 피해·회복으로 갈라지나?
            source: |
              classDiagram
                  class InGameEvent {
                      <<abstract>>
                      +FighterView Sender
                      +FighterView Receiver
                      +EventType Type
                  }
                  class CombatEvent {
                      +int Damage
                      +Vector3 HitPosition
                      +Collider Collider
                  }
                  class HealthEvent {
                      +int HealAmount
                  }
                  InGameEvent <|-- CombatEvent
                  InGameEvent <|-- HealthEvent
          - type: callout
            badge: 예약
            tone: white
            body: >-
              `Damage` · `HealAmount`는 **`int`**입니다. `HitPosition` · `Collider`는 히트 이펙트·데칼 스폰을
              위한 **예약 필드**로, 현재 소비처는 없습니다.
      - badge: MVVM
        title: Observable<T> — 잦은 UI 변경을 낮은 결합으로
        blocks:
          - type: table
            headers: [계층, 클래스, 책임, Unity 의존]
            rows:
              - [Model, FighterStats · SO, 최대 체력·스태미나 · 힘·민첩·방어, 데이터만]
              - [ViewModel, FighterViewModel, 체력·스태미나 규칙 · 사망·페이즈 판정, 없음]
              - [View, FighterView, 슬라이더 갱신 · 콜라이더 토글 · 이벤트 중계, 있음]
              - [바인딩, 'Observable<T>', 값 변경 감지 + 통지, 없음]
          - type: prose
            paragraphs:
              - '`FighterViewModel`이 `MonoBehaviour`를 상속하지 않는 것이 핵심입니다 — 전투 규칙이 **씬 없이도 테스트 가능한 순수 객체**로 분리됩니다.'
          - type: code
            api: Observable.cs · 값 변경 통지 + 구독 즉시 동기화
            code: |-
              public T Value
              {
                  get => _value;
                  set
                  {
                      // 같은 값이면 통지하지 않음 — 중복 UI 갱신 차단
                      if (Equals(_value, value)) return;
                      _value = value;
                      OnValueChanged?.Invoke(_value);
                  }
              }

              public void Subscribe(Action<T> listener)
              {
                  OnValueChanged += listener;
                  listener?.Invoke(_value);   // 구독 즉시 현재값 1회 전달 → 초기화 코드 불필요
              }
            notes:
              - at: Equals 가드
                why: 같은 값이면 통지하지 않아 중복 UI 갱신을 막는다. 다만 이 정적 `object.Equals`는 값 타입을 박싱한다 — 회고에서 개선점으로 다룬다.
              - at: Subscribe 즉시 Invoke
                why: 구독하는 순간 현재값을 1회 전달해 초기화 코드를 없앤다 — 뷰가 최신 값으로 바로 동기화된다. 폴링이 사라진다.
      - badge: 판정
        title: 애니메이션 주도 히트박스
        lede: >-
          히트박스 활성 타이밍을 코드 타이머가 아니라 **애니메이션 클립 자체**가 소유합니다.
          `AttackTiming`(StateMachineBehaviour)이 정규화 시간에 `IAttackAble`을 호출하고, 한 번의 휘두름에서
          같은 대상을 두 번 때리지 않도록 `HashSet<FighterView>`로 막습니다.
        blocks:
          - type: chips
            variant: state
            items:
              - { label: startTime 통과 → 콜라이더 ON, tone: current, arrow: → }
              - { label: 충돌 → _damaged에 없으면 이벤트, arrow: → }
              - { label: endTime 통과 → OFF + _damaged.Clear(), tone: current, arrow: → }
              - { label: 다음 타에서 재타격 허용 → 콤보 성립 }
          - type: table
            headers: [주체, 대미지 산식]
            rows:
              - ['플레이어', 'stat.Damage + str×StrengthBonus()/2 + dex×DexterityBonus()/2']
              - ['일반 몬스터', 'attackData[0].damage (고정)']
              - ['보스 스킬', 'attackData.damage (프리팹별 SO)']
          - type: callout
            badge: 관찰
            tone: white
            body: >-
              `GetFighter()`는 `fightersDict[coll]` 인덱서를 그대로 씁니다. 미등록 콜라이더가 들어오면 `null`이
              아니라 !!KeyNotFoundException!!이 발생 — 호출부의 `if (player != null)`는 도달하지 못하는 방어
              코드입니다. ==TryGetValue로 바꾸면 계약이 일치==합니다. 실사용에선 적/플레이어가 `Start`에서
              등록되고 레이어 마스크로 걸러 문제되지 않습니다.
  - title: 적 AI · 행동 트리
    intro: >-
      상태가 늘수록 전이 조건이 폭발하는 상태 패턴 대신, **항상 트리 구조를 유지하는 행동 트리**를 재귀
      `Evaluate()`로 구현했습니다. 플레이어는 FSM, 몬스터는 BT를 쓰는 **의도적 비대칭**입니다 —
      몬스터는 "상황 판단 + 확률적 행동 선택"이 필요하기 때문입니다.
    parts:
      - badge: 노드 체계
        title: BtNode — 조합 4종 · 리프 10종
        lede: >-
          모든 노드는 `BtNode`를 상속해 `Evaluate()` 하나로 재귀 평가됩니다.
          조합 노드 4종(Selector · Selector_Random · Sequence · Sequence_Memory)과 리프 노드 10종으로 이루어집니다.
        blocks:
          - type: mermaid
            question: 행동 트리 노드는 무슨 계약을 공유하고 조합·리프로 어떻게 갈라지나?
            source: |
              classDiagram
                  class BtNode {
                      <<abstract>>
                      #NodeState State
                      #List~BtNode~ Children
                      +Evaluate() NodeState
                  }
                  class Selector
                  class Selector_Random
                  class Sequence
                  class Sequence_Memory
                  class Leaf_WatchPlayer
                  class Leaf_Chase
                  class Leaf_PerformAttack
                  class Leaf_Cleaner
                  BtNode <|-- Selector
                  BtNode <|-- Selector_Random
                  BtNode <|-- Sequence
                  BtNode <|-- Sequence_Memory
                  BtNode <|-- Leaf_WatchPlayer
                  BtNode <|-- Leaf_Chase
                  BtNode <|-- Leaf_PerformAttack
                  BtNode <|-- Leaf_Cleaner
      - badge: 평가 규칙
        title: Selector(OR) vs Sequence(AND)
        blocks:
          - type: points
            columns: 2
            items:
              - title: Selector — 우선순위 (OR)
                body: >-
                  자식을 순서대로 평가하다 **하나라도 Success/Running**이면 즉시 그 결과 반환.
                  **전부 Failure**여야 Failure. → 첫 성공 분기를 고르는 우선순위 스위치
              - title: Sequence — 연속 행동 (AND)
                body: >-
                  자식을 순서대로 평가하다 **하나라도 Failure**면 즉시 중단. 전부 통과해야 Success.
                  → 조건·행동을 한 줄로 잇는 시퀀스
      - badge: 핵심 이슈
        title: 콤보가 끊기는 버그 — Sequence → Sequence_Memory
        blocks:
          - type: before-after
            before:
              label: 문제 · 매 프레임 처음부터 재평가
              items:
                - 적이 콤보 도중 플레이어가 사거리를 벗어나면 `Sequence`가 매 프레임 앞 조건(CheckAttackRange)부터 재평가해 실패
                - 진행 중이던 콤보가 !!즉시 끊긴다!!
            after:
              label: 해결 · 실행 위치를 기억
              items:
                - '`_lastRunningChildIndex`로 Running이던 자식 인덱스를 기억'
                - 다음 프레임에 그 자리에서 재개 — 진입 조건을 다시 통과할 필요 없이 진행 중인 타부터 이어짐
            lesson: >-
              3타 콤보·후퇴 시퀀스 등 **중단되면 안 되는 연속 행동**은 전부 ==Sequence_Memory==로 조립했고,
              순수 조건 검사만 필요한 곳은 기존 `Sequence`를 유지합니다.
          - type: code
            api: Selector.cs · Sequence_Memory.Evaluate()
            code: |-
              public override NodeState Evaluate()
              {
                  // 이전 평가가 Running이 아니었다면 처음부터
                  if (State != NodeState.Running) _lastRunningChildIndex = 0;

                  for (int i = _lastRunningChildIndex; i < Children.Count; i++)
                  {
                      switch (Children[i].Evaluate())
                      {
                          case NodeState.Failure:
                              _lastRunningChildIndex = 0;
                              return State = NodeState.Failure;
                          case NodeState.Running:
                              _lastRunningChildIndex = i;   // 실행 위치 기억 → 다음 프레임 재개
                              return State = NodeState.Running;
                          case NodeState.Success:
                              continue;                     // 다음 자식으로
                      }
                  }
                  _lastRunningChildIndex = 0;
                  return State = NodeState.Success;
              }
            notes:
              - at: State != Running 가드
                why: 이전 평가가 Running이 아니면 인덱스를 0으로 되돌려 처음부터 평가한다. Running이었으면 기억한 위치에서 재개한다.
              - at: _lastRunningChildIndex = i
                why: Running인 자식의 위치를 기억해 다음 프레임에 그 자리에서 이어간다. 앞 조건을 다시 통과할 필요가 없어 콤보가 끊기지 않는다.
              - at: Success → continue
                why: 성공한 자식은 건너뛰고 다음 자식으로 넘어간다. 전부 성공해야 시퀀스가 Success다.
          - type: callout
            badge: 부수효과
            tone: white
            body: >-
              **걷기 애니 버그**도 같은 계열입니다 — 정지 상태에서 `Vertical`이 1로 남아 걷기 모션이 재생됐습니다.
              애니 파라미터·NavMeshAgent를 0으로 되돌리고 항상 Success를 반환하는 ==Leaf_Cleaner==를
              시퀀스 중간에 삽입해 상태를 정리했습니다.
      - badge: 카탈로그
        title: 리프 노드 — 반환 규칙과 부수효과
        blocks:
          - type: table
            headers: [노드, 반환 규칙, 부수효과]
            rows:
              - [Leaf_WatchPlayer, 시야각·거리·레이캐스트 통과 → Success, '**findPlayer = true** (래치)']
              - [Leaf_CheckAttackRange, 거리 ≤ range → Success, 없음 (순수 조건)]
              - [Leaf_CheckSkillAble, secondPhase && !skillCool → Success, '!!skillCool = true!!']
              - [Leaf_Cleaner, 항상 Success, 애니 0 · agent 정지·경로 리셋]
              - [Leaf_Chase, 3초 경과 → Success · 그전엔 Running, SetDestination · Vertical = 1]
              - [Leaf_PerformAttack, 선딜·타격·후딜 전체 경과 → Success, 애니 CrossFade · 루트모션/전진]
      - badge: 트리
        title: BossMonsterAI 행동 트리
        lede: >-
          `skillOrCombo`가 **Selector**이므로 스킬 시퀀스가 항상 먼저 시도되고,
          (사거리 밖 · 1페이즈 · 쿨다운) 중 하나로 실패하면 근접 교전으로 넘어갑니다.
        blocks:
          - type: mermaid
            question: 보스는 스킬과 근접 교전을 어떤 우선순위로 고르고 접근은 어떻게 처리하나?
            source: |
              flowchart TD
                  A["actions · Selector"] --> B["skillOrCombo · Selector"]
                  A --> E["randomOutAction · Selector_Random · 접근"]
                  B --> C["skillUseSequence · Seq_Memory · 2페이즈"]
                  B --> D["근접 교전 · Seq_Memory"]
