              - title: 자동 해제
                body: 몬스터 사망 → LockOnTarget 비활성 → 다음 프레임 UnlockOn
              - title: Q/E 전환
                body: '**스크린 공간** 좌/우 차로 다음 타겟 — 화면에서 보는 방향과 일치'
          - type: callout
            badge: 무참조
            tone: tint
            body: '`EnemyState.Dead()`와 `LockOnCamControl`은 서로를 직접 참조하지 않고, **LockOnTarget의 활성 상태만으로** 통신합니다. 카메라는 `Cinemachine` 없이 커스텀 `CameraControl`로 구현했습니다.'
      - badge: 월드
        title: 화톳불과 보스방 진행도 게이팅
        blocks:
          - type: points
            columns: 2
            items:
              - title: BoneFire · 화톳불
                body: >-
                  세이브 포인트 — 트리거 진입 시 `OnRInput`을 구독하고, R 키에 **완전 회복 + 몬스터 전체 리스폰**
                  (findPlayer 해제)을 수행. "범위 안인지" 폴링 없이 **구독/해제**로 상호작용을 표현합니다.
              - title: BossWall · 보스방
                body: >-
                  R 키로 입장 컷신 → 도착 시 **보스 활성 + 벽 재봉인**(전투 중 이탈 불가).
                  보스 사망이 `Destroy(bossWall)` + 화톳불 개방을 한 번에 처리합니다.
          - type: chips
            variant: state
            items:
              - { label: 보스방 외부 · 벽 활성, arrow: → }
              - { label: 입장 컷신 · R 키, arrow: → }
              - { label: 보스전 · 벽 재봉인, tone: dead, arrow: → }
              - { label: 클리어 · 벽 파괴 + 화톳불, tone: current }
  - title: 데이터 · 빌드
    intro: >-
      기획 데이터는 **리플렉션 제네릭 파서**로 코드와 분리하고,
      빌드는 **Jenkins**가 폴링부터 exit 코드까지 자동화합니다.
    parts:
      - badge: 데이터
        title: TSV 파이프라인 — 리플렉션 제네릭 파서
        blocks:
          - type: chips
            variant: state
            items:
              - { label: TSV .txt (에디터 타임), arrow: → }
              - { label: DatabaseBase · SO, arrow: → }
              - { label: 'TSVImporter.Parse<T> (버튼 클릭)', tone: current, arrow: ⇒ }
              - { label: 'List<T> · SetDirty (저장)', tone: current }
          - type: code
            api: TSVImporter.cs · Parse<T>()
            code: |-
              string[] headers = lines[0].Split('\t');
              for (int j = 0; j < headers.Length; j++)
              {
                  // 헤더 이름 == 필드 이름이면 자동 매핑
                  FieldInfo field = typeof(T).GetField(headers[j].Trim(),
                                        BindingFlags.Public | BindingFlags.Instance);
                  if (field != null)
                      field.SetValue(entry, ConvertType(values[j].Trim(), field.FieldType));
              }
            notes:
              - at: GetField(header)
                why: 컬럼↔필드를 이름으로 매칭하므로 열 순서가 무관하고 없는 열은 조용히 무시된다. 스키마가 바뀌어도 파서 코드는 그대로다.
              - at: ConvertType
                why: int/float/bool/enum/string을 필드 타입에 맞춰 변환한다. 파싱 예외는 필드 단위로 격리돼 한 셀이 잘못돼도 나머지는 살아남는다.
          - type: callout
            badge: 확장
            tone: tint
            body: >-
              `[CustomEditor(typeof(DatabaseBase), true)]`의 **true 인자** 덕분에 `DatabaseBase`를 상속한
              **모든 자식 SO가 자동으로 로드 버튼**을 갖습니다. 새 DB 타입을 추가해도 에디터 코드를 건드릴 필요가 없습니다.
      - badge: 빌드
        title: Jenkins CI — 폴링에서 exit 코드까지
        blocks:
          - type: chips
            variant: state
            items:
              - { label: GitHub, arrow: → }
              - { label: Jenkins (1시간 주기 폴링), arrow: → }
              - { label: BuildAuto.Build(), tone: current, arrow: → }
              - { label: Exit(0 / 1), tone: current }
          - type: table
            headers: [설정, 값]
            rows:
              - [출력 경로, Builds/StandaloneWindows64/SoulLike.exe]
              - [타겟, BuildTarget.StandaloneWindows64]
              - [씬 소스, EditorBuildSettings.scenes 중 enabled만]
          - type: callout
            badge: 핵심
            tone: white
            body: >-
              CI 연동의 핵심은 `EditorApplication.Exit(코드)`입니다. Jenkins는 프로세스 **종료 코드로 성공/실패를
              판단**하므로, 명시적 exit 코드 없이는 빌드 실패가 CI에 전달되지 않습니다.
decisions:
  - title: 몬스터 AI 구조 — 상태 패턴(FSM) vs 행동 트리(BT)
    options:
      - { key: A, title: 상태 패턴 (플레이어와 동일) }
      - { key: B, title: 행동 트리 (BT), chosen: true }
    criteria:
      - label: 행동 추가 시 확장성
        values:
          - 상태가 늘수록 전이 조건이 폭발
          - 노드만 붙이면 되고 트리 구조는 유지
      - label: 확률적 행동 선택
        values:
          - 상태마다 분기 로직을 심어야 함
          - '`Selector_Random`으로 자연스럽게 표현'
      - label: 리프(행동 단위) 재사용
        values:
          - 상태 간 재사용 어려움
          - '`nodeDict` 공용 리프를 여러 몬스터가 조립'
      - label: 구현 난이도
        values:
          - 간단
          - 복잡 (초기 비용 큼)
    reason: >-
      몬스터는 "상황 판단 + 확률적 행동 선택"이 핵심인데 상태 패턴은 여기서 전이 조건이 폭발합니다.
      BT는 초기 구현이 복잡한 대신 ==행동이 늘어도 트리 구조가 유지==되고, `EnemyAIBase`의 `nodeDict` 공용
      리프를 `SkeletonAI`·`BossMonsterAI`가 각각 조립해 **같은 리프로 다른 몬스터**를 만듭니다. 플레이어는 입력이
      명확해 FSM, 몬스터는 판단이 필요해 BT라는 **의도적 비대칭**을 택했습니다.
  - title: 애니메이션 전이 방식 — Trigger/Bool 파라미터 vs CrossFade
    options:
      - { key: A, title: Animator Trigger/Bool 파라미터 }
      - { key: B, title: 코드 기반 CrossFade, chosen: true }
    criteria:
      - label: 전이 조건 복잡도
        values:
          - 파라미터↔코드 동기화·하드코딩 필요
          - 코드 한 줄 · 해시로 직접 지정
      - label: Trigger 꼬임 / ResetTrigger
        values:
          - 관리 부담 큼
          - 없음
      - label: 흐름 시각화·추적
        values:
          - Animator에서 한눈에
          - 전이가 코드 전체에 흩어져 추적 힘듦
      - label: 종료 전이
        values:
          - 자동
          - 직접 구현
    reason: >-
      Trigger 꼬임·`ResetTrigger` 관리와 파라미터 하드코딩 동기화를 없애려 ==CrossFade 주도==를 택했습니다.
      단점(추적·종료 전이)은 이렇게 보완했습니다 — (1) 전이를 `PlayTargetAniClip()` **함수로 감싸** 사용 위치
      추적을 쉽게 하고 각 상태가 자기 전이를 관리, (2) 종료 전이는 **복귀 시에만** Animator FSM에 단방향으로 연결,
      (3) 연속 파라미터가 필요한 블렌드 트리는 `SetFloat`, 상태 전환은 CrossFade로 역할을 나눴습니다.
  - title: 히트박스 판정 타이밍 — Animation Events vs StateMachineBehaviour
    options:
      - { key: A, title: Animation Events }
      - { key: B, title: StateMachineBehaviour (AttackTiming), chosen: true }
    criteria:
      - label: 판정 구간 표현
        values:
          - 단발(한 프레임)만
          - 구간(start~end) 표현 용이
      - label: 재사용성
        values:
          - 클립마다 일일이 재설정
          - SMB 하나를 여러 곳에서 재사용
      - label: 타입 안전
        values:
          - 메서드 이름 하드코딩(이름 바뀌면 깨짐)
          - '`IAttackAble` 타입세이프 직접 호출'
      - label: 코드 없이 튜닝
        values:
          - 가능 (에디터)
          - 인스펙터 슬라이더로 가능
    reason: >-
      Animation Events는 이름 하드코딩이 깨지기 쉽고 구간 판정이 어렵습니다. ==StateMachineBehaviour==는
      `OnStateUpdate`에서 `startNormalizedTime`~`endNormalizedTime` **구간**으로 콜라이더를 켜고,
      `GetComponentInParent<IAttackAble>()`로 플레이어·스켈레톤·보스를 **다형적으로** 호출합니다 —
      히트박스 활성 타이밍을 코드가 아니라 **애니 클립 상태**가 소유하게 됐습니다.
  - title: 카메라 벽 충돌 처리 — RayCast vs SphereCast
    options:
      - { key: A, title: RayCast }
      - { key: B, title: SphereCast, chosen: true }
    criteria:
      - label: 벽 관통 방지
        values:
          - 모서리·얇은 틈을 뚫어 화면 가림
          - 부피가 있어 모서리도 걸림
      - label: 계산 형태
        values:
          - 선 (무부피)
          - 반지름 있는 구
    reason: >-
      !!벽 관통!! — 보스방에서 카메라가 벽을 뚫고 나가 화면이 가려졌습니다. RayCast는 선이라 모서리를 통과합니다.
      ==SphereCast==로 카메라 Pivot 뒤로 반지름 있는 구를 쏴 벽에 닿으면 그 거리만큼 Pivot에 더해 부드럽게
      보간 이동시켰습니다. 더해서 회전(`Update`)과 추종·충돌(`LateUpdate`) 시점을 분리해 **위치→회전→충돌** 순으로
      확정 = 떨림 방지입니다.
  - title: UI · 데이터 아키텍처 — MVC vs MVVM
    options:
      - { key: A, title: MVC }
      - { key: B, title: MVVM + Observable<T>, chosen: true }
    criteria:
      - label: 결합도
        values:
          - Controller가 View·Model 모두 참조 → 강한 결합
          - 이벤트 기반 단방향 바인딩 → 느슨한 결합
      - label: 상태 전파·확장
        values:
          - 참조를 직접 물어야 함
          - 이벤트 발행 하나로 알림 · 여러 곳에서 구독만
      - label: Unity 의존 격리
        values:
          - 규칙이 View에 섞이기 쉬움
          - '`FighterViewModel`이 순수 C#(MonoBehaviour 미상속)'
    reason: >-
      HP·스태미나·보스 페이즈처럼 **한 값의 변화를 여러 곳(UI 바 · State · 파티클)이 봐야** 하는 구조라
      참조를 직접 물면 결합이 커집니다. ==MVVM + `Observable<T>`==는 값이 바뀔 때 이벤트만 발행하고 관심 있는
      쪽이 구독합니다 — 기능 추가 시 **구독만 붙이면** 됩니다. 실제로 보스 2페이즈는 `CurrentHealth`가 절반 이하가
      될 때 `OnSecondPhase` 이벤트 하나로 스킬 분기 개방 + 파티클을 동시에 연동했습니다.
  - title: 콤보 끊김 수정 방식 — 전용 Sequence_Combo vs 기억하는 Sequence_Memory
    options:
      - { key: A, title: 사거리 체크를 전용 Sequence_Combo에 내장 }
      - { key: B, title: 범용 Sequence에 실행 위치 기억 (Sequence_Memory), chosen: true }
    criteria:
      - label: 콤보 유지
        values:
          - O (첫 콤보에서만 체크)
          - O (Running 자식 인덱스 기억 → 재개)
      - label: 모듈화·재사용성
        values:
          - 사거리 체크가 콤보에 묶여 다른 노드에서 재사용 불가
          - 사거리 체크를 별도 리프로 다시 분리 가능
      - label: 트리 범용성
        values:
          - 콤보 전용 노드가 하나 더 생김
          - 조합 노드 한 종으로 모든 연속 행동 커버
    reason: >-
      !!콤보 끊김!!의 1차 수정은 사거리 체크를 콤보 시퀀스에 내장하는 것이었는데, 이러면 **같은 체크를 다른
      노드에서 재사용할 수 없는** 새 문제가 생겼습니다. 그래서 ==`Sequence_Memory`==로 방향을 틀었습니다 —
      `_lastRunningChildIndex`로 Running이던 자식 위치를 기억했다가 재개하니, 사거리 체크를 **별도 리프로 다시
      분리**해 모듈화·재사용성을 살렸습니다. 중단되면 안 되는 연속 행동은 `Sequence_Memory`, 순수 조건 검사만
      필요한 곳은 기존 `Sequence`로 역할을 나눴습니다.
retrospective:
  results:
    - '!!콤보 끊김!! → 콤보 끝까지 유지 (`Sequence_Memory`)'
    - '!!걷기 모션 잔류!! → 정지 시 즉시 정지 (`Leaf_Cleaner`)'
    - 보스 2페이즈(스킬 분기 개방 + 파티클)를 이벤트 하나로 연동
  satisfaction:
    - title: 긴장감 있는 AI
      body: >-
        단순 추격·공격만 하던 몬스터를, `AttackData`(SO) 값으로 공격 템포(선딜·타격·후딜)를 조절해 플레이어에게
        **읽고 회피할 여지를 주는 AI**로 발전시켰습니다. 같은 리프로 몬스터마다 다른 리듬을 뽑습니다.
    - title: 이벤트 하나로 2페이즈
      body: '**MVVM의 느슨한 결합** 덕분에 체력 절반 이벤트(`OnSecondPhase`) 하나로 스킬 분기 개방 + 파티클을 깔끔히 연동했습니다. 수신 측이 멱등이라 반복 발행돼도 안전합니다.'
  learnings:
    - title: 같은 원리의 노드 중단을 서로 다르게 우회함
      cells:
        - label: 무엇을
          body: '`Sequence`(콤보 끊김)와 `Selector`(걷기 모션 잔류)를 각각 ==Sequence_Memory==(위치 기억)와 ==Leaf_Cleaner==(강제 초기화)로 **따로** 우회했다.'
        - label: 같은 원인
          body: 두 버그 모두 **Running이던 자식을 정리할 방법이 없다**는 동일한 근본 원인이었다.
        - label: 알게된 점
          body: 하나의 근본 해법(**상위 조건이 바뀌면 하위 노드를 정리** = conditional abort)이 있다는 걸 두 번째에서야 알아챘다.
      tint: true
    - title: 시각화의 가치
      body: >-
        코드로는 추적이 힘들던 행동 트리의 문제 지점이, **기술 문서를 위해 그린 다이어그램에서는 한눈에** 보였습니다.
        처음부터 도식화하며 디버깅했다면 시간을 크게 줄일 수 있었을 것입니다.
    - title: 데이터 주도 BT의 가능성
      body: >-
        노드를 `enum`으로 분류하는 과정에서, **트리 구조 자체를 데이터 테이블화**해 코드 수정 없이 AI 패턴을
        조립하는 구조로 확장할 수 있겠다고 느꼈습니다.
    - title: Observable<T>의 숨은 박싱
      body: >-
        값 변경 감지를 `Equals(_value, value)`로 했는데, 이 정적 `object.Equals`는 값 타입을 !!박싱!!합니다 —
        HP·스태미나(`int`)처럼 자주 바뀌는 `Observable<T>`는 대입할 때마다 불필요한 GC 할당이 생깁니다.
        ==`EqualityComparer<T>.Default.Equals`==로 바꾸면 값 타입도 박싱 없이 비교된다는 걸 뒤늦게 알았습니다.
  improvements:
    - title: 중단(conditional abort) 매커니즘 추가
      body: 위 두 우회의 근본 해법. 매 프레임 상위 조건을 재평가하고, 조건이 바뀌면 Running 중인 하위 노드를 정리하는 중단 매커니즘을 다음 BT에 구현할 계획입니다.
    - title: 비선형 자료구조 사전 도식화
      body: 트리처럼 구조가 복잡한 비선형 자료구조는 **설계 단계에서 미리 도식화**하고 구현할 계획입니다.
    - title: 완전한 데이터 주도 구조
      body: 개발 편의뿐 아니라 이후 **다른 파트 개발진과의 협업**을 위해서도 필수라 보고 적극 적용할 계획입니다.
