#   ④ decisions       고민과 선택   6건(② 전부) — 기능과 분리된 독립 최상위 섹션
#   ⑤ retrospective   결과·회고    만족 · 깨달음 · 개선
subtitle: 3인칭 소울라이크 액션
overview:
  lead: >-
    **스태미나를 소모하는 회피·공격**과 **화톳불 세이브**, 2페이즈 보스를 갖춘 3인칭 소울라이크 액션 게임입니다.
    1인 개발로 **FSM 플레이어 · Behaviour Tree 몬스터 AI · 이벤트 기반 MVVM · Jenkins CI**까지
    61개 스크립트(약 5,527줄)를 직접 설계·구현했습니다.
  what: >-
    플레이어는 **유한 상태 머신(FSM)**으로, 몬스터는 **행동 트리(BT)**로 움직입니다.
    전투·피격·UI 갱신은 모두 **이벤트와 Observable**로 흐르는 단방향 구조입니다.
  why: >-
    상태가 늘수록 전이 조건이 폭발하는 FSM의 한계를 **항상 트리 구조인 BT**로 풀고,
    잦은 UI 변경에는 **낮은 결합의 MVVM**으로 대응하는 것이 이 프로젝트의 승부처입니다.
  evidence: >-
    문제 제기는 프로파일러 수치가 아니라 **구조가 부족할 때 결정적으로 재현되는 버그**입니다.
    적이 콤보 도중 플레이어가 사거리를 벗어나면 매 프레임 트리를 재탐색하는 BT 특성상 진행 중이던
    콤보가 !!즉시 끊기고!! 추격으로 빠집니다(조건 충족 시 100% 재현). 정지 상황에서도 애니 `Vertical`이
    1로 남아 !!걷기 모션이 계속 출력!!됩니다. 두 버그가 "왜 일반 `Sequence`·`Selector`만으로는 부족한가"의
    근거이고, 각각 ==Sequence_Memory==와 ==Leaf_Cleaner==로 해결했습니다.
  stack:
    title: 계약 기반 · 무참조 결합을 위한 도구 선택
    rows:
      - category: 엔진 · 렌더
        tech: Unity 6000.0.56f1 · URP 17.0.4
        purpose: 3D 소울라이크 액션 · Universal Render Pipeline
      - category: 입력
        tech: Input System 1.14
        purpose: 디바이스 콜백을 의미 이벤트로 변환하는 2단 릴레이
      - category: 내비게이션
        tech: AI Navigation 2.0
        purpose: NavMeshAgent 기반 몬스터 추격·순찰·스트레이프 이동
      - category: 비동기 처리
        tech: UniTask
        purpose: GC 없는 async/await · 씬 페이드에 파괴 시 자동 취소 토큰 연동
      - category: UI
        tech: uGUI · TextMeshPro
        purpose: HP·스태미나 바, 월드 HP 바 빌보드, 인벤토리 드래그 앤 드롭
      - category: 데이터
        tech: ScriptableObject · TSV
        purpose: 리플렉션 제네릭 파서로 기획 데이터를 코드와 분리
      - category: 빌드 자동화
        tech: Jenkins
        purpose: 1시간 주기 폴링 → 배치 모드 빌드 → exit 코드 판정
