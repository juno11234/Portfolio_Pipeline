# ── ② 시스템 구조 ─────────────────────────────────────────────────────────
architecture:
  title: 전체 시스템 구조
  intro: >-
    전체는 **맵(로그라이크 노드 진행)을 축으로**, 그 아래 이벤트 · 전투 · 컷씬 씬이 Additive 로 붙는 5계층입니다.
    설정(SO)을 로딩 계층이 Addressables 로 읽어 캐시에 풀어 두고, 순수 C# 도메인 계층(생성 · 탐색 · 저장)이 이를
    소비하며, 오케스트레이션 계층이 씬 전환을 조율합니다.
  parts:
    - title: 설정 → 씬 5계층
      lede: L0 설정(SO) → L1 로딩(Addressables) → L2 도메인(순수 C#) → L3 오케스트레이션 → L4 씬(Additive)
      blocks:
        - type: layers
          components: >-
            설정은 SO, 로딩은 Addressables 핸들, 도메인은 무의존 POCO/서비스, 오케스트레이션은 VContainer
            EntryPoint, 씬 계층은 각 씬의 MonoBehaviour + 자체 LifetimeScope 로 이루어집니다.
          relations: >-
            `MapInitializer` 가 로딩→생성→탐색→UI 초기화를 순차 구동합니다. `MapNavigator` 가 노드 진입을
            `OnNodeEntered` 이벤트로 올리면 `MapUIController` 가 받아 `StageLoader` 에 씬 로드를 지시합니다.
            도메인은 상위를 모릅니다(단방향).
          flow: >-
            `StartAsync()` → Config 로드 → `GenerateMap(seed)` → 배경 채널 세팅 → `Navigator.Initialize` →
            `ShowMap` → (노드 클릭) → `MoveToNode` → `LoadStage` → Additive 씬 → 씬이
            `StageCompletionChannel.Invoke(result)` 로 결과 반환 → 언로드 → 맵 복귀.
          layers:
            - name: L0 설정 (SO)
              items:
                - name: MapGeneratorConfig
                - name: StageConfig
                - name: MonsterGroupConfig
                - name: EventConfig
                - name: SkillCutSceneConfig
            - name: L1 로딩
              edge: Addressables
              items:
                - name: MapConfigLoader
                - name: MapConfigPackage
                - name: MapConfigCache
            - name: L2 도메인 (순수 C#)
              edge: 소비 (단방향)
              items:
                - name: MapGenerator
                  emphasis: true
                - name: MapNavigator
                  emphasis: true
                - name: MapRepository
                  kind: dashed
            - name: L3 오케스트레이션
              edge: 조율
              items:
                - name: MapInitializer
                - name: StageLoader
                - name: MapUIController
            - name: L4 씬 (Additive)
              edge: 씬 전환
              items:
                - name: EventSceneController
                - name: TurnManager
                - name: SkillCutSceneController
    - title: 핵심 클래스 관계 — 세 축이 인터페이스에 의존
      lede: 맵 생성 · 효과 처리 · 턴 진행 세 축 모두 인터페이스에 의존하고, 구현체는 DI 로 갈아끼웁니다(테스트 대체재 포함).
      blocks:
        - type: mermaid
          question: 맵 생성 · 효과 처리 · 턴 진행 세 축은 각각 무슨 계약에 의존하고 누가 구현하나?
          source: |
            classDiagram
                class IMapGenerator {
                    <<interface>>
                    +GenerateMap(int seed) MapData
                }
                class MapGenerator
                class FixedMapGenerator
                IMapGenerator <|.. MapGenerator
                IMapGenerator <|.. FixedMapGenerator

                class IEventEffectHandler {
                    <<interface>>
                    +CanHandle(EffectType) bool
                    +HandleAsync(effect) UniTask
                }
                class HpChangeHandler
                class ItemRewardHandler
                class StatusEffectHandler
                class BattleEventHandler
                IEventEffectHandler <|.. HpChangeHandler
                IEventEffectHandler <|.. ItemRewardHandler
                IEventEffectHandler <|.. StatusEffectHandler
                IEventEffectHandler <|.. BattleEventHandler

                class ITurnUseUnit {
                    <<interface>>
                    +Speed int
                    +IsDead bool
                    +TakeTurnAsync() UniTask
                }
                class BaseCharacter
                class TestPlayer
                ITurnUseUnit <|.. BaseCharacter
                ITurnUseUnit <|.. TestPlayer
    - title: 씬 경계를 잇는 정적 채널 5종
      lede: '`Addressables.LoadSceneAsync` 는 씬에 파라미터를 못 넘기고 VContainer 스코프는 씬 경계를 못 넘습니다. 이 두 제약 때문에 목적별 정적 채널이 반복됩니다.'
      blocks:
        - type: table
          variant: channel
          headers: [채널, 자료구조, 방향]
          rows:
            - [StageCompletionChannel, Stack<Action<StageResult>>, 스테이지 씬 → 맵 씬]
            - [CutSceneCompletionChannel, Stack<Action>, 컷씬 씬 → 로더]
            - [EventBattleContext, static 프로퍼티, 이벤트 씬 → 맵 씬]
            - [MapBgChannel, static 프로퍼티, 맵 씬 → 모든 씬]
            - [CharacterSelectChannel, static event + TCS, 핸들러 → UI]
        - type: callout
          badge: 핵심
          tone: tint
          body: >-
            두 Completion 채널이 **Stack** 인 이유는 상위 콜백(전투)을 유지한 채 다른 콜백(컷씬)을 최상위에 Push/Pop
            하기 위해서입니다. `Invoke()` 는 `Peek()` 만 하고, 제거는 `Unregister()`(Pop)의 책임입니다.
    - title: DI 스코프 계층 — 직접 검증
      lede: '`RootScope` → `MapLifetimeScope` → `EventSceneLifetimeScope`(parentReference 수동 연결). 전투 씬은 `EnqueueParent` 로 부모를 지정합니다.'
      blocks:
        - type: image
          src: ../../assets/bond/ScopeTest.png
          label: TEST
          caption: 스코프 상속 구조를 직접 테스트한 증거 — VContainer Lifetime 이 씬 수명이 아니라 컨테이너 구역 기준임을 실험으로 확인
        - type: callout
          badge: 사실
          tone: white
          body: >-
            `BattleFlowManagerScope` 는 `LifetimeScope.EnqueueParent` 로 부모를 지정하고 `TurnLifetimeScope` 가 그
            아래 붙습니다. `PartyDeathHandlerScope` 는 `MapLifetimeScope` 를 부모로 삼습니다.

# ── ③ 핵심 기능 ───────────────────────────────────────────────────────────
features:
  # 핵심 기능을 기능별 섹션으로 나눴다(가독성 — 사용자 요청). 각 기능이 하나의 섹션(챕터 · 목차 항목)이 된다.
  - title: 시드 기반 절차적 맵 생성
    parts:
      - badge: MapGenerator
        title: 10단계 결정론 파이프라인 · 노드 상태 전이
        lede: >-
          Slay the Spire 식 DAG 맵을 **10단계 파이프라인**으로 만듭니다. `GenerateMap(seed)` 안에서 `System.Random`
          인스턴스 하나를 만들어 10단계 전체가 공유합니다 — 같은 시드 → 항상 같은 맵.
        blocks:
          - type: image
            src: ../../assets/bond/mapPipeline.png
            label: PIPELINE
            caption: 맵 생성 파이프라인 — 무작위로 뽑되 규칙으로 다듬어 항상 플레이 가능한 맵을 보장한다
          - type: code
            api: MapGenerator.cs · GenerateMap()
            code: |-
              // 시드 고정 난수 — 같은 시드면 항상 동일한 맵 생성
              System.Random rng = new System.Random(seed);
              MapData data = new MapData { Seed = seed, TotalLayers = config.TotalLayers };

              int[] nodeCounts = DetermineNodeCounts(rng, data.TotalLayers, config);
              CreateNodes(data, nodeCounts, rng);
              ConnectNodes(data, rng, config);
              RemoveCrossings(data);
              AssignStageTypes(data, rng, config);
              ApplyPlacementRules(data, rng, config);
              InitializeNodeStates(data);
              AssignMonsterGroups(data, rng, monsterGroupConfig);   // ← rng 공유라 호출 순서가 곧 재현성 계약
              AssignEvents(data, rng, eventConfig);
              AssignBossGroups(data, rng, _mapConfigCache.BossMonsterGroupConfig);
            notes:
              - at: 단일 rng 관통
                why: 각 단계에 new System.Random 을 따로 만들지 않고 하나의 rng 를 관통시킨다. 그래서 "같은 시드 → 같은 맵"이 성립한다. (대조군 FixedMapGenerator 는 배정마다 new 를 써서 이 계약이 없다.)
              - at: 호출 순서
                why: rng 공유라 이전 단계 완료 후 호출해야 한다 — 순서가 곧 재현성 계약이다(배정 메서드 주석에 명시).
          - type: chips
            variant: flow
            items:
              - { label: DetermineNodeCounts }
              - { label: CreateNodes (Fisher-Yates) }
              - { label: ConnectNodes }
              - { label: RemoveCrossings }
              - { label: AssignStageTypes }
              - { label: ApplyPlacementRules }
              - { label: InitializeNodeStates }
              - { label: AssignMonster/Event/Boss }
          - type: table
            variant: weight
            headers: [가중치 조건, Normal, Elite, Event, Camping]
            rows:
              - ['layer < 4 (하드코딩)', '0.70', '0.00', '0.30', '0.00']
              - ['layer < EliteMinLayer (하드코딩)', '0.55', '0.00', '0.25', '0.15']
              - ['그 외 (Config)', Cfg, Cfg, Cfg, Cfg]
          - type: table
            headers: ['#', 배치 규칙, 구현]
            rows:
              - ['1', 마지막 층 = Boss, AssignStageTypes 에서 강제]
              - ['2', 보스 직전 층 = Camping, 전처리 단일 순회]
              - ['3', Elite 최소 1개 보장, 단일 순회 통합]
              - ['4', Camping 최소 개수 보장, 단일 순회 통합]
              - ['5', 나머지 Boss → Normal 강등, 후처리]
          - type: mermaid
            question: 노드 상태는 어떻게 전이하나?
            source: |
              stateDiagram-v2
                  [*] --> Locked: InitializeNodeStates
                  Locked --> Available: 0층 · UnlockNextNodes
                  Available --> Current: MoveToNode 가드 통과
                  Current --> Visited: 다음 노드로 이동
                  Available --> Locked: 선택 안 된 형제 (영구)
          - type: code
            api: MapNavigator.cs · MoveToNode()
            code: |-
              public bool MoveToNode(int nodeId)
              {
                  if (_mapData == null) return false;
                  MapNode target = _mapData.NodeById[nodeId];
                  if (target.State != NodeState.Available) return false;   // Available 아니면 이동 불가

                  if (CurrentNode != null)
                  {
                      CurrentNode.State = NodeState.Visited;
                      foreach (int nextId in CurrentNode.NextNodeIds)       // 선택 안 된 형제는 영구 잠금
                          _mapData.NodeById[nextId].State = NodeState.Locked;
                  }
                  target.State = NodeState.Current;
                  CurrentNode = target;
                  UnlockNextNodes(target);
                  OnNodeEntered?.Invoke(target);
                  return true;
              }
            notes:
              - at: Available 가드
                why: Available 상태가 아니면 즉시 false. 잠긴 · 지나온 노드로는 못 간다.
              - at: 형제 잠금
                why: 현재 노드의 다른 NextNodeIds 를 전부 Locked 로. Slay the Spire 식 되돌릴 수 없는 한 방향 경로다.
          - type: image
            src: ../../assets/bond/bond-map.png
            variant: aside
            width: 250
            label: SCREENSHOT
            caption: 생성된 맵 노드 — 노드는 버튼, 엣지는 Image 의 회전 · 크기로 그린다(Canvas 에서 LineRenderer 불가)
  - title: 스테이지 로딩과 씬 경계 컨텍스트
    parts:
      - badge: StageLoader
        title: 정적 컨텍스트로 씬에 데이터 전달
        lede: >-
          `StageLoader` 는 Additive 씬 로드/언로드, 씬 경계 컨텍스트 기록, 맵 씬 컴포넌트 비활성/복원, 이벤트 전투
          전환, 결과 로그를 모두 책임집니다. 씬은 파라미터를 못 받으므로 들어가기 전 정적 컨텍스트에 "미리 적어" 둡니다.
        blocks:
          - type: code
            api: StageLoader.cs · CurrentStageType
            code: |-
              public StageType? CurrentStageType
                  => _hasLoadedScene == false ? null
                     : (_isBattleStage ? StageType.Normal : StageType.Event);
            notes:
              - at: 2 + null 가지
                why: Elite · Boss 스테이지 중에도 Normal 을, Camping 중에는 Event 를 반환한다(Elite/Boss/Camping 은 절대 반환 안 됨).
              - at: 사망 로그
                why: PartyDeathHandler 가 이 값으로 문구("전투에서"/"이벤트에서"/"탐사 중")를 고르므로, 문구 3종 이상 세분화는 현재 불가능하다.
          - type: table
            headers: [StageType, 조회 Config, 조회 방식]
            rows:
              - [Normal · Elite, MonsterGroupConfig, 헬퍼 (Elite 는 IsElite 플래그로 같은 Config 공유)]
              - [Boss, BossMonsterGroupConfig, 인라인]
              - [Event, EventConfig, 선형 탐색 헬퍼]
              - [Camping, 없음, 컨텍스트 미기록]
          - type: mermaid
            question: LoadStage 는 어떤 가드 · 순서로 씬을 여나?
            source: |
              flowchart TD
                  S["LoadStage(node)"] -->|"_isLoading == true"| G["재진입 차단"]
                  S -->|진행| D["DisableMapComponents · 언로드보다 먼저"]
                  D --> C["StageType 컨텍스트 분기"]
                  C -->|Normal · Elite · Boss · Event| R["Register 콜백 · EnqueueParent · 풀 주입"]
                  C -->|Camping| R
                  R --> L["LoadSceneAsync"]
                  L -->|예외| X["RestoreMapComponents + throw"]
                  L -->|finally| F["_isLoading = false"]
          - type: callout
            badge: 사실
            tone: white
            body: >-
              풀 인스턴스를 하위 씬 스코프에 직접 넣는다 — `EnqueueParent(부모)` 와 함께
              `Enqueue(builder => builder.RegisterInstance(_skillEffectPool))`. 후자가 필요한 이유는, 전투 씬 스코프가
              Inspector 에서 RootScope 를 부모로 직접 지정하면 `EnqueueParent` 가 무시되기 때문이다.
  - title: 이벤트 시스템
    parts:
      - badge: MVP · 책임 연쇄
        title: switch 없는 효과 체인 + 2차 선택지
        lede: >-
          `EventSceneController`(로직) · `EventChoicePresenter`(배선) · `IEventChoiceView`(UI 추상) 3분할. 효과 적용은
          switch 없이 `IEventEffectHandler` 체인에 위임하고, 체인은 **DI 가 조립**합니다(OCP).
        blocks:
          - type: code
            api: EventEffectApplier.cs · ApplyAsync()
            code: |-
              // switch 분기 대신 IEventEffectHandler Chain 에 위임. 새 EffectType 추가 시 이 클래스를 안 고치고 Handler 만 추가 (OCP)
              foreach (IEventEffectHandler handler in _handlers)
              {
                  if (handler.CanHandle(effect.EffectType))
                  {
                      await handler.HandleAsync(effect);
                      handled = true;
                      break;   // 첫 번째 매칭 핸들러에서 처리 후 중단
                  }
              }
              if (handled == false)
                  Debug.LogWarning($"처리되지 않은 EffectType: {effect.EffectType}");
            notes:
              - at: 체인 = DI 조립
                why: _handlers 는 생성자에서 IReadOnlyList로 주입되는데, VContainer 가 4개 핸들러를 AsImplementedInterfaces()로 등록해 체인 자체가 DI 로 조립된다.
              - at: break
                why: 첫 매칭만 실행하는 게 이 경로의 규약. 대조로 2차 선택지 경로는 매칭 핸들러를 전부 실행해 break 가 없다.
          - type: mermaid
            question: 이벤트 시스템의 타입 구조(데이터 · MVP · 체인)는?
            source: |
              classDiagram
                  class EventData
                  class EventChoice
                  class EventEffectData
                  EventData --> EventChoice
                  EventChoice --> EventEffectData

                  class IEventChoiceView {
                      <<interface>>
                  }
                  class EventJournalChoiceView
                  class EventSceneView
                  IEventChoiceView <|.. EventJournalChoiceView
                  IEventChoiceView <|.. EventSceneView

                  class EventEffectApplier
                  class IEventEffectHandler {
                      <<interface>>
                      +CanHandle(EffectType) bool
                      +HandleAsync(effect) UniTask
                  }
                  EventEffectApplier --> IEventEffectHandler : 체인 위임
                  IEventEffectHandler <|.. HpChangeHandler
                  IEventEffectHandler <|.. ItemRewardHandler
                  IEventEffectHandler <|.. StatusEffectHandler
                  IEventEffectHandler <|.. BattleEventHandler
          - type: table
            headers: [EffectType, 핸들러, 동작, async]
            rows:
              - [None, 없음, 무시, '-']
              - [HpChange, HpChangeHandler, HP 증감 · 대상 선택, O]
              - [StatusEffect, StatusEffectHandler, 스텁(미구현), O]
              - [ItemReward, ItemRewardHandler, 아이템 롤 · 지급, O]
              - [Battle, BattleEventHandler, 가드 throw, O]
          - type: points
            items:
              - title: 실행 순서 무보장 대응
                body: EventSceneController.Start(MonoBehaviour)와 EventChoicePresenter.Start(IStartable) 순서가 보장되지 않아, 양쪽 모두 방어 코드를 둬 "어느 순서든 정확히 한 번" 선택지를 표시한다.
              - title: 2차 선택지 (저널 템플릿)
                body: EventData.JournalData 가 있으면 효과를 바로 안 쓰고 저널 기반 2차 선택지를 띄운다. 상태기계 EventSceneState { Primary, Secondary } 로 관리하며 ItemReward 롤을 2차 진입 시점에 확정.
              - title: 스코프를 넘는 캐릭터 선택
                body: HpChange-ChooseOne 은 핸들러(MapLifetimeScope)와 UI(EventSceneLifetimeScope)가 다른 스코프라 CharacterSelectChannel(static + TCS)로 요청/응답한다. 구독자 없으면 0번 폴백.
  - title: 스킬 컷씬 데코레이터 주입
    parts:
      - badge: SkillCutSceneInjector
        title: onBattleAction 을 교체 대입
        lede: >-
          전투 시작 시 각 플레이어의 `onBattleAction`(`Func<BattleContext, UniTask>`)을 **교체 대입**해, 컷씬이 등록된
          스킬이면 컷씬을 먼저 재생한 뒤 원본을 호출합니다. 원본은 클로저로 캡처합니다.
        blocks:
          - type: code
            api: SkillCutSceneInjector.cs · WrapBattleActions()
            code: |-
              Func<BattleContext, UniTask> original = character.onBattleAction;   // 원본을 클로저로 캡처

              Func<BattleContext, UniTask> wrapper = async (BattleContext context) =>
              {
                  if (context.runtimeSkill != null && context.runtimeSkill.Data != null)
                  {
                      string skillId = context.runtimeSkill.Data.Id;
                      if (_config.TryGetSceneId(skillId, out string sceneId))          // 컷씬 등록 스킬이면
                      {
                          string[] sprites = CollectTargetSpriteAddresses(context, allEnemies);
                          await _cutSceneLoader.Load(sceneId, sprites);               // 컷씬 먼저
                      }
                  }
                  if (original != null) await original.Invoke(context);              // 그 다음 원본
              };

              character.onBattleAction = wrapper;          // ★ += 가 아닌 대입 — 원본 체인을 교체
              _wrapperDelegates[character] = wrapper;      // 다음 래핑 때 제거하려고 기억
            notes:
              - at: 대입 (= wrapper)
                why: += 가 아니라 대입이라 원본을 잃지 않으면서 순서(컷씬→원본)를 보장한다. 원본은 클로저로 가둬 래핑 전후 참조를 분리한다.
              - at: _wrapperDelegates
                why: 재래핑 시 -= 로 정확히 이전 래퍼만 떼어낸다. static _current 로 씬 재로드 시 잔류 래퍼도 Cleanup 한다.
          - type: table
            headers: [대상, 처리, 위치]
            rows:
              - [Timeline, DirectorUpdateMode.UnscaledGameTime, PlayableDirector]
              - [Cinemachine, UniformDeltaTimeOverride = unscaledDeltaTime, 노이즈 채널]
              - [스프라이트, DelayType.UnscaledDeltaTime, EffectSpritePlayer]
          - type: points
            columns: 2
            items:
              - title: 이중 래핑 2중 방지
                body: _wrapperDelegates(캐릭터별 직전 래퍼 추적)로 재래핑 전 제거, static _current(직전 인스턴스 Cleanup 호출)로 씬 재로드 시 잔류 래퍼 제거.
              - title: timeScale = 0 위에서 연출만
                body: 컷씬은 게임을 멈춘 채 재생되므로 Timeline · Cinemachine · 스프라이트 세 곳에서 unscaled 시간을 쓴다(위 표).
  - title: 전투 연출 오브젝트 풀
    parts:
      - badge: SkillEffectPool ↔ EffectSpritePlayer
        title: enabled 플래그 핸드셰이크
        lede: >-
          주소당 4개 오브젝트 풀. `Play()` 후 반납을 **`EffectSpritePlayer.enabled == false` 폴링**으로 잡는데,
          `EffectSpritePlayer` 는 1사이클 재생 후 스스로 꺼집니다. 이 한 플래그가 두 클래스의 유일한 접점입니다.
        blocks:
          - type: code
            api: SkillEffectPool.cs · ReturnAfterPlayAsync() / EffectSpritePlayer.cs
            code: |-
              // SkillEffectPool — 재생 종료를 enabled 플래그로 감지
              EffectSpritePlayer player = instance.GetComponent<EffectSpritePlayer>();
              if (player != null)
                  await UniTask.WaitUntil(() => player.enabled == false,   // ← 이 폴링이 반납 트리거
                                          cancellationToken: instance.GetCancellationTokenOnDestroy());
              else
                  await UniTask.Delay(1000, ...);   // 컴포넌트 없으면 1초 폴백
              Return(prefabAddress, instance);

              // EffectSpritePlayer — 1사이클 후 스스로 꺼져 '반납 신호'를 만든다
              if (_playGeneration != generation) return;   // 세대 불일치 → 조용히 종료
              if (_loop == false) { this.enabled = false; return; }   // ★ 이 한 줄이 반납 신호
            notes:
              - at: enabled 폴링
                why: 두 클래스가 이벤트/콜백 대신 enabled 한 플래그로 느슨하게 붙는다 — 풀은 "꺼졌나"만 보고, 플레이어는 풀을 전혀 모른다.
              - at: _playGeneration
                why: 토큰 없이도 "다른 Play() 나 OnDisable() 이 끼어들면 이전 루프를 무효화"하는 경량 취소 수단이다.
          - type: mermaid
            question: 풀 인스턴스의 수명은?
            source: |
              stateDiagram-v2
                  [*] --> NotCreated
                  NotCreated --> Idle: WarmUp · AddCharacters · Instantiate×4
                  Idle --> Active: Play · Dequeue
                  Active --> Idle: ReturnAfterPlay · enabled==false
                  Idle --> NotCreated: Clear · ReleaseInstance
          - type: table
            headers: [항목, WarmUpAsync (맵 진입), AddCharactersAsync (전투 직전)]
            rows:
              - [기존 풀 처리, 주소 집합 같으면 재생성 스킵 · 다르면 Clear 후 재구축, Clear 없이 증분 추가]
              - [트리거, 맵 진입 (장착 스킬), 적 확정]
          - type: points
            variant: mini
            columns: 2
            items:
              - { title: _idle, body: 대기 큐 }
              - { title: _active, body: 사용 중 }
              - { title: _warmUpAddresses, body: 등록 주소 집합 }
              - { title: _handles, body: Instantiate 핸들 }
  - title: 턴 시스템
    parts:
      - badge: TurnManager
        title: 토글 전투 · 속도 정렬 큐
        lede: >-
          외부 `IBattleFlowManager.OnBattle` 에 `SwitchBattle` 을 구독합니다 — `m_cts` 가 이미 있으면 **두 번째 발화 =
          전투 종료** 토글입니다. 매 라운드 속도 + 난수로 정렬하고, 자기 턴 처리 순서 자체가 규칙입니다.
        blocks:
          - type: code
            api: TurnManager.cs · SwitchBattle() / 자기 턴 처리
            code: |-
              public void SwitchBattle(BaseCharacter[] characters, BaseCharacter[] targets)
              {
                  if (m_cts != null) { BattleEnd(); return; }   // ← 두 번째 발화 = 전투 종료 (토글)
                  m_cts = new CancellationTokenSource();
                  _skillCutSceneInjector?.WrapBattleActions(characters, targets);  // 전투 직전 컷씬 래퍼 장착
                  StartBattleAsync(m_cts.Token).Forget();
              }

              // 자기 턴 시작: 지속효과 감소 → 억제 판정 → 리액션 리셋. 순서가 규칙이다.
              ownerChar.TickBuffs(); ownerChar.TickSeals(); ownerChar.TickDistrust();
              if (ownerChar.ConsumeSkipTurn()) skipNormalTurn = true;               // 강제 휴식 우선
              else skipNormalTurn = await ownerChar.TryRunSelfTurnAnomalyAsync();   // 아니면 돌발 판정
              ownerChar.ResetReactionCount();                                       // 돌발 판정 이후에 리셋
              if (skipNormalTurn == false) await unit.TakeTurnAsync();              // 억제 안 됐을 때만 행동
            notes:
              - at: m_cts 토글
                why: 같은 OnBattle 이벤트를 켜기/끄기 스위치처럼 쓴다. m_cts 가 이미 있으면 두 번째 발화가 곧 전투 종료다.
              - at: ResetReactionCount 위치
                why: 돌발 판정 이후에 두는 게 의도된 순서(주석 명시). 순서를 바꾸면 돌발/리액션 판정 결과가 달라진다.
          - type: mermaid
            question: 전투는 진입에서 종료까지 어떤 순서로 흐르고 루프는 무엇을 반복하나?
            source: |
              flowchart TD
                  A["SwitchBattle · 토글"] --> B["StartBattleAsync"]
                  B --> L{"전투 루프 · while(_isBattleActive)"}
                  L --> P["PrepareTurnQueue · RandomSpeed 부여 · Sort"]
                  P --> T["턴 시작 틱 · 버프/봉인/불신"]
                  T --> K["억제 판정 → await TakeTurnAsync"]
                  K --> D["사망 유닛 정리 (뒤→앞)"]
                  D --> L
                  L --> E["BattleEnd · CTS 취소 전파"]
          - type: points
            items:
              - title: 속도 + 난수 정렬 큐
                body: 매 라운드 생존 유닛만 RandomSpeed = Random.Range(0,10000)로 흔든 뒤 _turnQueue.Sort(). 정렬은 ITurnUseUnit 이 구현한 CompareTo(속도 내림차순, 동률 시 RandomSpeed)에 위임.
              - title: 큐 동일성 확인 제거
                body: 턴 도중 큐가 바뀔 수 있어, 제거 전 _turnQueue[0] == unit 을 확인한 뒤 RemoveAt(0). 죽은 유닛은 뒤→앞으로 순회하며 정리.
          - type: callout
            badge: 사실
            tone: white
            body: '`TestPlayer` 입력 매핑 — `Space`(턴 완료) · `F`(강제 사망). 실제 캐릭터 `BaseCharacter` 는 외부 코드(팀원 담당)다.'
  - title: 타임라인 커스텀 트랙
    parts:
      - badge: Playables
        title: Track · Clip · Behaviour · Mixer 4파일
        lede: >-
          두 트랙 모두 `Track`(TrackAsset) → `Clip`(PlayableAsset) → `ClipBehaviour`(데이터) → `MixerBehaviour`(적용)
          4파일 구조입니다. `MixerBehaviour.ProcessFrame` 이 바인딩 객체에 값을 적용하고, 내장 블렌드 대신 페이드를
          직접 계산합니다.
        blocks:
          - type: figure-grid
            cells:
              - src: ../../assets/bond/bond-speedline.png
                background: '#0f0f10'
                caption: '**속도선** — 텍스처 없이 GPU 생성 · 리액션 시스템 발동 시'
              - src: ../../assets/bond/bond-silhouette.png
                caption: '**실루엣** — 원본↔단색 연속 보간 (SilhouetteTrack + MaterialPropertyBlock)'
          - type: code
            api: SilhouetteTrack.cs · CreateTrackMixer()
            code: |-
              public override Playable CreateTrackMixer(PlayableGraph graph, GameObject go, int inputCount)
              {
                  ScriptPlayable<SilhouetteMixerBehaviour> playable =
                      ScriptPlayable<SilhouetteMixerBehaviour>.Create(graph, inputCount);
                  playable.GetBehaviour().SetMaterial(silhouetteMaterial);   // ← Inspector 머티리얼 주입 (Shader.Find 대신)
                  return playable;
              }
            notes:
              - at: Inspector 머티리얼 주입
                why: Shader.Find 는 빌드에서 셰이더가 스트립되면 null 이 될 수 있어, 에셋 참조를 쓴다(에셋 참조는 빌드에 자동 포함).
              - at: clipCaps = None
                why: Timeline 내장 블렌드/루프를 안 쓰고 CalculateFadeWeight(fadeIn/fadeOut 을 Clamp01)로 페이드를 직접 계산한다.
          - type: chips
            variant: flow
            items:
              - { label: TrackAsset }
              - { label: Clip (PlayableAsset) }
              - { label: ClipBehaviour }
              - { label: MixerBehaviour · ProcessFrame }
          - type: table
            headers: [트랙, BindingType, 적용 방식]
            rows:
              - [CameraShakeTrack, CinemachineBasicMultiChannelPerlin, totalWeight += weight]
              - [SilhouetteTrack, SpriteRenderer, MaterialPropertyBlock _BlendFactor 보간 · totalWeight += weight × fadeWeight]
  # 'AI 활용 개발' — 옛 PDF/디자인 판에 있던 섹션을 사용자 요청으로 되살렸다(핵심 기능 뒤에 배치).
  # 결함은 사용자 확인으로 ② 기준 대표 3건(BUG-05 · BUG-06 · ARCH-02, 발견/영향/조치)으로 교체 — 전체가 3건은 아니다.
  # 회고 satisfaction 카드는 중복을 피해 일반화하고 상세는 이 DefectList 에 둔다.
  - title: AI 활용 개발
    intro: AI를 개발 프로세스의 **단계별 전문 에이전트**로 분리하고 호출 규칙을 `.md` 파일로 명문화했습니다. 컨텍스트 오염을 방지하고 산출물의 일관성을 유지하는 것이 목적입니다.
    parts:
      - badge: 에이전트 구성
        title: Plan · Build · Review 3 역할
        blocks:
          - type: points
            variant: flow
            items:
              - { tag: '01 · PLAN', title: 계획 수립, body: '요구사항을 읽고 **계획 md**를 산출. 구현 범위 · 인터페이스 · 순서를 문서로 확정' }
              - { tag: '02 · BUILD', title: 구현, body: '확정된 **계획 md만** 근거로 코드를 작성. 임의 확장 없이 계획 범위를 지킴' }
              - { tag: '03 · REVIEW', title: 정적 리뷰, body: '코드를 ==정적 분석==해 결함 · 규칙 위반을 실행 전에 검출' }
      - badge: 루프
        title: 스크립트가 아니라 계획 파일을 고친다
        lede: 스크립트를 반복 생성 · 수정시키는 대신 **계획 md 한 파일**만 고칩니다. 원하는 결과까지의 ==토큰과 탐색 비용==이 줄어듭니다.
        blocks:
          - type: chips
            variant: loop
            items:
              - { label: 계획 md 수정, arrow: → }
              - { label: Build 재생성, arrow: → }
              - { label: 주석으로 설계 교정, arrow: → }
              - { label: 주석 확인 · 계획 반영, arrow: ⟳ }
      - badge: Reviewer
        title: 정적 분석이 잡은 대표 결함
        lede: 리뷰가 잡은 결함 중 **대표 3건**입니다(전체가 3건은 아님). 각 카드는 발견 · 영향 · 조치 순입니다.
        blocks:
          - type: points
            variant: defect
            items:
              # 발견/영향/조치를 한 줄씩(|- 블록 + rich 의 개행→<br>).
              - tag: BUG-05
                title: MapView.Initialize() 중복 호출 시 오브젝트 누적
                body: |-
                  **발견** 맵 복귀 시마다 기존 노드 뷰 · 엣지 뷰가 파괴되지 않고 다시 생성
                  **영향** 오브젝트 누수 → 성능 저하 · 잘못된 클릭 이벤트
                  **조치** ==재초기화 가드== 추가 — 반복 플레이가 필요한 재현 조건을 리뷰가 대신함
              - tag: BUG-06
                title: WeightedRandom 배열 불일치 — 예외 발생
                body: |-
                  **발견** types 배열은 4개 고정인데 GetWeights()는 상황에 따라 5개 반환
                  **영향** IndexOutOfRangeException → 맵 생성 실패
                  **조치** 두 배열을 ==WeightTypeOrder 단일 배열==로 통합 — 두 메서드에 동시 반영
              - tag: ARCH-02
                title: StageLoader 이중 로드 방지 누락
                body: |-
                  **발견** LoadStage() 실행 중 재호출되면 _hasLoadedScene이 아직 false
                  **영향** 빠른 연속 클릭 시 같은 씬이 Additive로 중복 로드 가능
                  **조치** ==_isLoading 플래그== 추가 — 컷씬 로더에도 동일 패턴 적용

# ── ④ 고민과 선택 (② 사람이 쓴 판단) ─────────────────────────────────────
decisions:
  - title: 씬 경계로 스테이지 데이터를 어떻게 넘길 것인가
    options:
      - key: A
        title: 싱글톤 · DontDestroyOnLoad
      - key: B
        title: DI 스코프 승계 확장
      - key: C
        title: 역할 하나짜리 정적 채널
        chosen: true
    criteria:
      - label: 접근 · 구현
        values:
          - 어디서든 접근 · 구현 단순
          - 주입 방식의 일관성 유지
          - Set → Read → Clear 좁은 계약 · 쓰는 곳/읽는 곳 명시적
      - label: 상태 수명 · 추적
        values:
          - 전역 상태라 수명 · 접근 지점 추적 곤란
          - 스코프 수명에 종속
          - Dispose 시 Clear 규약으로 수명 관리
      - label: 씬 경계 · 확장 비용
        values:
          - 씬은 넘지만 전역 오염
          - Additive 조합마다 스코프 설계 복잡 · 전달 제약은 그대로
          - 정적이라 씬 넘김 · 대신 역할 1개 제한
    reason: >-
      A 의 전역 상태 추적 곤란은 !!이전 팀 프로젝트가 실패한 바로 그 원인!!이라 배제했습니다. B 는 씬 로드 API 의
      전달 제약을 그대로 남긴 채 Additive 조합마다 스코프 설계만 복잡해집니다. C 는 ==역할 1개짜리 정적 채널==로
      좁혀 `Set → Read → Clear` 계약을 명시화하고 `Dispose` 시 `Clear` 로 수명을 관리 — 정적 상태라는 단점은 역할
      1개 제한 + 채널 클래스 격리로 감수했습니다.
  - title: 단발 프레임 이펙트를 어떻게 재생할 것인가
    options:
      - key: A
        title: Animator + AnimationClip
      - key: B
        title: Sprite 배열 플레이어 자체 구현
        chosen: true
    criteria:
      - label: 자산 관리
        values:
          - 이펙트마다 자산 3종 증식 · 관리 부담
          - 인스펙터에 Sprite[] 배열만 · 자산 부담 제거
      - label: 일시정지 중 재생
        values:
          - timeScale = 0 재생에 별도 설정 필요
          - unscaled 재생 · 일시정지 연출 중에도 이펙트만 재생
      - label: 아티스트 확인
        values:
          - 표준 워크플로(블렌딩 · 전이 · 이벤트 지원)
          - 에디터 프리뷰로 플레이 없이 확인
      - label: 한계
        values:
          - 단발 재생에 스테이트 머신은 과한 구조
          - 블렌딩 · 전이 없음 · 단순 프레임 이펙트로 용도 한정
    reason: >-
      대상이 ==단발 프레임 이펙트==라 스테이트 머신은 과한 구조입니다. 이펙트마다 자산 3종이 증식하는 부담과
      `timeScale = 0`(일시정지 연출) 대응의 번거로움을 피하려 `Sprite[]` 배열만 받는 플레이어를 직접 구현했습니다.
      블렌딩 · 전이가 없다는 한계는 용도를 단순 프레임 이펙트로 한정해 감수했습니다.
  - title: 완료 콜백 채널 — AI 제안을 뒤집은 역제안
    options:
      - key: A
        title: (AI 제안) 컷씬 언로드 후 전투 콜백 재등록
      - key: B
        title: (AI 제안) 컷씬 전용 정적 채널 신설
      - key: C
        title: (내 결정) 단일 슬롯 → Stack 채널
        chosen: true
    criteria:
      - label: 씬 중첩 대응
        values:
          - 되돌리기 로직이 호출부마다 산재 · 중첩 깊어지면 복원 순서 복잡
          - 씬 구조 늘 때마다 채널 클래스 증식
          - 최근 씬부터 Pop · 씬이 더 중첩돼도 그대로 동작
      - label: 기존 코드 영향
        values:
          - 호출부마다 복원 로직 추가
          - 같은 코드 중복
          - 기존 호출부 수정 최소 · Register/Invoke 시그니처 유지
    reason: >-
      AI 가 제안한 A · B 를 그대로 받지 않고 뒤집었습니다. A 는 되돌리기 로직이 호출부마다 산재해 중첩이 깊어질수록
      복원 순서 관리가 복잡해지고, B 는 씬 구조가 늘 때마다 채널 클래스가 증식합니다. 대신 단일 슬롯을
      ==`Stack<Action<StageResult>>`==로 바꿔 최근 씬부터 `Pop` 하게 하면 씬이 더 중첩돼도 흐름이 맞아떨어지고,
      `Register`/`Invoke` 시그니처를 유지해 기존 호출부 수정이 최소가 됩니다. (전투 중 컷씬이 뜨면 !!컷씬 콜백이
      전투 콜백을 덮어써 복귀 못 하던 버그!!가 이 결정의 계기였습니다.)

# ── ⑤ 결과 · 회고 (② 사람이 쓴 판단) ──────────────────────────────────────
retrospective:
  satisfaction:
    - title: 실행 순서 의존 제거
      body: >-
        이전 팀 프로젝트의 싱글톤 · `Script Execution Order` 강제 대신 `VContainer` 로 씬 생명주기를 관리하고,
        인터페이스 참조 + 외부 주입으로 초기화 순서를 제어했습니다.
    - title: 씬 수명과 객체 수명 일치
      body: >-
        전역 · 원정 · 스테이지 3계층 스코프로 씬 생명주기와 객체 수명을 맞추고, Additive 씬 로드 직전
        `EnqueueParent` 로 부모 스코프 · 이펙트 풀 인스턴스를 주입했습니다.
    - title: 연출과 로직 분리
      body: >-
        전투 루프를 계산 파이프라인과 연출 시스템으로 분기하고, 스킬 컷씬은 델리게이트 체인 미들웨어로 전투 코드
        수정 없이 끼워 넣었습니다.
    # 결함 상세는 위 'AI 활용 개발' DefectList(대표 3건: BUG-05 · BUG-06 · ARCH-02)에 둔다 — 중복 방지로 카드는 일반화.
    - title: AI 리뷰로 사전 결함 제거
      body: >-
        Reviewer 에이전트의 정적 분석으로 코드 리뷰 단계에서 결함을 실행 전에 미리 제거했습니다 — 대표 사례는 위
        '**AI 활용 개발**'의 결함 목록을 참고하세요.
  learnings:
    - title: 버티컬 슬라이스를 과하게 잡음
      body: >-
        모든 스테이지 유형(일반 · 엘리트 · 이벤트 · 캠프 · 보스)의 1회 클리어를 슬라이스 기준으로 삼아 진행이
        더뎌졌습니다. 일반 전투 하나로 범위를 좁힌 뒤에야 방향과 필요한 것이 구체화됐습니다.
    - title: CI/CD 도입이 늦음
      body: >-
        게임이 한 바퀴 돌아야 빌드 테스트가 가능하다고 판단해 미뤘고, 결국 마지막에 붙여 자동화의 이점을 살리지
        못했습니다.
    - title: VContainer Lifetime 을 씬 수명으로 오해
      body: >-
        자식 Scope 에서 부모 `TurnManager` 접근이 오작동한 걸 계기로, `VContainer` 의 Lifetime 이 씬 수명이 아니라
        요청을 처리하는 컨테이너 구역 기준임을 ==직접 테스트로 확인==하고 md 로 정리해 팀에 공유했습니다.
  improvements:
    - title: 슬라이스를 코어 루프로 좁힌다
      body: 다음엔 버티컬 슬라이스를 모든 스테이지 유형이 아니라 최소 핵심 코어 루프 하나 기준으로 자릅니다.
    - title: 빌드 파이프라인을 먼저 세운다
      body: 코어 루프 완성 직후 CI/CD 빌드 파이프라인부터 구축해 자동화 이점을 초기부터 확보합니다.
