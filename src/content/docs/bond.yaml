subtitle: 로그라이크 턴제 RPG — 원정 · 이벤트 · 전투 연출 시스템

# ── ① 개요 ─────────────────────────────────────────────────────────────────
overview:
  lead: >-
    Bond 의 **원정(Expedition) 모드** — 로그라이크 노드 맵을 축으로 이벤트 씬 · 전투 씬 · 컷씬 씬이 **Additive**
    로 붙는 구조를 설계 · 구현했습니다. **VContainer** DI 로 씬별 서브시스템의 초기화 · 해제 순서를 선언적으로
    관리하고, DI 스코프가 넘지 못하는 씬 경계는 **정적 채널 패턴**으로 잇습니다. 맵은 **시드 기반**으로 절차
    생성되고, 이벤트 효과는 **책임 연쇄**로, 스킬 컷씬은 **델리게이트 데코레이터**로 전투 행동에 주입됩니다.
  what: >-
    (1) 맵 절차 생성 · 탐색 · UI, (2) 스테이지(Additive 씬) 로딩과 씬 경계 컨텍스트 전달, (3) 이벤트 씬(선택지 ·
    효과 적용 · 2차 선택지 · 저널 로그), (4) 턴 진행, (5) 전투 연출(오브젝트 풀 · 스프라이트 애니메이션 · 타임라인
    커스텀 트랙), (6) 스킬 컷씬 로딩을 다룹니다. **C# 스크립트 103개**(`Assets/98. LeeJuno/`)의 실제 구현이 근거입니다.
  why: >-
    이전 팀 프로젝트가 **높은 결합도와 싱글톤 남용**으로 실행 순서(`Script Execution Order`)에 의존했습니다.
    이를 **인터페이스 + DI(VContainer)로 구조 개선**하는 것이 1차 목표, **AI 코딩 에이전트를 Plan · Build · Review
    사이클**로 도입해 프로세스의 실효성을 검증하는 것이 2차 목표입니다.
  evidence: >-
    이전 구조는 싱글톤으로 의존 추적이 어렵고 `Script Execution Order` 에 강제로 묶였습니다 — 인터페이스 참조 +
    DI 로 약한 연결로 바꿔, 이벤트 씬을 RootScope · MapLifetimeScope 없이 **Mock 스코프만으로 단독 실행**할 수 있게
    했습니다. AI 리뷰(정적 분석)로 테스트 없이 결함 **3건**을 사전 제거 — **21개 모듈 · 101개 스크립트** 규모입니다.
  scope: >-
    이 문서는 **원정/맵 서브시스템**만 다룹니다. 캐릭터 스탯 · 전투 판정 로직(`BaseCharacter` · `BattleManager` —
    팀원 담당), 저널 UI 내부, 스킬 이펙트의 실제 타격 적용, 아트 · 사운드는 **범위가 아닙니다**. 본문의 "외부 코드"
    표기가 그 경계입니다.
  stack:
    title: 선언적 조립 · 씬 경계 통신을 위한 도구 선택
    rows:
      - category: DI 컨테이너
        tech: VContainer
        purpose: EntryPoint(IAsyncStartable/IStartable) 생명주기로 씬별 서브시스템의 초기화 · 해제 순서를 선언적으로 관리, 책임 연쇄 핸들러를 AsImplementedInterfaces()로 자동 조립
      - category: 비동기
        tech: UniTask
        purpose: GC 부담 없는 async/await · TCS · WhenAll 로 로딩 · 턴 루프 · 효과 적용의 비동기 흐름을 코루틴 없이 표현
      - category: 에셋 · 씬 로드
        tech: Addressables
        purpose: Config · 스프라이트 · 씬 · 프리팹을 비동기 로드하고 핸들 수명으로 메모리를 명시적으로 해제
      - category: 연출
        tech: Unity Timeline (Playables)
        purpose: 카메라 흔들림 · 실루엣을 커스텀 트랙 2종으로 만들어 컷씬을 타임라인에서 편집 가능하게
      - category: UI
        tech: UI Toolkit + uGUI
        purpose: 이벤트 씬을 프로덕션(uGUI 저널 팝업)과 테스트(UI Toolkit UIDocument) 두 구현체로 병용
      - category: 카메라
        tech: Cinemachine
        purpose: 컷씬의 카메라 흔들림을 CinemachineBasicMultiChannelPerlin 노이즈 채널로 타임라인에서 제어
      - category: 입력
        tech: Input System
        purpose: 테스트 유닛(TestPlayer)의 입력을 액션맵으로 분리
      - category: 직렬화
        tech: Newtonsoft.Json
        purpose: 스킬(SkillBase)의 세이브/로드 직렬화 ([JsonProperty]/[JsonIgnore] 병용)

