# Bond 기술 문서.
#
# 내용 출처: claude.ai/design 의 "Bond Document"(사용자가 만든 것)를 byte-0 로 옮긴 cmp-bond.
# meta 는 포트폴리오 PDF(유니티_포트폴리오_이주노.pdf, 02 페이지)에서 뽑았다 — 지어낸 값 없음.
# 그래프(클래스 다이어그램)는 mermaid 로 그린다. 손그림 dc 컴포넌트는 디자인 검증용이었다.
subtitle: 로그라이크 턴제 RPG
overview:
  lead: >-
    **절차적으로 생성되는 노드 맵**을 탐사하며 이벤트와 **파티 턴제 전투**를 진행하는 Slay the Spire식 로그라이크
    RPG입니다. 저는 4인 팀에서 **맵 생성 · 씬 흐름 · 전투 루프 · 연출 시스템** 21개 모듈(101 스크립트)을 담당했습니다.
  goals:
    - badge: 목표 ①
      title: 구조 개선
      body: 이전 팀 프로젝트는 **높은 결합도와 싱글톤 남용**으로 실행 순서에 의존했습니다. ==인터페이스 + DI(VContainer)==로 의존성을 뒤집어 순서 의존을 제거합니다.
    - badge: 목표 ②
      title: 프로세스 검증
      body: AI 코딩 에이전트를 ==Plan · Build · Review== 사이클로 도입해 실효성을 확인합니다. 리뷰 단계에서 결함을 사전에 걸러내는 것이 검증의 핵심입니다.
  evidence: >-
    **DI 3계층 + 목적별 정적 채널**로 씬 경계를 잇고, **단일 시드 결정론 맵 생성**·**다층 턴 루프**·**비파괴 Timeline
    연출**을 인터페이스 기반으로 구현했습니다. AI를 **Plan·Build·Review** 에이전트로 나눠 정적 분석으로 결함 3건을 리뷰 단계에서 제거했습니다.
  scope: DI 스코프 설계, 씬 경계 통신(정적 채널), 절차적 맵 생성, 다층 턴 루프, Timeline 연출, AI 에이전트 개발 프로세스를 다룹니다. 아트·사운드·기획 밸런싱은 이 문서의 범위가 아닙니다.
screenshot:
  src: ../../assets/bond/bond-gameplay.png
  caption: 파티 vs 몬스터 턴제 전투 — 상단 턴 순서 큐, 하단 선택 유닛 스탯·스킬·장비 패널
meta:
  team: 4인 팀 프로젝트
  period: 2026.04.23 ~ 06.30
  vcs: SourceTree, GithubFlow 브랜치 전략
  engine: Unity 6000.3.10f1
  ide: Rider 2025.2.1
links: []
architecture:
  title: 시스템 구조
  intro: 씬 생명주기와 객체 수명을 일치시키기 위해 스코프를 **전역 · 원정 · 스테이지 3계층**으로 나눴습니다. 각 시스템은 ==인터페이스로만== 서로를 알고, 스코프가 넘지 못하는 씬 경계는 ==정적 채널==이 잇습니다.
  parts:
    - badge: 구성요소
      title: DI 스코프 3계층 — 컨테이너 구역과 수명
      blocks:
        - type: layers
          components: 전역 RootScope(무상태 서비스 6종), 원정 MapLifetimeScope(맵 씬 수명의 상태 7종), 스테이지 씬 스코프 3종(이벤트·전투·파티사망)으로 이루어집니다.
          relations: 부모 스코프가 자식에게 인스턴스를 주입(EnqueueParent)하고, 자식은 부모를 **인터페이스로만** 압니다. **MapInitializer**가 원정 스코프의 진입점입니다.
          flow: 전역 → 원정 → 스테이지 순으로 씬이 열리며 스코프가 중첩되고, 씬이 닫히면 역순으로 소멸합니다. 스코프가 넘지 못하는 씬 경계는 정적 채널이 잇습니다.
          layers:
            - name: 전역 · RootScope
              note: 전 원정 공용 · 무상태 서비스
              items:
                - name: ISpriteLoader
                - name: IMapConfigLoader
                - name: MapConfigCache
                - name: ISkillManager
                - name: ExpeditionPayload
                - name: IStageMonsterContext
            - name: 원정 · MapLifetimeScope
              note: 원정 한 판의 상태 — 맵 씬 수명
              edge: EnqueueParent + SkillEffectPool 인스턴스 주입
              items:
                - name: MapInitializer
                  emphasis: true
                - name: MapGenerator
                - name: MapNavigator
                - name: StageLoader
                - name: EventLogAccumulator
                - name: SkillEffectPool
                - name: EventEffectHandler ×4
                  kind: dashed
            - name: 스테이지 · 씬 스코프 (Additive)
              note: 스테이지 단위 객체 — 씬 로드/언로드로 소멸
              items:
                - name: EventSceneScope
                  body: 이벤트 씬 · Presenter/View
                - name: TurnLifetimeScope
                  body: 전투 + 컷씬 서비스
                - name: PartyDeathScope
                  body: 파티 사망 전멸 처리
    - badge: 관계
      title: 핵심 클래스 구조 · Class Diagram
      lede: 맵 생성 · 효과 처리 · 턴 진행 **세 축 모두 인터페이스에 의존**하고, 구현체는 DI로 갈아끼웁니다 — 목표 ① ==구조 개선==의 실체입니다.
      blocks:
        - type: mermaid
          question: 맵 생성·효과 처리·턴 진행 세 축은 각각 무슨 계약에 의존하고 누가 구현하나?
          source: |
            classDiagram
                class IMapGenerator {
                    <<interface>>
                    +GenerateMap(int seed) MapData
                }
                class MapGenerator
                class FixedMapGenerator
                IMapGenerator <|.. MapGenerator
                IMapGenerator <|.. FixedMapGenerator

                class IEventEffectHandler {
                    <<interface>>
                    +CanHandle(EffectType) bool
                    +HandleAsync(effect) UniTask
                }
                class HpChangeHandler
                class ItemRewardHandler
                class StatusEffectHandler
                class BattleEventHandler
                IEventEffectHandler <|.. HpChangeHandler
                IEventEffectHandler <|.. ItemRewardHandler
                IEventEffectHandler <|.. StatusEffectHandler
                IEventEffectHandler <|.. BattleEventHandler

                class ITurnUseUnit {
                    <<interface>>
                    +Speed int
                    +IsDead bool
                    +TakeTurnAsync() UniTask
                }
                class BaseCharacter
                class TestPlayer
                ITurnUseUnit <|.. BaseCharacter
                ITurnUseUnit <|.. TestPlayer
    - badge: 흐름
      title: 씬 경계를 잇는 정적 채널 5종
      lede: '`Addressables.LoadSceneAsync`는 씬에 파라미터를 넘길 수 없고 VContainer 스코프는 씬 경계를 못 넘습니다. 이 두 제약 때문에 **목적별 정적 채널**이 반복적으로 쓰입니다.'
      blocks:
        - type: table
          variant: channel
          headers: [채널, 자료구조, 방향]
          rows:
            - [StageCompletionChannel, Stack<Action<StageResult>>, 스테이지 씬 → 맵 씬]
            - [CutSceneCompletionChannel, Stack<Action>, 컷씬 씬 → 로더]
            - [EventBattleContext, static 프로퍼티, 이벤트 씬 → 맵 씬]
            - [MapBgChannel, static 프로퍼티, 맵 씬 → 모든 씬]
            - [CharacterSelectChannel, event + TCS, 효과 핸들러 → UI]
        - type: callout
          badge: 핵심
          tone: tint
          body: '두 Completion 채널이 **Stack**인 이유는 상위 콜백(전투)을 유지한 채 다른 콜백(컷씬)을 최상위에 Push/Pop 하기 위해서입니다. `Invoke()`는 `Peek()`만 하고, 제거는 `Unregister()`의 책임입니다. 정적 상태 잔류는 `Clear()`로 방어합니다.'
features:
  - title: AI 활용 개발
    intro: AI를 개발 프로세스의 **단계별 전문 에이전트**로 분리하고 호출 규칙을 `.md` 파일로 명문화했습니다. 컨텍스트 오염을 방지하고 산출물의 일관성을 유지하는 것이 목적입니다.
    parts:
      - badge: 에이전트 구성
        title: Plan · Build · Review 3 역할
        blocks:
          - type: points
            variant: flow
            items:
              - { tag: '01 · PLAN', title: 계획 수립, body: '요구사항을 읽고 **계획 md**를 산출. 구현 범위·인터페이스·순서를 문서로 확정' }
              - { tag: '02 · BUILD', title: 구현, body: '확정된 **계획 md만** 근거로 코드를 작성. 임의 확장 없이 계획 범위를 지킴' }
              - { tag: '03 · REVIEW', title: 정적 리뷰, body: '코드를 ==정적 분석==해 결함·규칙 위반을 실행 전에 검출' }
      - badge: 루프
        title: 스크립트가 아니라 계획 파일을 고친다
        lede: 스크립트를 반복 생성·수정시키는 대신 **계획 md 한 파일**만 고칩니다. 원하는 결과까지의 ==토큰과 탐색 비용==이 줄어듭니다.
        blocks:
          - type: chips
            variant: loop
            items:
              - { label: 계획 md 수정, arrow: → }
              - { label: Build 재생성, arrow: → }
              - { label: 주석으로 설계 교정, arrow: → }
              - { label: 주석 확인 · 계획 반영, arrow: ⟳ }
      - badge: Reviewer
        title: 정적 분석이 리뷰 단계에서 잡은 결함 3건
        blocks:
          - type: points
            variant: defect
            items:
              - { tag: B1, title: TurnManager.SwitchBattle — CTS 잔류, body: '`m_cts = new()` 이후에 null 인자를 검사해, LogError로 빠지면 `m_cts`가 non-null로 남아 다음 `OnBattle`이 전투 종료로 오작동' }
              - { tag: B2, title: CharacterSelectChannel — 단일 정적 TCS, body: '`_tcs`가 정적 단일 슬롯이라 캐릭터 선택 요청이 겹치면 이전 TCS가 유실 → `await`가 영구 대기' }
              - { tag: B3, title: HandleBattleChoice — Pending Report 누수, body: '전투 설정이 없거나 몬스터 풀이 비면 `CancelPendingReport()` 없이 return → 열린 저널 리포트가 다음 이벤트까지 잔류' }
    decisions:
      - title: 완료 콜백 채널 — AI 제안을 내가 뒤집다
        options:
          - { key: A, title: 단일 슬롯 콜백 (AI 제안) }
          - { key: B, title: Stack 채널 (역제안), chosen: true }
        criteria:
          - label: 콜백 중첩
            values:
              - 완료 콜백이 단일 슬롯이라 컷씬 콜백이 전투 콜백을 !!덮어써!! 복귀 실패
              - 상위 콜백을 유지한 채 컷씬 콜백을 Push/Pop 으로 겹쳐 쌓음
          - label: 잔류 방어
            values:
              - 슬롯이 하나라 상태 추적·정리가 어려움
              - Register=Push · Invoke=Peek · Unregister=Pop 으로 책임이 명확
        reason: AI가 제시한 단일 슬롯 설계의 한계를 짚어 **Stack 구조를 역으로 제안**했고, Stage · CutScene 두 Completion 채널 모두 이 구조를 채택했습니다.
  - title: 절차적 맵 생성
    intro: 단일 시드 RNG를 전 단계가 공유하는 **결정론적 생성기**입니다. 같은 시드는 항상 같은 맵을 만듭니다.
    parts:
      - badge: 개요
        title: 결정론 · Strategy · 편향 없는 분포
        blocks:
          - type: image
            src: ../../assets/bond/bond-map.png
            variant: aside
            width: 250
            label: SCREENSHOT
            caption: 단일 시드 RNG를 전 단계가 공유하는 **결정론적 생성기** — 노드는 **버튼**, 엣지는 **Image의 회전·크기**로 그립니다(Canvas에서 LineRenderer 불가).
          - type: points
            columns: 3
            items:
              - { title: Strategy 패턴, body: '`IMapGenerator` 구현 교체만으로 고정 맵(테스트) ↔ 랜덤 맵 전환' }
              - { title: Fisher-Yates 셔플, body: 열 배치를 셔플 후 정렬해 **편향 없는** 노드 분포 보장 }
              - { title: 결정론, body: '`System.Random` 인스턴스 하나를 파이프라인 전체가 공유' }
      - badge: 파이프라인
        title: GenerateMap — 10단계 동기 파이프라인
        blocks:
          - type: points
            variant: numbered
            columns: 2
            items:
              - { tag: '1', title: DetermineNodeCounts, body: 0층·마지막층=1, 중간층 rng }
              - { tag: '2', title: CreateNodes, body: 셔플→열 배치 + BuildLookups }
              - { tag: '3', title: ConnectNodes, body: 열 거리 ≤ 1, 고립 노드 강제 연결 }
              - { tag: '4', title: RemoveCrossings, body: 교차 없어질 때까지 스왑 }
              - { tag: '5', title: AssignStageTypes, body: WeightedRandom (last=Boss) }
              - { tag: '6', title: ApplyPlacementRules, body: 배치 규칙 5종 }
              - { tag: '7', title: InitializeNodeStates, body: 전부 Locked, 0층만 Available }
              - { tag: '8', title: AssignMonsterGroups, body: Normal/Elite 그룹 각인 }
              - { tag: '9', title: AssignEvents, body: Event 노드 이벤트 각인 }
              - { tag: '10', title: AssignBossGroups, body: Boss 그룹 각인 }
          - type: prose
            paragraphs:
              - '**시드 재현성의 핵심**은 `new System.Random(seed)` 인스턴스 하나를 열 단계 전체가 공유한다는 점입니다. 파라미터는 `MapGeneratorConfig`(TotalLayers 15 · EliteMinLayer 5 · MinCampingCount 2)로 외부화했습니다.'
          - type: table
            variant: weight
            headers: [가중치 조건, Normal, Elite, Event, Camping]
            rows:
              - ['layer < 4 (하드코딩)', '0.70', '0.00', '0.30', '0.00']
              - ['layer < 5 (하드코딩)', '0.55', '0.00', '0.25', '0.15']
              - ['그 외 (Config)', Cfg, Cfg, Cfg, Cfg]
      - badge: 내비게이션
        title: 노드 상태 전이 — 한 방향 경로
        lede: 선택하지 않은 형제 경로는 **영구 잠금**됩니다. Slay the Spire식 “한 방향 경로”를 `MoveToNode` 하나로 구현한 상태 머신입니다.
        blocks:
          - type: chips
            variant: state
            tail: 형제 경로 → Locked 영구
            items:
              - { label: Locked, arrow: → }
              - { label: Available, tone: start, arrow: → }
              - { label: Current, tone: current, arrow: → }
              - { label: Visited }
          - type: code
            api: mapNavigator.MoveToNode(nodeId)
            code: |-
              public bool MoveToNode(int nodeId)
              {
                  if (_mapData == null) return false;
                  if (_mapData.NodeById.ContainsKey(nodeId) == false) return false;

                  MapNode target = _mapData.NodeById[nodeId];
                  // Available 상태가 아니면 이동 불가
                  if (target.State != NodeState.Available) return false;

                  // 이전 노드 정리: Visited + 선택하지 않은 다음 노드 잠금
                  if (CurrentNode != null)
                  {
                      CurrentNode.State = NodeState.Visited;
                      // Slay the Spire 방식: 다른 경로는 영구 잠금
                      foreach (int nextId in CurrentNode.NextNodeIds)
                          _mapData.NodeById[nextId].State = NodeState.Locked;
                  }

                  target.State = NodeState.Current;      // 새 노드를 Current로
                  CurrentNode = target;
                  UnlockNextNodes(target);                // 다음 층 Available
                  OnNodeEntered?.Invoke(target);
                  return true;
              }
            notes:
              - { at: Available 가드, why: Available 상태가 아니면 즉시 false. 잠긴·지나온 노드로는 못 간다. }
              - { at: 형제 잠금, why: 현재 노드의 다른 NextNodeIds 를 전부 Locked 로. Slay the Spire식 되돌릴 수 없는 한 방향 경로다. }
      - badge: 데이터
        title: Config 로더 — Loader / Package / Cache 3단
        lede: Addressables 핸들을 해제하면 로드된 SO 참조도 무효화됩니다. 하지만 맵 생성 뒤에도 `StageConfig`를 계속 참조해야 하므로, **핸들 소유**와 **참조 보관**을 분리했습니다.
        blocks:
          - type: points
            variant: flow
            items:
              - { title: MapConfigLoader, body: Addressables 병렬 로드 · 핸들 소유/해제 }
              - { title: MapConfigPackage, body: 로드 결과를 담은 순수 DTO }
              - { title: MapConfigCache, body: 핸들 해제 후 참조 보관 · IsReady }
    decisions:
      - title: 씬 경계 데이터 전달 — 싱글톤 vs 정적 채널
        options:
          - { key: A, title: 범용 전역 싱글톤 }
          - { key: B, title: 목적별 정적 채널, chosen: true }
        criteria:
          - label: 계약 범위
            values:
              - 한 매니저에 전 씬 데이터 집중 → 결합도 상승
              - 채널마다 좁은 목적 하나만 — 계약이 명확
          - label: 잔류 상태
            values:
              - 어디서 남는지 추적 어려움
              - 채널별 `Clear()`로 잔류 방어
          - label: 콜백 중첩
            values:
              - 단일 슬롯이면 덮어쓰기 발생
              - Stack 채널로 중첩 콜백 지원
        reason: Addressables·스코프 제약 아래에서 범용 싱글톤은 결합과 잔류 추적 비용이 큽니다. **좁은 계약 + Clear + Stack**을 갖춘 목적별 정적 채널이 씬 경계 통신에 더 안전하다고 판단했습니다.
  - title: 전투
    intro: 진입 → 턴 루프 → 스킬 실행 → 종료의 **단방향 흐름**입니다. 연출은 이벤트로 분리되어 전투 로직을 막지 않고, `TurnManager`는 `ITurnUseUnit` 계약에만 의존합니다.
    parts:
      - badge: 턴 시스템
        title: 속도 내림차순 큐를 소진하는 다층 루프
        blocks:
          - type: mermaid
            question: 전투는 진입에서 종료까지 어떤 순서로 흐르고 루프는 무엇을 반복하나?
            source: |
              flowchart TD
                  A["SwitchBattle · 토글"] --> B["StartBattleAsync"]
                  B --> L{"전투 루프 · while(_isBattleActive)"}
                  L --> P["PrepareTurnQueue · RandomSpeed 부여"]
                  P --> T["턴 시작 틱 · 버프/봉인"]
                  T --> K["await TakeTurnAsync"]
                  K --> D["사망 유닛 정리"]
                  D --> L
                  L --> E["BattleEnd · CTS 취소 전파"]
          - type: points
            columns: 3
            items:
              - { title: ITurnUseUnit 계약, body: '속도 비교(`CompareTo`)를 유닛이 소유 — 큐는 계약에만 의존, 구체 타입과 분리' }
              - { title: 콜백 → 비동기 브리지, body: '입력 이벤트를 `_tcs`로 감싸 턴을 대기. `_tcs` null 여부로 “내 턴” 판단' }
              - { title: EntryPoint 생명주기, body: '`IStartable · IDisposable`로 구독과 해제를 스코프 수명에 묶음' }
          - type: callout
            badge: 주의
            tone: white
            body: '`SwitchBattle`은 **토글**입니다 — `m_cts != null`이면 두 번째 발화가 곧 전투 종료(`BattleEnd`)입니다. 하나의 진입점으로 시작과 종료를 겸합니다.'
      - badge: 스킬
        title: 데이터 · 관리 · 실행의 분리
        lede: 시트(TSV)로 밸런싱하는 데이터 주도 설계입니다. `SkillManager`는 생성 시 **3중 캐시**를 미리 구성해 조회를 할당 없이 O(1)로 끝냅니다.
        blocks:
          - type: points
            variant: mini
            columns: 3
            items:
              - { title: _skillDict, body: id → SkillData }
              - { title: _skillsByType, body: type → List }
              - { title: _allSkillsList, body: 전체 스냅샷 }
          - type: callout
            badge: Rule
            tone: tint
            body: '**Blind Logic** — 스킬은 **상태 변화만** 처리하고(`_effectManager.ApplyEffects`), 비주얼 연출과 타격 적용은 `onBattleAction` 델리게이트에 위임합니다. 덕분에 다음 장의 컷씬을 ==전투 코드 수정 없이== 끼워 넣을 수 있습니다.'
  - title: 연출 · 이펙트
    intro: 스킬 컷씬은 전투 코드를 건드리지 않는 **델리게이트 미들웨어**로 끼워 넣고, 셰이더와 Timeline 커스텀 트랙으로 연출을 구현했습니다.
    parts:
      - badge: 스킬 컷씬
        title: 전투 코드를 건드리지 않는 델리게이트 미들웨어
        lede: 원본 `onBattleAction`을 **클로저로 캡처**한 뒤 컷씬 래퍼로 덮어씌웁니다. 시간을 멈추고, 컷씬을 Additive로 띄우고, 완료 신호로 `await`을 푼 뒤 원본을 호출합니다.
        blocks:
          - type: code
            api: skillCutSceneInjector.Inject(character)
            code: |-
              Func<BattleContext, UniTask> wrapper = async (BattleContext context) =>
              {
                  if (context.runtimeSkill != null && context.runtimeSkill.Data != null)
                  {
                      string skillId = context.runtimeSkill.Data.Id;
                      if (_config.TryGetSceneId(skillId, out string sceneId))
                      {
                          string[] sprites = CollectTargetSpriteAddresses(context, allEnemies);
                          await _cutSceneLoader.Load(sceneId, sprites);   // 컷씬 먼저
                      }
                  }
                  if (original != null)
                      await original.Invoke(context);                    // 원본 타격 로직
              };
              character.onBattleAction = wrapper;      // += 가 아닌 대입 — 체인 교체
              _wrapperDelegates[character] = wrapper;  // 이중 래핑 방지 추적
            notes:
              - { at: 대입 (= wrapper), why: '+= 가 아니라 대입이라 델리게이트 체인을 통째로 교체한다. 원본을 클로저로 잡아둔 뒤 래퍼가 그 앞뒤를 감싼다.' }
              - { at: _wrapperDelegates, why: 같은 캐릭터에 래퍼가 이중으로 씌워지는 것을 추적해 막는다. }
          - type: api-list
            groups:
              - name: timeScale = 0 대응 3중 장치
                entries:
                  - { signature: Timeline 재생, returns: DirectorUpdateMode.UnscaledGameTime }
                  - { signature: Cinemachine 노이즈, returns: UniformDeltaTimeOverride = unscaledDeltaTime }
                  - { signature: Sprite 애니메이션, returns: DelayType.UnscaledDeltaTime }
      - badge: 셰이더
        title: 속도선 · 실루엣 — URP 커스텀 셰이더
        lede: '**텍스처 없이** GPU에서 선을 생성하는 속도선과, `SpriteRenderer.color`로는 불가능한 **원본↔단색 연속 보간** 실루엣을 ShaderLab · HLSL로 구현했습니다.'
        blocks:
          - type: image
            src: ../../assets/bond/bond-speedline.png
            label: SHADER
            caption: '**속도선** — 텍스처 없이 GPU 생성 · 치명타 강조'
          - type: image
            src: ../../assets/bond/bond-silhouette.png
            label: SHADER
            caption: '**실루엣** — 원본↔단색 연속 보간'
          - type: points
            columns: 3
            items:
              - { title: GPU 난수 · 분기 대체, body: 'sin 해시로 GPU 난수를, `lerp`로 `if`문을 대체' }
              - { title: PerRendererData 배칭, body: 머티리얼 공유로 드로우콜 절약, 스프라이트별 텍스처는 렌더러가 주입 }
              - { title: 런타임 파라미터 제어, body: '`PropertyToID` 정적 캐싱 + `unscaledTime` 연동으로 timeScale 0에서도 작동' }
      - badge: Timeline
        title: Playables 커스텀 트랙 — 4계층
        lede: 카메라 셰이크 · 실루엣 트랙을 **Track · Clip · Behaviour · Mixer** 구조로 구현했습니다. 트랙은 씬 상태를 ==비파괴적으로 오버라이드==합니다.
        blocks:
          - type: chips
            variant: flow
            items:
              - { label: TrackAsset, arrow: → }
              - { label: Clip (PlayableAsset), arrow: → }
              - { label: ClipBehaviour, arrow: → }
              - { label: MixerBehaviour }
          - type: points
            columns: 3
            items:
              - { title: 비파괴 오버라이드, body: 원본 값을 캐싱했다가 `OnPlayableDestroy`에서 복원 }
              - { title: 이중 가중치 블렌딩, body: 타임라인 크로스페이드 × 클립 내부 fadeIn/Out을 가중 합성 }
              - { title: 에디터 스크럽 안전, body: 그래프 재빌드로 플래그가 어긋나도 **머티리얼 참조 비교**로 안전 복구 }
    decisions: []
decisions: []
retrospective:
  parts:
    - badge: 잘한 점
      title: 과거 vs 현재 — 구조가 바뀐 지점
      blocks:
        - type: before-after
          before:
            label: 과거 팀 프로젝트
            items:
              - 클래스 간 결합도가 높아 **실행 순서에 의존**
              - 싱글톤 남용으로 의존 관계 추적 곤란
              - Script Execution Order로 순서 강제
          after:
            label: 현재 팀 프로젝트
            items:
              - '**VContainer**로 씬 생명주기 관리'
              - 외부 주입으로 초기화 순서 제어
              - ==인터페이스를 참조==하는 구조
          lesson: 계기는 자식 Scope에서 부모의 `TurnManager` 접근 시 오작동이었습니다. Lifetime은 **씬 수명이 아니라 요청을 처리하는 컨테이너 구역** 기준임을 실험으로 확인했습니다.
        - type: points
          variant: mini
          columns: 3
          items:
            - { title: Singleton, body: 자식에서 접근해도 **부모와 같은 인스턴스** }
            - { title: Scoped, body: 자식마다 **부모와 다른 인스턴스** }
            - { title: 재등록, body: Singleton이라도 자식이 새로 등록하면 **다른 인스턴스** }
  debt:
    - CI/CD 도입이 늦었다. "게임이 한 바퀴는 돌아야 빌드 테스트가 가능하다"는 판단으로 미뤄, 결국 제일 마지막에 붙여 자동화의 이점을 살리지 못했다.
    - 버티컬 슬라이스를 과대하게 잡았다. 모든 스테이지 유형(일반·엘리트·이벤트·캠프·보스) 1회 클리어를 기준으로 삼아 진행이 더뎠고, 일반 전투 하나로 좁힌 뒤에야 방향이 구체화됐다.
  plan:
    - 코어 루프 완성 직후 **빌드 파이프라인부터** 세운다. 자동화의 이점은 초기에 붙일수록 크다.
    - 버티컬 슬라이스는 **최소 핵심 코어 루프** 기준으로 자른다. 유형을 다 덮으려 하지 않는다.
