# 자기소개서 원문. ~/Downloads/자기소개서.pdf 에서 그대로 옮겼다.
# 문장을 고치지 않는다. 고칠 일이 생기면 사용자가 직접 고친다.

growth:
  title: 성장 과정
  paragraphs:
    - 고등학교 시절 오버워치를 접하며 게임 개발자를 꿈꾸게 되었고, 처음에는 게임 원화를 목표로 공부했습니다.
      그러나 감각과 표현에 크게 의존하는 디자인보다, 명확한 원인과 결과를 바탕으로 문제를 해결하는 프로그래밍에
      더 큰 흥미를 느꼈습니다. 유튜브를 통해 C#을 독학하며 적성을 확인했고 보다 체계적으로 학습하기 위해
      게임 아카데미에 진학했습니다.
    - 누리호 발사 당시 들었던 "실패를 겪더라도 원인을 파악하고 해결하는 과정 자체가 기술의 발전"이라는 말은
      실패를 바라보는 제 관점을 바꾸었습니다. 이후 저는 문제가 발생했을 때 결과보다 원인을 분석하고,
      그 과정에서 배우는 것을 더욱 중요하게 생각하게 되었습니다.
    - 이러한 가치관은 버민타이드 프로젝트를 진행하면서 더욱 확고해졌습니다. 원작처럼 맵을 탐험하며 구간마다
      적의 웨이브를 상대하는 구조였는데, 복잡한 실내 맵에서 심각한 프레임 드롭이 발생했습니다. 단순히 성능을
      개선하는 데 그치지 않고 원인을 분석하기 위해 유니티 프로파일러를 집중적으로 학습했습니다. 프로파일러에서
      GPU 작업 완료를 기다리는 Gfx.WaitForPresent 마커를 확인해 GPU 병목을 의심했고, 미로 형태의 실내 구조에서
      가려지는 오브젝트가 많다고 보고, 렌더링 비용을 줄이기 위해 오클루전 컬링을 적용했습니다. 그 결과 15FPS
      이하까지 떨어지던 프레임을 60FPS 수준으로 안정화할 수 있었습니다.
    - 이 경험을 통해 얻은 가장 큰 성과는 프레임을 높인 결과 자체가 아니었습니다. 결과는 이번 한 번만 남지만
      문제를 분석하고 해결하는 과정에서 습득한 유니티 프로파일러 사용법은 다음 프로젝트에서도 재사용할 수 있는
      지식이기 때문입니다. 앞으로도 실패를 두려워하지 않고 해결 과정을 통해 성장하는 개발자가 되고자 합니다.

personality:
  title: 성격의 장단점
  # 원본은 두 칼럼의 위치만으로 장점/단점을 구분한다. 화면이 좁아 위아래로 쌓이면
  # 그 구분이 사라지므로 라벨을 붙였다. 원본에 없던 단어다.
  strength:
    label: 장점
    paragraphs:
      - 저의 가장 큰 장점은 호기심입니다. 하나의 주제에 관심이 생기면 자연스럽게 연관된 분야까지 깊이 파고드는
        성향이 있습니다.
      - 상태 패턴만으로 단순히 주적, 공격만 하는 몬스터 AI를 구현한 뒤, 제가 즐겨 플레이하던 게임의 AI처럼
        상황에 따라 유연하게 행동하는 AI는 어떻게 구현되는지 궁금해졌습니다. 이를 계기로 Behaviour Tree를
        독학했고 학습한 내용을 보스 AI에 적용하여 플레이어를 단순히 추적하는 것이 아니라 상황에 따라
        배회하거나 후퇴하는 등 보다 자연스러운 행동을 구현할 수 있었습니다.
      - 호기심으로만 그치지 않고 실제 프로젝트에 적용해 결과를 만들어내는 것이 저의 강점입니다.
  weakness:
    label: 단점
    paragraphs:
      - 반면, 관심이 생긴 분야를 깊이 파고드는 성향 때문에 우선순위를 놓칠 때도 있습니다.
      - 스타워즈를 모티브로 한 프로젝트에서는 Timeline 연출의 완성도를 높이는 데 몰입하다가 처음 구상했던
        전투 시스템을 온전히 구현하지 못했습니다. 원래는 데미지가 누적되면 그로기 게이지가 차오르고,
        그로기 이후 처형 연출로 이어지는 전투 흐름을 설계했지만 일정이 부족해지면서 게이지 시스템은 제외하고
        그로기를 돌진 패턴과 결합하는 방향으로 범위를 조정했습니다. 또한 패링 성공에 대한 보상도 충분히
        구현하지 못해 전투의 완성도에 아쉬움이 남았습니다.
      - 화려한 Timeline 연출은 한순간 기억에 남을 수 있지만 결국 유저가 계속해서 플레이하게 만드는 부분은
        패링의 보상, 그로기와 처형 시스템, 전투와 같은 반복적인 경험입니다. 이번 일을 통해 우선순위를 바탕으로
        일정을 관리하는 능력 또한 게임의 재미와 직결된다는 것을 배웠습니다.
      - 해당 단점을 보완하기 위해 ToDo 체크리스트를 만들어 우선순위를 설정해가며 작업하고 있습니다.

teamwork:
  title: 팀프로젝트 경험 (기업 협약 프로젝트 → 4인 팀프로젝트)
  episodes:
    - heading: 기술적 경험
      paragraphs:
        - 혼자 개발할 때는 편의상 싱글톤을 자주 썼고 별문제를 느끼지 못했습니다. 하지만 기업 협약 프로젝트
          빌드 단계에만 매니저 클래스가 null로 참조되는 오류를 겪었습니다. Logcat으로 추적해보니 빌드
          환경에서 스크립트 실행 순서가 에디터와 달라지면서 생긴 문제였고, 근본 원인은 클래스 간 결합도가
          높아 특정 실행 순서에 의존하는 구조 자체에 있었습니다. 혼자일 때는 편했던 방식이, 여러 명이 같은
          코드를 공유하자 의존 관계를 따라가기 어렵게 만든 것입니다.
      improvement:
        title: 이후 팀프로젝트에서 DI 구조 도입 제안
        paragraphs:
          - 싱글톤이 협업을 어렵게 만들었다는 경험을 팀에 공유하고 VContainer 도입을 제안하였고 팀원들도
            바로 동의했습니다.
          - 이후 각 시스템을 구체 클래스가 아닌 인터페이스에 의존하도록 설계해 결합도를 낮추고 그 의존성을
            VContainer로 외부에서 주입받는 구조로 전환했습니다.

    - heading: 소통 경험
      paragraphs:
        - 기획팀과 협업을 진행하며 게임 개발자로서 뼈아픈 실수를 하였습니다. 해당 프로젝트 마치고
          "직접 플레이해보고 재미있었나요?" 라는 피드백을 받은 순간 제가 개발을 기능 구현의 관점에서만
          바라보고 있었다는 사실을 깨달았습니다. 기획은 기획팀의 역할이라고 생각한 나머지 구현에만 집중했고
          회의에서도 구현 여부와 일정만 주고받을 뿐 단 한 번도 플레이어 경험에 대한 이야기를 나누지
          않았습니다. 이 경험을 통해 저는 프로그래머 역시 게임의 재미에 대한 책임을 함께 가져야 한다는 것을
          배웠습니다. 단순히 기획서를 코드로 구현하는 개발자가 아니라 '게임' 개발자로서 플레이어 경험을
          중심으로 기획자와 적극 소통하며 게임의 완성도를 높이는 개발자가 되고자 합니다.
      improvement:
        title: 이후 팀프로젝트에서 장르 특성, 기획 의도를 바탕으로 적극적인 의견 제시
        paragraphs:
          - Bond의 핵심 재미 루프는 아군 파티원이 서로의 행동에 반응해 추가 행동을 이어가는 턴제 전투였습니다.
            하지만 스킬이 숫자 로그로만 표현되고 리액션도 캐릭터 확대에 그쳐 타격감이 부족했습니다. 저는 정보
            전달과 타격감을 함께 살리는 스킬 이펙트와 컷씬 연출 구현을 적극적으로 건의하고 직접 구현하였습니다.

goals:
  title: 목표
  short:
    heading: 단기적인 목표
    paragraphs:
      - 입사 직후에는 팀의 개발 문화와 협업 방식에 빠르게 적응하는 것을 최우선으로 삼겠습니다. 팀 프로젝트를
        거치며 탄탄한 구조의 중요성과, 기능 구현을 넘어 플레이어 경험까지 함께 고민하는 일의 중요성을
        배웠습니다. 이를 바탕으로 기획 의도와 플레이어의 실제 경험이 어긋나지 않도록 개선 방향과 구현 방식을
        적극적으로 제안하며, 재미있는 게임을 만드는 데 기여하겠습니다.
  long:
    heading: 장기적인 목표
    paragraphs:
      - AI가 발전할수록 코드를 작성하는 일보다, 무엇을 어떻게 만들지 설계하고 판단하는 역량이 더 중요해진다고
        생각합니다. 그래서 클라이언트 개발을 중심으로, 게임 개발에 기술적으로 기여할 수 있는 영역을 꾸준히
        넓혀가고 싶습니다.
