name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 진행 중인 배포는 취소하지 않고, 새 배포는 하나씩 큐로 처리한다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Mermaid를 빌드 시점에 SVG로 굽는 데 chromium이 필요하다 (mermaid-isomorphic + playwright).
      # 없으면 mermaid 블록에서 빌드가 예외로 멈춘다.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 가능하면 Pages를 자동 활성화(source=GitHub Actions). 조직 정책 등으로 실패하면
      # 저장소 Settings → Pages → Source: GitHub Actions 를 한 번 수동 설정한다.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
